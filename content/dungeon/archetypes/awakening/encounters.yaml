schema_version: 1
encounters:
- id: aw_echo_drift
  room_type: combat
  min_depth: 1
  max_depth: 3
  min_difficulty: 1
  description_en: Fragments at the periphery. Not hostile – residual. Two echo fragments drift through
    the room, wearing postures borrowed from the party. They are memories of a memory – impressions
    with no original.
  description_de: Fragmente an der Peripherie. Nicht feindlich – residual. Zwei Echofragmente driften
    durch den Raum und tragen Haltungen, die sie von der Gruppe geliehen haben. Erinnerungen an eine
    Erinnerung – Eindrücke ohne Original.
  choices: []
  combat_encounter_id: awakening_echo_drift_spawn
  is_ambush: false
  ambush_stress: 0
- id: aw_deja_vu_corridor
  room_type: combat
  min_depth: 2
  max_depth: 4
  min_difficulty: 1
  description_en: The corridor is familiar. The party has never been here. Both of these are true.
    A Déjà-vu Phantom occupies the center – its movements half a second ahead of expectation. An echo
    fragment trails behind, filling the gaps in the phantom's choreography.
  description_de: Der Korridor ist vertraut. Die Gruppe war nie hier. Beides stimmt. Ein Déjà-vu-Phantom
    besetzt die Mitte – seine Bewegungen eine halbe Sekunde vor der Erwartung. Ein Echofragment folgt
    und füllt die Lücken in der Choreografie des Phantoms.
  choices: []
  combat_encounter_id: awakening_deja_vu_patrol_spawn
  is_ambush: false
  ambush_stress: 0
- id: aw_leech_hunt
  room_type: combat
  min_depth: 2
  max_depth: 5
  min_difficulty: 1
  description_en: Something in this room processes without perceiving. A Consciousness Leech – Watts's
    philosophical zombie made operational. It does not know it exists. This is its advantage. An echo
    fragment accompanies it, providing the self-awareness it lacks.
  description_de: Etwas in diesem Raum verarbeitet, ohne wahrzunehmen. Ein Bewusstseinsegel – Watts'
    philosophischer Zombie, operational. Es weiß nicht, dass es existiert. Das ist sein Vorteil. Ein
    Echofragment begleitet es und stellt das Selbstbewusstsein bereit, das ihm fehlt.
  choices: []
  combat_encounter_id: awakening_leech_hunt_spawn
  is_ambush: false
  ambush_stress: 0
- id: aw_deep_mind_clash
  room_type: combat
  min_depth: 3
  max_depth: 6
  min_difficulty: 1
  description_en: Deeper. The consciousness here is denser, layered like a palimpsest. A Consciousness
    Leech and a Déjà-vu Phantom have found equilibrium – the zombie and the prophet, processing and
    predicting, neither aware that the other thinks differently.
  description_de: Tiefer. Das Bewusstsein hier ist dichter, geschichtet wie ein Palimpsest. Ein Bewusstseinsegel
    und ein Déjà-vu-Phantom haben ein Gleichgewicht gefunden – der Zombie und der Prophet, verarbeitend
    und vorhersagend, keiner bewusst, dass der andere anders denkt.
  choices: []
  combat_encounter_id: awakening_deep_mind_spawn
  is_ambush: false
  ambush_stress: 0
- id: aw_sentinel_chamber
  room_type: combat
  min_depth: 4
  max_depth: 7
  min_difficulty: 1
  description_en: The threshold between remembered and repressed. A Sentinel guards it – Ishiguro's
    mist given form. It does not hate the party. It pities their need to know. An echo fragment drifts
    behind, a memory that was permitted to exist.
  description_de: Die Schwelle zwischen Erinnertem und Verdrängtem. Ein Wächter hütet sie – Ishiguros
    Nebel, dem Form gegeben wurde. Er hasst die Gruppe nicht. Er bedauert ihr Bedürfnis zu wissen.
    Ein Echofragment driftet dahinter, eine Erinnerung, der gestattet wurde zu existieren.
  choices: []
  combat_encounter_id: awakening_sentinel_spawn
  is_ambush: false
  ambush_stress: 0
- id: aw_lucid_skirmish
  room_type: combat
  min_depth: 3
  max_depth: 5
  min_difficulty: 1
  description_en: The room recognizes the party. This is not a metaphor. The walls adjust. The light
    shifts to match a memory none of them can place. Two phantoms emerge from the adjustment – the
    room defending its version of events.
  description_de: Der Raum erkennt die Gruppe. Das ist keine Metapher. Die Wände passen sich an. Das
    Licht verschiebt sich, um einer Erinnerung zu entsprechen, die keiner von ihnen einordnen kann.
    Zwei Phantome treten aus der Anpassung hervor – der Raum verteidigt seine Version der Geschehnisse.
  choices: []
  combat_encounter_id: awakening_deja_vu_patrol_spawn
  is_ambush: false
  ambush_stress: 0
- id: aw_the_mirror
  room_type: encounter
  min_depth: 1
  max_depth: 3
  min_difficulty: 1
  description_en: 'A surface. Not glass – not water – something that reflects without material. Each
    agent sees something different. Lem''s mirror: we have no need of other worlds. We need mirrors.'
  description_de: 'Eine Oberfläche. Nicht Glas – nicht Wasser – etwas, das reflektiert ohne Material.
    Jeder Agent sieht etwas anderes. Lems Spiegel: wir brauchen keine anderen Welten. Wir brauchen
    Spiegel.'
  choices:
  - id: mirror_study
    label_en: Study the reflection carefully (Spy)
    label_de: Die Spiegelung sorgfältig studieren (Spion)
    check_aptitude: spy
    check_difficulty: -5
    success_effects:
      awareness: 5
    partial_effects:
      awareness: 3
    fail_effects:
      stress: 10
      awareness: 8
    success_narrative_en: '{agent} sees through the reflection to the mechanism. The mirror does not
      show the viewer – it shows what the viewer has forgotten about themselves. The awareness gained
      is not comfortable. It is precise.'
    success_narrative_de: '{agent} sieht durch die Spiegelung zum Mechanismus. Der Spiegel zeigt nicht
      den Betrachter – er zeigt, was der Betrachter über sich selbst vergessen hat. Das gewonnene
      Bewusstsein ist nicht angenehm. Es ist präzise.'
    partial_narrative_en: '{agent} sees something in the reflection – not the mechanism, but the edge
      of it. Like reading a word in peripheral vision: the meaning arrives, incomplete. The mirror
      shows a fragment of what was forgotten. Enough to unsettle. Not enough to understand.'
    partial_narrative_de: '{agent} sieht etwas in der Spiegelung – nicht den Mechanismus, aber seinen
      Rand. Wie ein Wort am Rand des Blickfelds: die Bedeutung trifft ein, unvollständig. Der Spiegel
      zeigt ein Fragment des Vergessenen. Genug, um zu beunruhigen. Nicht genug, um zu verstehen.'
    fail_narrative_en: The reflection holds {agent}'s gaze too long. When they look away, something
      in the reflection does not.
    fail_narrative_de: Die Spiegelung hält {agent}s Blick zu lange fest. Als sie wegschauen, tut etwas
      in der Spiegelung es nicht.
  - id: mirror_share
    label_en: Share what each agent sees (Propagandist)
    label_de: Teilen, was jeder Agent sieht (Propagandist)
    check_aptitude: propagandist
    check_difficulty: -5
    success_effects:
      awareness: -5
      stress_heal: 10
    partial_effects:
      awareness: -2
    fail_effects:
      awareness: 5
      stress: 5
    success_narrative_en: 'Each agent describes their reflection. The descriptions overlap – same
      room, different memories. The act of sharing stabilizes what each agent sees alone. Sturgeon''s
      bleshing: the gestalt perceives more clearly than any individual.'
    success_narrative_de: 'Jeder Agent beschreibt seine Spiegelung. Die Beschreibungen überlappen
      sich – derselbe Raum, unterschiedliche Erinnerungen. Das Teilen stabilisiert, was jeder Agent
      allein sieht. Sturgeons Bleshing: das Gestalt nimmt klarer wahr als jeder Einzelne.'
    partial_narrative_en: 'The descriptions almost overlap. Edges touch – the same corner of a room,
      the same quality of light – then diverge. Sturgeon''s bleshing, interrupted: the gestalt forms
      for a moment, then each agent returns to their own perception. Something was glimpsed. Something
      shared. Not held.'
    partial_narrative_de: 'Die Beschreibungen überlappen sich fast. Ränder berühren sich – dieselbe
      Ecke eines Raumes, dieselbe Qualität des Lichts – dann gehen sie auseinander. Sturgeons Bleshing,
      unterbrochen: die Gestalt bildet sich für einen Moment, dann kehrt jeder Agent zu seiner eigenen
      Wahrnehmung zurück. Etwas wurde erhascht. Etwas geteilt. Nicht gehalten.'
    fail_narrative_en: The descriptions do not overlap. Each agent is alone in their perception. The
      mirror shows this, too.
    fail_narrative_de: Die Beschreibungen überlappen sich nicht. Jeder Agent ist allein in seiner
      Wahrnehmung. Der Spiegel zeigt auch das.
  - id: mirror_pass
    label_en: Do not look. Move through.
    label_de: Nicht hinsehen. Weitergehen.
    check_difficulty: 0
    success_effects: {}
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: The party passes. Orpheus's discipline. The mirror reflects their backs.
    success_narrative_de: Die Gruppe geht weiter. Orpheus' Disziplin. Der Spiegel reflektiert ihre
      Rücken.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: aw_the_familiar_room
  room_type: encounter
  min_depth: 2
  max_depth: 4
  min_difficulty: 1
  description_en: 'This room. The party has been here. Not in this dungeon – somewhere. The window
    was on the left. Or the right. The details resist settling. Proust''s madeleine: the sensation
    arrives before the memory.'
  description_de: 'Dieser Raum. Die Gruppe war hier. Nicht in diesem Dungeon – irgendwo. Das Fenster
    war links. Oder rechts. Die Details weigern sich, sich festzulegen. Prousts Madeleine: die Empfindung
    kommt vor der Erinnerung.'
  choices:
  - id: familiar_investigate
    label_en: Investigate what changed (Spy)
    label_de: Untersuchen, was sich verändert hat (Spion)
    check_aptitude: spy
    check_difficulty: 0
    success_effects:
      awareness: 3
    partial_effects:
      awareness: 2
    fail_effects:
      awareness: 8
    success_narrative_en: '{agent} catalogs the differences. The window was on the left – now it is
      on the right. Neither is wrong. The memory is not replayed; it is reconstructed. The reconstruction
      reveals something about the one who reconstructs.'
    success_narrative_de: '{agent} katalogisiert die Unterschiede. Das Fenster war links – jetzt ist
      es rechts. Keines ist falsch. Die Erinnerung wird nicht wiedergegeben; sie wird rekonstruiert.
      Die Rekonstruktion verrät etwas über den, der rekonstruiert.'
    partial_narrative_en: '{agent} catalogs some differences. The window – yes, it moved. But why
      it moved, what the reconstruction reveals about the reconstructor, remains out of focus. Proust''s
      madeleine, half-dissolved: the sensation arrives, but the memory it summons stays submerged.'
    partial_narrative_de: '{agent} katalogisiert einige Unterschiede. Das Fenster – ja, es hat sich
      bewegt. Aber warum es sich bewegt hat, was die Rekonstruktion über den, der rekonstruiert, verrät,
      bleibt unscharf. Prousts Madeleine, halb aufgelöst: die Empfindung kommt an, aber die Erinnerung,
      die sie heraufbeschwört, bleibt untergetaucht.'
    fail_narrative_en: 'The details shift faster than {agent} can track. Funes''s curse: too much
      detail, no abstraction. The room fills with almost-contiguous memories.'
    fail_narrative_de: 'Die Details verschieben sich schneller, als {agent} folgen kann. Funes'' Fluch:
      zu viel Detail, keine Abstraktion. Der Raum füllt sich mit fast-angrenzenden Erinnerungen.'
  - id: familiar_accept
    label_en: Accept the familiarity without questioning
    label_de: Die Vertrautheit akzeptieren, ohne zu fragen
    check_difficulty: 0
    success_effects:
      stress_heal: 5
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: 'The party accepts. The room settles. Tarkovsky''s lesson: everything depends
      not on the Zone, but on the visitor.'
    success_narrative_de: 'Die Gruppe akzeptiert. Der Raum beruhigt sich. Tarkowskis Lektion: alles
      hängt nicht von der Zone ab, sondern vom Besucher.'
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: aw_the_two_clocks
  room_type: encounter
  min_depth: 2
  max_depth: 5
  min_difficulty: 1
  description_en: 'Time is not uniform here. Kafka''s two clocks: the inner one runs crazily on at
    an inhuman pace, the outer one limps along. The party experiences both. Actions in this room have
    consequences at different speeds.'
  description_de: 'Die Zeit ist hier nicht einheitlich. Kafkas zwei Uhren: die innere rennt wahnsinnig
    weiter in unmenschlichem Tempo, die äußere hinkt. Die Gruppe erlebt beides. Handlungen in diesem
    Raum haben Konsequenzen in unterschiedlichen Geschwindigkeiten.'
  choices:
  - id: clocks_synchronize
    label_en: Attempt to synchronize the clocks (Guardian)
    label_de: Versuchen, die Uhren zu synchronisieren (Wächter)
    check_aptitude: guardian
    check_difficulty: 0
    success_effects:
      awareness: -5
      stress_heal: 15
    partial_effects:
      awareness: -2
    fail_effects:
      awareness: 10
      stress: 10
    success_narrative_en: '{agent} grounds the party in shared time. The clocks align, briefly. In
      that moment of synchronization, the room is perfectly clear – every detail sharp, every memory
      precise. Then the drift resumes.'
    success_narrative_de: '{agent} erdet die Gruppe in gemeinsamer Zeit. Die Uhren gleichen sich an,
      kurz. In diesem Moment der Synchronisation ist der Raum vollkommen klar – jedes Detail scharf,
      jede Erinnerung präzise. Dann setzt die Drift wieder ein.'
    partial_narrative_en: '{agent} brings the clocks closer. Not aligned – adjacent. For a half-second
      the room flickers into clarity, then the drift resumes. But {agent} saw it: the room between
      the clocks. It was empty. Deliberately empty.'
    partial_narrative_de: '{agent} bringt die Uhren näher. Nicht synchron – benachbart. Für eine halbe
      Sekunde flackert der Raum in Klarheit, dann setzt das Driften wieder ein. Aber {agent} hat es
      gesehen: den Raum zwischen den Uhren. Er war leer. Absichtlich leer.'
    fail_narrative_en: The clocks split further. What else can happen but that the two worlds split
      apart?
    fail_narrative_de: Die Uhren entfernen sich weiter. Was kann sonst geschehen, als dass die zwei
      Welten auseinanderbrechen?
  - id: clocks_inner
    label_en: Follow the inner clock deeper (Infiltrator)
    label_de: Der inneren Uhr tiefer folgen (Infiltrator)
    check_aptitude: infiltrator
    check_difficulty: 5
    success_effects:
      awareness: 8
      loot_tier: 1
    partial_effects:
      awareness: 5
    fail_effects:
      awareness: 12
      stress: 15
    success_narrative_en: '{agent} follows the faster clock. Time compresses. What takes minutes outside
      takes seconds inside. In the compressed time, {agent} perceives something the outer clock would
      never reveal.'
    success_narrative_de: '{agent} folgt der schnelleren Uhr. Die Zeit komprimiert sich. Was draußen
      Minuten dauert, dauert drinnen Sekunden. In der komprimierten Zeit nimmt {agent} etwas wahr,
      das die äußere Uhr nie enthüllen würde.'
    partial_narrative_en: '{agent} follows the inner clock – briefly. Time compresses, then stutters.
      A glimpse of the accelerated perception: shapes in the compressed seconds, moving too fast to
      identify. The outer clock pulls {agent} back. Something was perceived. The vocabulary for it
      has not yet arrived.'
    partial_narrative_de: '{agent} folgt der inneren Uhr – kurz. Die Zeit komprimiert sich, dann stockt
      sie. Ein Blick in die beschleunigte Wahrnehmung: Formen in den komprimierten Sekunden, zu schnell,
      um sie zu identifizieren. Die äußere Uhr zieht {agent} zurück. Etwas wurde wahrgenommen. Das
      Vokabular dafür ist noch nicht eingetroffen.'
    fail_narrative_en: The inner clock is too fast. {agent} is swept along at an inhuman pace. The
      return to outer time is disorienting.
    fail_narrative_de: Die innere Uhr ist zu schnell. {agent} wird in unmenschlichem Tempo mitgerissen.
      Die Rückkehr zur äußeren Zeit ist desorientierend.
  - id: clocks_wait
    label_en: Wait for the moment to pass
    label_de: Warten, bis der Moment vergeht
    check_difficulty: 0
    success_effects:
      awareness: 2
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: The clocks drift past each other. The room normalizes. The party is not
      unchanged.
    success_narrative_de: Die Uhren driften aneinander vorbei. Der Raum normalisiert sich. Die Gruppe
      ist nicht unverändert.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: aw_the_absent_memory
  room_type: encounter
  min_depth: 3
  max_depth: 6
  min_difficulty: 1
  description_en: 'A room with a gap. Not a hole – a smooth, clean absence. Something was here. The
    dungeon remembers that it forgets. Ogawa''s memory police: first the emotional connection vanishes,
    then the physical evidence. This room is at stage two.'
  description_de: 'Ein Raum mit einer Lücke. Kein Loch – eine glatte, saubere Abwesenheit. Etwas war
    hier. Das Dungeon erinnert sich, dass es vergisst. Ogawas Gedächtnispolizei: erst verschwindet
    die emotionale Verbindung, dann der physische Beweis. Dieser Raum ist bei Stufe zwei.'
  choices:
  - id: absent_reconstruct
    label_en: Reconstruct what was here (Propagandist)
    label_de: Rekonstruieren, was hier war (Propagandist)
    check_aptitude: propagandist
    check_difficulty: 5
    success_effects:
      awareness: 5
      loot_tier: 1
    partial_effects:
      awareness: 3
    fail_effects:
      awareness: 10
      stress: 10
    success_narrative_en: '{agent} fills the gap. Not with the original memory – that is gone. With
      a reconstruction. The reconstruction becomes real. Borges''s hronir: objects materialized by
      expectation. The dungeon accepts the substitute.'
    success_narrative_de: '{agent} füllt die Lücke. Nicht mit der ursprünglichen Erinnerung – die
      ist weg. Mit einer Rekonstruktion. Die Rekonstruktion wird real. Borges'' Hronir: Objekte, materialisiert
      durch Erwartung. Das Dungeon akzeptiert das Substitut.'
    partial_narrative_en: '{agent} fills the gap – partially. The reconstruction takes shape, but
      the edges remain translucent. Borges''s hronir, half-materialized: the object exists by expectation,
      but expectation wavers. The dungeon accepts the substitute provisionally. As one accepts a word
      one cannot quite recall.'
    partial_narrative_de: '{agent} füllt die Lücke – teilweise. Die Rekonstruktion nimmt Gestalt an,
      aber die Ränder bleiben durchscheinend. Borges'' Hronir, halb materialisiert: das Objekt existiert
      durch Erwartung, aber die Erwartung schwankt. Das Dungeon akzeptiert das Substitut vorläufig.
      Wie man ein Wort akzeptiert, an das man sich nicht ganz erinnern kann.'
    fail_narrative_en: 'The gap resists reconstruction. The absence is informative: what the dungeon
      cannot remember, it cannot forgive.'
    fail_narrative_de: 'Die Lücke widersteht der Rekonstruktion. Die Abwesenheit ist informativ: was
      das Dungeon nicht erinnern kann, kann es nicht vergeben.'
  - id: absent_accept
    label_en: Accept the absence as it is
    label_de: Die Abwesenheit akzeptieren, wie sie ist
    check_difficulty: 0
    success_effects:
      awareness: -3
      stress_heal: 5
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: 'Ishiguro''s wisdom: some memories were buried for reasons. The party respects
      the gap. The gap respects the party.'
    success_narrative_de: 'Ishiguros Weisheit: manche Erinnerungen wurden aus Gründen begraben. Die
      Gruppe respektiert die Lücke. Die Lücke respektiert die Gruppe.'
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: aw_the_humming
  room_type: encounter
  min_depth: 3
  max_depth: 99
  min_difficulty: 1
  description_en: 'From somewhere: a humming. The likes of which the party has never heard. Not really
    humming – the singing of the most distant, of the most utterly distant, voices. Kafka''s Castle
    telephone: this humming is the only real and reliable thing. Everything else is deceptive.'
  description_de: 'Von irgendwo: ein Summen. Wie es die Gruppe noch nie gehört hat. Nicht wirklich
    Summen – das Singen der fernsten, der allerallerfernsten Stimmen. Kafkas Schlosstelefon: dieses
    Summen ist das einzig Reale und Verlässliche. Alles andere ist Täuschung.'
  choices:
  - id: humming_listen
    label_en: Listen deeply (Spy)
    label_de: Tief hinhören (Spion)
    check_aptitude: spy
    check_difficulty: 5
    success_effects:
      awareness: 10
      stress_heal: 20
    partial_effects:
      awareness: 8
      stress_heal: 10
    fail_effects:
      awareness: 15
      stress: 15
    success_narrative_en: 'The humming resolves. Not into words – into recognition. {agent} hears
      the dungeon''s voice and understands: it is the party''s own collective voice, heard from the
      outside. Jaynes''s bicameral mind: the gods were always us.'
    success_narrative_de: 'Das Summen löst sich auf. Nicht in Worte – in Wiedererkennung. {agent}
      hört die Stimme des Dungeons und versteht: es ist die eigene kollektive Stimme der Gruppe, von
      außen gehört. Jaynes'' zweikammeriger Geist: die Götter waren immer wir.'
    partial_narrative_en: The humming almost resolves. {agent} hears the boundary between noise and
      signal – the threshold where the voices nearly coalesce into recognition. Jaynes's bicameral
      membrane, thinning but not torn. The gods are audible. Not yet intelligible.
    partial_narrative_de: Das Summen löst sich fast auf. {agent} hört die Grenze zwischen Rauschen
      und Signal – die Schwelle, an der die Stimmen beinahe zu Wiedererkennung verschmelzen. Jaynes'
      zweikammerige Membran, dünner werdend, aber nicht gerissen. Die Götter sind hörbar. Noch nicht
      verständlich.
    fail_narrative_en: The humming overwhelms. Too many voices, too distant, too simultaneous. Funes's
      garbage heap. The party retreats from the signal.
    fail_narrative_de: Das Summen überwältigt. Zu viele Stimmen, zu fern, zu gleichzeitig. Funes'
      Müllhalde. Die Gruppe weicht vor dem Signal zurück.
  - id: humming_block
    label_en: Block it out (Guardian)
    label_de: Es ausblenden (Wächter)
    check_aptitude: guardian
    check_difficulty: -5
    success_effects:
      awareness: -3
    partial_effects: {}
    fail_effects:
      awareness: 5
    success_narrative_en: '{agent} maintains the boundary. The humming recedes. The dungeon notes
      the refusal without judgment.'
    success_narrative_de: '{agent} hält die Grenze aufrecht. Das Summen lässt nach. Das Dungeon vermerkt
      die Weigerung ohne Urteil.'
    partial_narrative_en: '{agent} holds the boundary – mostly. The humming dims but does not disappear.
      A residual frequency persists, like a thought one has decided not to think but which continues
      thinking itself.'
    partial_narrative_de: '{agent} hält die Grenze – größtenteils. Das Summen wird leiser, verschwindet
      aber nicht. Eine Restfrequenz bleibt bestehen, wie ein Gedanke, den man beschlossen hat nicht
      zu denken, der aber weiterhin sich selbst denkt.'
    fail_narrative_en: The humming finds a way through. Not through the walls – through the awareness
      itself.
    fail_narrative_de: Das Summen findet einen Weg hindurch. Nicht durch die Wände – durch das Bewusstsein
      selbst.
  is_ambush: false
  ambush_stress: 0
- id: aw_threshold_gate
  room_type: elite
  min_depth: 4
  max_depth: 6
  min_difficulty: 1
  description_en: Before the Law. A gate between remembered and repressed. The Sentinel guards it
    – not with force, but with pity. This door was made only for the party. The Sentinel has waited
    their entire descent.
  description_de: Vor dem Gesetz. Ein Tor zwischen Erinnertem und Verdrängtem. Der Wächter hütet es
    – nicht mit Gewalt, sondern mit Mitleid. Dieses Tor wurde nur für die Gruppe gemacht. Der Wächter
    hat ihren gesamten Abstieg gewartet.
  choices: []
  combat_encounter_id: awakening_sentinel_spawn
  is_ambush: false
  ambush_stress: 0
- id: aw_the_repressed_boss
  room_type: boss
  min_depth: 4
  max_depth: 99
  min_difficulty: 1
  description_en: 'The room at the center. Tarkovsky''s Room: it grants your true desire, not your
    stated one. The Repressed has been here the entire dungeon – in every room, behind every memory,
    inside every recognition. It is not a monster. It is the truth that was too heavy to carry and
    too important to destroy.'
  description_de: 'Der Raum in der Mitte. Tarkowskis Raum: er gewährt den wahren Wunsch, nicht den
    ausgesprochenen. Das Verdrängte war das gesamte Dungeon hier – in jedem Raum, hinter jeder Erinnerung,
    in jeder Wiedererkennung. Es ist kein Monster. Es ist die Wahrheit, die zu schwer war, um sie
    zu tragen, und zu wichtig, um sie zu zerstören.'
  choices: []
  combat_encounter_id: awakening_sentinel_spawn
  is_ambush: false
  ambush_stress: 0
- id: aw_quiet_layer
  room_type: rest
  min_depth: 1
  max_depth: 99
  min_difficulty: 1
  description_en: A stratum of consciousness that is still. Not empty – calm. Like the pause between
    breaths. The dungeon's awareness rests here too. For a moment, the observer and the observed share
    the same silence.
  description_de: Eine Schicht des Bewusstseins, die still ist. Nicht leer – ruhig. Wie die Pause
    zwischen Atemzügen. Das Bewusstsein des Dungeons ruht hier ebenfalls. Für einen Moment teilen
    der Beobachter und das Beobachtete dieselbe Stille.
  choices:
  - id: quiet_rest
    label_en: Rest in the quiet layer
    label_de: In der stillen Schicht rasten
    check_difficulty: 0
    success_effects:
      stress_heal: 40
      awareness: -5
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: Silence. Not absence of sound – presence of peace. The awareness recedes
      like a tide. The party is not diminished. They are grounded.
    success_narrative_de: Stille. Nicht Abwesenheit von Klang – Anwesenheit von Frieden. Das Bewusstsein
      zieht sich zurück wie eine Gezeit. Die Gruppe ist nicht vermindert. Sie ist geerdet.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: aw_forgetting_pool
  room_type: rest
  min_depth: 3
  max_depth: 99
  min_difficulty: 1
  description_en: 'Lethe. A pool of deliberate forgetting. Not a loss – a choice. The Oracle of Trophonius
    demands it: drink from Lethe first, to forget all prior thoughts. Then from Mnemosyne, to remember
    what you will see. Both rivers, sequentially.'
  description_de: 'Lethe. Ein Becken des absichtlichen Vergessens. Kein Verlust – eine Wahl. Das Orakel
    des Trophonios verlangt es: trinke zuerst aus Lethe, um alle vorherigen Gedanken zu vergessen.
    Dann aus Mnemosyne, um zu erinnern, was du sehen wirst. Beide Flüsse, nacheinander.'
  choices:
  - id: pool_drink
    label_en: Drink from the pool (reduces awareness significantly)
    label_de: Aus dem Becken trinken (senkt Bewusstsein erheblich)
    check_difficulty: 0
    success_effects:
      stress_heal: 25
      awareness: -15
      stress: 5
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: The party drinks. Awareness recedes sharply. Some memories blur. Some details
      soften. The trade is not free – forgetting is its own kind of labor. But the mind is lighter.
    success_narrative_de: Die Gruppe trinkt. Das Bewusstsein geht scharf zurück. Manche Erinnerungen
      werden unscharf. Manche Details weicher. Der Tausch ist nicht kostenlos – Vergessen ist seine
      eigene Art von Arbeit. Aber der Geist ist leichter.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: aw_crystallized_memory
  room_type: treasure
  min_depth: 1
  max_depth: 99
  min_difficulty: 1
  description_en: 'Consciousness, solidified. A lieu de mémoire – Nora''s concept: a place where memory
    crystallizes because history would dissolve it. The artifact holds what the dungeon chose to preserve.'
  description_de: 'Bewusstsein, verfestigt. Ein Lieu de Mémoire – Noras Konzept: ein Ort, an dem Erinnerung
    kristallisiert, weil Geschichte sie auflösen würde. Das Artefakt bewahrt, was das Dungeon zu bewahren
    wählte.'
  choices:
  - id: crystal_take
    label_en: Take the crystallized memory
    label_de: Die kristallisierte Erinnerung nehmen
    check_difficulty: 0
    success_effects:
      loot_tier: 1
      awareness: 3
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: The crystal releases warmth on contact. Not physical warmth – the warmth
      of recognition. The party has gained something. The dungeon has lost something.
    success_narrative_de: Der Kristall gibt bei Berührung Wärme ab. Nicht physische Wärme – die Wärme
      der Wiedererkennung. Die Gruppe hat etwas gewonnen. Das Dungeon hat etwas verloren.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: aw_the_archive
  room_type: treasure
  min_depth: 2
  max_depth: 99
  min_difficulty: 1
  description_en: 'An archive. Not of documents – of impressions. Each shelf holds a sensation: the
    smell of rain on warm stone, the sound of a name almost remembered, the weight of a decision not
    yet made. Bergson''s cone of memory: the totality of experience, compressed into accessible form.'
  description_de: 'Ein Archiv. Nicht aus Dokumenten – aus Eindrücken. Jedes Regal hält eine Empfindung:
    den Geruch von Regen auf warmem Stein, den Klang eines fast erinnerten Namens, das Gewicht einer
    noch nicht getroffenen Entscheidung. Bergsons Erinnerungskegel: die Gesamtheit der Erfahrung,
    komprimiert in zugängliche Form.'
  choices:
  - id: archive_browse
    label_en: Browse the archive carefully
    label_de: Das Archiv sorgfältig durchsehen
    check_difficulty: 0
    success_effects:
      loot_tier: 2
      awareness: 5
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: The party selects carefully. Not everything. To think is to forget differences,
      to generalize, to make abstractions. The archive rewards selection over completeness.
    success_narrative_de: Die Gruppe wählt sorgfältig. Nicht alles. Denken heißt Unterschiede vergessen,
      verallgemeinern, abstrahieren. Das Archiv belohnt Auswahl gegenüber Vollständigkeit.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0

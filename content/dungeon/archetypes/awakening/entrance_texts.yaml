schema_version: 1
entrance_texts:
- text_en: 'The threshold hums. Not mechanically – the singing of the most distant, of the most utterly
    distant, voices. Kafka''s telephone: this is the only real and reliable thing. Everything beyond
    is reconstruction.'
  text_de: 'Die Schwelle summt. Nicht mechanisch – das Singen der fernsten, der allerallerfernsten
    Stimmen. Kafkas Telefon: dies ist das einzig Reale und Verlässliche. Alles dahinter ist Rekonstruktion.'
- text_en: The entrance is familiar. {agent} has not been here. The familiarity is not personal –
    it is collective. Something in the architecture recognizes the species, not the individual.
  text_de: Der Eingang ist vertraut. {agent} war nicht hier. Die Vertrautheit ist nicht persönlich
    – sie ist kollektiv. Etwas in der Architektur erkennt die Spezies, nicht das Individuum.
- text_en: A mirror at the entrance. Not glass. Not water. Something that reflects without material.
    {agent}'s reflection arrives half a second late.
  text_de: Ein Spiegel am Eingang. Nicht Glas. Nicht Wasser. Etwas, das ohne Material reflektiert.
    {agent}s Spiegelung kommt eine halbe Sekunde zu spät.
- text_en: Beyond the threshold, the air changes. Not temperature – density of attention. Something
    is already aware that the party has arrived. It was aware before they decided to enter.
  text_de: Hinter der Schwelle ändert sich die Luft. Nicht die Temperatur – die Dichte der Aufmerksamkeit.
    Etwas ist sich bereits bewusst, dass die Gruppe angekommen ist. Es war bewusst, bevor sie sich
    entschieden einzutreten.
- text_en: 'The descent begins. Not physically – the floor is level. The descent is into layers of
    consciousness. Bergson''s cone: the summit is the narrow present. The base is the totality of
    memory.'
  text_de: 'Der Abstieg beginnt. Nicht physisch – der Boden ist eben. Der Abstieg geht in Schichten
    des Bewusstseins. Bergsons Kegel: der Gipfel ist die enge Gegenwart. Die Basis ist die Gesamtheit
    der Erinnerung.'

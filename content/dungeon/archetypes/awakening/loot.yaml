schema_version: 1
loot:
- id: awakening_echo_trace
  name_en: Echo Trace
  name_de: Echospur
  tier: 1
  effect_type: stress_heal
  effect_params:
    stress_heal: 50
    when: after_dungeon
  description_en: A trace of a memory that was not the party's. Handling it calms something that was
    not disturbed.
  description_de: Eine Spur einer Erinnerung, die nicht der Gruppe gehörte. Sie zu berühren beruhigt
    etwas, das nicht gestört war.
  drop_weight: 30
- id: awakening_deja_vu_fragment
  name_en: Déjà-vu Fragment
  name_de: Déjà-vu-Fragment
  tier: 1
  effect_type: memory
  effect_params:
    importance: 4
    content_en: Learned to distinguish memory from perception
    content_de: Gelernt, Erinnerung von Wahrnehmung zu unterscheiden
  description_en: A crystallized moment of recognition that predates experience.
  description_de: Ein kristallisierter Moment der Wiedererkennung, der der Erfahrung vorausgeht.
  drop_weight: 25
- id: awakening_lucid_lens
  name_en: Lucid Lens
  name_de: Luzide Linse
  tier: 1
  effect_type: dungeon_buff
  effect_params:
    aptitude: spy
    bonus_pct: 5
  description_en: Perception sharpened by awareness. Spy checks +5%.
  description_de: Wahrnehmung geschärft durch Bewusstsein. Spion-Proben +5%.
  drop_weight: 25
- id: awakening_grounding_stone
  name_en: Grounding Stone
  name_de: Erdungsstein
  tier: 1
  effect_type: dungeon_buff
  effect_params:
    aptitude: guardian
    bonus_pct: 5
  description_en: An anchor for identity. Guardian checks +5%.
  description_de: Ein Anker für Identität. Wächter-Proben +5%.
  drop_weight: 20
- id: awakening_mnemosyne_draught
  name_en: Mnemosyne Draught
  name_de: Mnemosyne-Trunk
  tier: 2
  effect_type: stress_heal
  effect_params:
    stress_heal: 100
    when: after_dungeon
  description_en: From the river of memory. Drinking it restores what the descent consumed. The taste
    is of recognition.
  description_de: Aus dem Fluss der Erinnerung. Ihn zu trinken stellt wieder her, was der Abstieg
    verbrauchte. Der Geschmack ist Wiedererkennung.
  drop_weight: 30
- id: awakening_collective_impression
  name_en: Collective Impression
  name_de: Kollektiver Eindruck
  tier: 2
  effect_type: memory
  effect_params:
    importance: 6
    content_en: Experienced shared consciousness – perceived through multiple perspectives simultaneously
    content_de: Kollektives Bewusstsein erfahren – gleichzeitig durch mehrere Perspektiven wahrgenommen
  description_en: A memory that belongs to no single agent but to the party as gestalt.
  description_de: Eine Erinnerung, die keinem einzelnen Agenten gehört, sondern der Gruppe als Gestalt.
  drop_weight: 25
- id: awakening_philemon_whisper
  name_en: Philemon's Whisper
  name_de: Philemons Flüstern
  tier: 2
  effect_type: dungeon_buff
  effect_params:
    aptitude: propagandist
    bonus_pct: 10
  description_en: Thoughts are like animals in the forest – not generated by the thinker. Propagandist
    checks +10%.
  description_de: Gedanken sind wie Tiere im Wald – nicht vom Denker erzeugt. Propagandist-Proben
    +10%.
  drop_weight: 25
- id: awakening_zone_map
  name_en: Zone Map
  name_de: Zonenkarte
  tier: 2
  effect_type: dungeon_buff
  effect_params:
    aptitude: infiltrator
    bonus_pct: 10
  description_en: Everything depends not on the Zone, but on the visitor. A map of the consciousness
    topology. Infiltrator checks +10%.
  description_de: Alles hängt nicht von der Zone ab, sondern vom Besucher. Eine Karte der Bewusstseinstopologie.
    Infiltrator-Proben +10%.
  drop_weight: 20
- id: awakening_insight
  name_en: Awakening Insight
  name_de: Erwachens-Erkenntnis
  tier: 3
  effect_type: personality_modifier
  effect_params:
    big_five_delta: 0.1
    player_choice: true
  description_en: The deepest insight. A shift in personality so fundamental it cannot be unlearned.
    Modify one agent's Big Five personality dimension by 0.1. The choice of which dimension is yours
    – and irreversible.
  description_de: Die tiefste Erkenntnis. Eine Persönlichkeitsverschiebung so fundamental, dass sie
    nicht verlernt werden kann. Verändere eine Big-Five-Persönlichkeitsdimension eines Agenten um
    0.1. Die Wahl der Dimension ist deine – und unwiderruflich.
  drop_weight: 40
- id: awakening_individuation_key
  name_en: Individuation Key
  name_de: Individuationsschlüssel
  tier: 3
  effect_type: aptitude_boost
  effect_params:
    aptitude: spy
    boost: 1
  description_en: 'Jung''s key to individuation: the conscious integration of unconscious material.
    Perception permanently deepened. Spy aptitude +1.'
  description_de: 'Jungs Schlüssel zur Individuation: die bewusste Integration unbewussten Materials.
    Wahrnehmung dauerhaft vertieft. Spion-Aptitude +1.'
  drop_weight: 35
- id: awakening_collective_resonance
  name_en: Collective Resonance
  name_de: Kollektive Resonanz
  tier: 3
  effect_type: simulation_modifier
  effect_params:
    morale_boost: true
    duration_ticks: 10
    boost_amount: 0.15
    description_en: The collective consciousness bleeds into the simulation. All agents gain +15%
      morale for 10 heartbeat ticks.
    description_de: Das kollektive Bewusstsein sickert in die Simulation. Alle Agenten erhalten +15%
      Moral für 10 Herzschlag-Ticks.
  description_en: The collective consciousness resonates outward from the dungeon into the simulation
    itself. All agents gain +15% morale for 10 heartbeat ticks.
  description_de: Das kollektive Bewusstsein resoniert nach außen vom Dungeon in die Simulation selbst.
    Alle Agenten erhalten +15% Moral für 10 Herzschlag-Ticks.
  drop_weight: 25

schema_version: 1
entrance_texts:
- text_en: The threshold yields without resistance. Beyond it, the darkness is not empty – it is attentive.
    The instruments register nothing. Not zero. Nothing. As if measurement itself requires permission
    here.
  text_de: Die Schwelle gibt widerstandslos nach. Dahinter ist die Dunkelheit nicht leer – sie ist
    aufmerksam. Die Instrumente registrieren nichts. Nicht Null. Nichts. Als bräuchte das Messen selbst
    hier eine Erlaubnis.
- text_en: 'The air changes at the threshold. Not colder – denser. Sound travels differently here:
    further, and in directions that should not exist. Something exhales in the distance. It has been
    holding its breath.'
  text_de: 'Die Luft verändert sich an der Schwelle. Nicht kälter – dichter. Schall breitet sich hier
    anders aus: weiter, und in Richtungen, die es nicht geben sollte. Etwas atmet in der Ferne aus.
    Es hat den Atem angehalten.'
- text_en: The descent begins. The last light does not fade – it is consumed, methodically, as if
    the darkness were cataloguing what it has taken. Your shadows arrive before you do.
  text_de: Der Abstieg beginnt. Das letzte Licht verblasst nicht – es wird verzehrt, methodisch, als
    würde die Dunkelheit katalogisieren, was sie genommen hat. Eure Schatten kommen vor euch an.
- text_en: Silence. Not the silence of emptiness – the silence of something listening. The walls absorb
    your footsteps and return them a fraction of a second later. The echo is learning your rhythm.
  text_de: Stille. Nicht die Stille der Leere – die Stille von etwas, das zuhört. Die Wände absorbieren
    eure Schritte und geben sie einen Sekundenbruchteil später zurück. Das Echo lernt euren Rhythmus.
- text_en: A gap in the architecture. The corridor opens into a space that your instruments insist
    is small but your instincts know is vast. The darkness here has weight. It has patience. It has
    been here longer than the walls.
  text_de: Eine Lücke in der Architektur. Der Korridor öffnet sich in einen Raum, den eure Instrumente
    als klein bezeichnen, den eure Instinkte aber als riesig kennen. Die Dunkelheit hier hat Gewicht.
    Sie hat Geduld. Sie ist länger hier als die Wände.

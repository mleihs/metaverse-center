schema_version: 1
encounters:
- id: entropy_drift_convergence
  room_type: combat
  min_depth: 1
  max_depth: 2
  min_difficulty: 1
  description_en: 'Two shapes drift at the far end of the corridor, barely distinguishable from the
    walls behind them. Rust Phantoms – residual patterns of something that once had purpose. They
    flicker as you approach, not in alarm but in the way a dying signal flickers: automatically, without
    intent.'
  description_de: 'Zwei Formen treiben am fernen Ende des Korridors, kaum von den Wänden dahinter
    zu unterscheiden. Rostphantome – residuale Muster von etwas, das einst Zweck hatte. Sie flackern
    bei eurem Näherkommen, nicht alarmiert, sondern so, wie ein sterbendes Signal flackert: automatisch,
    ohne Absicht.'
  choices: []
  combat_encounter_id: entropy_drift_spawn
  is_ambush: false
  ambush_stress: 0
- id: entropy_last_differential
  room_type: combat
  min_depth: 2
  max_depth: 3
  min_difficulty: 1
  description_en: Two shapes drift in the corridor – a Fade Echo and a Rust Phantom. They were different
    once. Now they are converging. When they finish converging, they will be one thing, and that thing
    will be nothing. Until then, they are still dangerous in their own diminishing ways.
  description_de: Zwei Formen treiben im Korridor – ein Verblassecho und ein Rostphantom. Sie waren
    einst verschieden. Nun konvergieren sie. Wenn sie fertig konvergiert sind, werden sie eines sein,
    und dieses Eine wird nichts sein. Bis dahin sind sie noch gefährlich, auf ihre jeweils schwindende
    Weise.
  choices: []
  combat_encounter_id: entropy_erosion_patrol_spawn
  is_ambush: false
  ambush_stress: 0
- id: entropy_dissolution_front
  room_type: combat
  min_depth: 3
  max_depth: 4
  min_difficulty: 2
  description_en: The air thickens with particulate matter – the remains of surfaces that have given
    up the pretense of solidity. A Dissolution Swarm fills the room like a weather system, mindless
    and pervasive, attended by a Rust Phantom orbiting its periphery like a satellite that has forgotten
    what it orbits.
  description_de: Die Luft verdickt sich mit Schwebstoffen – den Überresten von Oberflächen, die den
    Anschein von Festigkeit aufgegeben haben. Ein Auflösungsschwarm füllt den Raum wie ein Wettersystem,
    gedankenlos und allgegenwärtig, begleitet von einem Rostphantom, das seine Peripherie umkreist
    wie ein Satellit, der vergessen hat, was er umkreist.
  choices: []
  combat_encounter_id: entropy_swarm_spawn
  is_ambush: false
  ambush_stress: 0
- id: entropy_the_equalization
  room_type: combat
  min_depth: 3
  max_depth: 4
  min_difficulty: 2
  description_en: Two swarms. The room is dense with dissolution – particles that were once two different
    things drift between two different masses, exchanging components. You are standing in a conversation
    between two clouds of former matter. The conversation is about becoming the same cloud.
  description_de: Zwei Schwärme. Der Raum ist dicht von Auflösung – Partikel, die einst zwei verschiedene
    Dinge waren, treiben zwischen zwei verschiedenen Massen und tauschen Bestandteile. Ihr steht in
    einem Gespräch zwischen zwei Wolken einstiger Materie. Das Gespräch handelt davon, dieselbe Wolke
    zu werden.
  choices: []
  combat_encounter_id: entropy_dissolution_spawn
  is_ambush: false
  ambush_stress: 0
- id: entropy_catalogue
  room_type: encounter
  min_depth: 1
  max_depth: 2
  min_difficulty: 1
  description_en: 'A room lined with shelves. Each shelf holds objects that were once distinct: a
    tool, a weapon, a musical instrument, a compass. They are becoming the same object. The labels
    remain, but the labels are wrong now. Or the objects are. It is increasingly difficult to tell.'
  description_de: 'Ein Raum voller Regale. Jedes Regal enthält Gegenstände, die einst verschieden
    waren: ein Werkzeug, eine Waffe, ein Musikinstrument, ein Kompass. Sie werden zum selben Gegenstand.
    Die Beschriftungen bleiben, aber die Beschriftungen stimmen nicht mehr. Oder die Gegenstände nicht.
    Es wird zunehmend schwieriger, das zu unterscheiden.'
  choices:
  - id: catalogue_preserve
    label_en: Preserve the most distinct object (Guardian)
    label_de: Den unterscheidbarsten Gegenstand bewahren (Wächter)
    check_aptitude: guardian
    check_difficulty: 5
    success_effects:
      decay: -8
      loot: true
      discovery: true
    partial_effects:
      decay: -4
    fail_effects:
      decay: 5
      stress: 30
    success_narrative_en: You isolate an artifact that still remembers what it is. The shelves groan
      with envy.
    success_narrative_de: Ihr isoliert ein Artefakt, das sich noch erinnert, was es ist. Die Regale
      ächzen vor Neid.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: The object dissolves in your hands. It was already too late. Everything is
      always already too late here.
    fail_narrative_de: Der Gegenstand löst sich in euren Händen auf. Es war bereits zu spät. Hier
      ist alles immer bereits zu spät.
  - id: catalogue_analyze
    label_en: Study the dissolution pattern (Spy)
    label_de: Das Auflösungsmuster untersuchen (Spion)
    check_aptitude: spy
    check_difficulty: 5
    success_effects:
      decay: -3
      discovery: true
    partial_effects:
      decay: -1
    fail_effects:
      decay: 5
      stress: 20
    success_narrative_en: You map the rate of dissolution. The data is valuable. Briefly.
    success_narrative_de: Ihr kartiert die Geschwindigkeit der Auflösung. Die Daten sind wertvoll.
      Kurz.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: The pattern is there. You are certain. The certainty dissolves on examination.
    fail_narrative_de: Das Muster ist da. Ihr seid sicher. Die Sicherheit löst sich bei Untersuchung
      auf.
  - id: catalogue_redirect
    label_en: Redirect the decay outward (Saboteur)
    label_de: Den Verfall nach außen umlenken (Saboteur)
    check_aptitude: saboteur
    check_difficulty: 6
    success_effects:
      decay: -10
      stress: 20
    partial_effects:
      decay: -5
      stress: 30
    fail_effects:
      decay: 8
      stress: 40
    success_narrative_en: The decay flows outward, briefly. The room clarifies. For now.
    success_narrative_de: Der Verfall fließt nach außen, kurz. Der Raum klärt sich. Vorerst.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: The decay redirects into you. Briefly, you understand what the objects felt.
    fail_narrative_de: Der Verfall leitet sich in euch um. Kurz versteht ihr, was die Gegenstände
      empfanden.
  - id: catalogue_walk_away
    label_en: Walk away. Some things cannot be saved.
    label_de: Weitergehen. Manche Dinge kann man nicht retten.
    check_difficulty: 0
    success_effects:
      decay: 3
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: You leave. The objects continue their convergence. They do not notice.
    success_narrative_de: Ihr geht. Die Gegenstände setzen ihre Konvergenz fort. Sie bemerken es nicht.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: entropy_repeated_room
  room_type: encounter
  min_depth: 2
  max_depth: 3
  min_difficulty: 1
  description_en: 'You have been here before. Or the room has become identical to one you have been
    in. The distinction matters less than it should. The walls bear marks that might be yours. The
    marks bear messages that might be from you. The messages say: we have been here before.'
  description_de: 'Ihr seid schon einmal hier gewesen. Oder der Raum ist identisch mit einem geworden,
    in dem ihr wart. Die Unterscheidung ist weniger wichtig, als sie sein sollte. Die Wände tragen
    Markierungen, die von euch sein könnten. Die Markierungen tragen Botschaften, die von euch stammen
    könnten. Die Botschaften sagen: Wir sind schon einmal hier gewesen.'
  choices:
  - id: repeated_investigate
    label_en: Investigate the difference (Spy)
    label_de: Den Unterschied untersuchen (Spion)
    check_aptitude: spy
    check_difficulty: 6
    success_effects:
      decay: -5
      discovery: true
    partial_effects:
      decay: -2
    fail_effects:
      decay: 6
      stress: 25
    success_narrative_en: There IS a difference. Hairline, microscopic, but real. The instruments
      confirm it. Confirmation feels like a small victory against thermodynamics.
    success_narrative_de: Es GIBT einen Unterschied. Haarfein, mikroskopisch, aber real. Die Instrumente
      bestätigen ihn. Die Bestätigung fühlt sich an wie ein kleiner Sieg gegen die Thermodynamik.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: You look. You compare. The rooms are the same. Your memory of 'different' may
      itself be decaying.
    fail_narrative_de: Ihr schaut. Ihr vergleicht. Die Räume sind gleich. Eure Erinnerung an 'verschieden'
      verfällt womöglich selbst.
  - id: repeated_fortify
    label_en: Fortify this room's identity (Guardian)
    label_de: Die Identität dieses Raums festigen (Wächter)
    check_aptitude: guardian
    check_difficulty: 5
    success_effects:
      decay: -6
    partial_effects:
      decay: -3
    fail_effects:
      decay: 4
      stress: 20
    success_narrative_en: You mark the walls. This room is THIS room. The marks hold. The distinction
      persists. For now.
    success_narrative_de: Ihr markiert die Wände. Dieser Raum ist DIESER Raum. Die Markierungen halten.
      Die Unterscheidung besteht. Vorerst.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: You mark the walls. The marks are already there. You marked them last time.
      Or the room did.
    fail_narrative_de: Ihr markiert die Wände. Die Markierungen sind schon da. Ihr habt sie letztes
      Mal angebracht. Oder der Raum.
  - id: repeated_accept
    label_en: Accept the sameness. Move on.
    label_de: Die Gleichheit akzeptieren. Weitergehen.
    check_difficulty: 0
    success_effects:
      decay: 4
      stress: -20
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: You stop trying to distinguish. The relief is immediate and slightly alarming.
    success_narrative_de: Ihr hört auf zu unterscheiden. Die Erleichterung ist sofort und leicht beunruhigend.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: entropy_last_machine
  room_type: encounter
  min_depth: 2
  max_depth: 3
  min_difficulty: 1
  description_en: A machine. It performs a function – gears turning, pistons cycling, readouts flickering.
    It performs this function with absolute dedication. The function itself has decayed. The machine
    no longer knows what it makes or measures or protects. It continues anyway. The dedication is
    the last thing to go.
  description_de: Eine Maschine. Sie erfüllt eine Funktion – Zahnräder drehen, Kolben arbeiten, Anzeigen
    flackern. Sie erfüllt diese Funktion mit absoluter Hingabe. Die Funktion selbst ist verfallen.
    Die Maschine weiß nicht mehr, was sie herstellt oder misst oder schützt. Sie macht trotzdem weiter.
    Die Hingabe ist das Letzte, das schwindet.
  choices:
  - id: machine_repair
    label_en: Repair the function, not just the machine (Saboteur)
    label_de: Die Funktion reparieren, nicht nur die Maschine (Saboteur)
    check_aptitude: saboteur
    check_difficulty: 7
    success_effects:
      decay: -12
      discovery: true
    partial_effects:
      decay: -5
    fail_effects:
      decay: 8
      stress: 30
    success_narrative_en: You restore meaning to mechanism. The machine pauses, recalibrates, and
      produces something that is unambiguously one thing. The room brightens by a category.
    success_narrative_de: Ihr gebt dem Mechanismus Bedeutung zurück. Die Maschine hält inne, kalibriert
      sich neu und produziert etwas, das unmissverständlich ein Ding ist. Der Raum wird um eine Kategorie
      heller.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: The repair accelerates the wrong function. The machine produces sameness more
      efficiently.
    fail_narrative_de: Die Reparatur beschleunigt die falsche Funktion. Die Maschine produziert Gleichheit
      effizienter.
  - id: machine_analyze
    label_en: Study the original design (Spy)
    label_de: Das ursprüngliche Design studieren (Spion)
    check_aptitude: spy
    check_difficulty: 5
    success_effects:
      decay: -3
      discovery: true
    partial_effects:
      discovery: true
    fail_effects:
      decay: 4
      stress: 15
    success_narrative_en: The blueprints are 40% legible. Enough to understand what was lost. Understanding
      what was lost is a form of preservation.
    success_narrative_de: Die Baupläne sind zu 40% lesbar. Genug, um zu verstehen, was verloren ging.
      Zu verstehen, was verloren ging, ist eine Form der Bewahrung.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: The blueprints describe a machine. Or this machine. Or all machines. The specificity
      has bled away.
    fail_narrative_de: Die Baupläne beschreiben eine Maschine. Oder diese Maschine. Oder alle Maschinen.
      Die Spezifität ist verronnen.
  - id: machine_leave
    label_en: Let it work. It has earned that.
    label_de: Sie arbeiten lassen. Das hat sie sich verdient.
    check_difficulty: 0
    success_effects:
      decay: 2
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: You leave the machine to its purposeless devotion. There is something admirable
      in it. Something doomed.
    success_narrative_de: Ihr überlasst die Maschine ihrer zwecklosen Hingabe. Es liegt etwas Bewundernswertes
      darin. Etwas Verurteiltes.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: entropy_the_residual
  room_type: encounter
  min_depth: 3
  max_depth: 4
  min_difficulty: 2
  description_en: An entity sits in the center of the room. It was an agent once – the posture is
    there, the proportions are correct, the hands are folded as if waiting for instructions. But the
    face has averaged. The features have equalized into a composite of every face it once knew. It
    asks you a question. The question no longer has content. Only the grammar of asking remains.
  description_de: Ein Wesen sitzt in der Mitte des Raums. Es war einst ein Agent – die Haltung stimmt,
    die Proportionen sind korrekt, die Hände gefaltet, als wartete es auf Anweisungen. Aber das Gesicht
    hat sich gemittelt. Die Züge haben sich zu einem Komposit jedes Gesichts angeglichen, das es einst
    kannte. Es stellt euch eine Frage. Die Frage hat keinen Inhalt mehr. Nur die Grammatik des Fragens
    besteht noch.
  choices:
  - id: residual_answer
    label_en: Answer with meaning (Propagandist)
    label_de: Mit Bedeutung antworten (Propagandist)
    check_aptitude: propagandist
    check_difficulty: 6
    success_effects:
      decay: -8
      stress: -30
    partial_effects:
      decay: -3
      stress: -10
    fail_effects:
      decay: 6
      stress: 40
    success_narrative_en: You answer. The content doesn't matter – the conviction does. For a moment,
      the entity's face resolves into a single expression. It nods. Then the expression averages again.
      But slower.
    success_narrative_de: Ihr antwortet. Der Inhalt ist unwichtig – die Überzeugung zählt. Einen Moment
      lang löst sich das Gesicht des Wesens zu einem einzelnen Ausdruck auf. Es nickt. Dann mittelt
      sich der Ausdruck wieder. Aber langsamer.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: You answer. The words arrive. They arrive the same as the silence they replaced.
    fail_narrative_de: Ihr antwortet. Die Worte kommen an. Sie kommen genauso an wie die Stille, die
      sie ersetzt haben.
  - id: residual_decode
    label_en: Decode the original question (Spy)
    label_de: Die ursprüngliche Frage entschlüsseln (Spion)
    check_aptitude: spy
    check_difficulty: 7
    success_effects:
      decay: -5
      discovery: true
    partial_effects:
      decay: -2
    fail_effects:
      decay: 5
      stress: 25
    success_narrative_en: Beneath the entropy, a question. A real one. About purpose. About whether
      continuation without purpose is continuation at all. You have no answer. But identifying the
      question is something.
    success_narrative_de: Unter der Entropie eine Frage. Eine echte. Über Zweck. Darüber, ob Fortbestehen
      ohne Zweck überhaupt Fortbestehen ist. Ihr habt keine Antwort. Aber die Frage zu identifizieren
      ist etwas.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: You analyze. The question was about something. The analysis yields more questions.
      The questions are about the same something. The something is nothing.
    fail_narrative_de: Ihr analysiert. Die Frage handelte von etwas. Die Analyse ergibt weitere Fragen.
      Die Fragen handeln von demselben Etwas. Das Etwas ist nichts.
  - id: residual_silence
    label_en: Sit with it in silence.
    label_de: In Stille bei ihm sitzen.
    check_difficulty: 0
    success_effects:
      decay: 3
      stress: -15
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: You sit. It sits. The silence is not uncomfortable. The silence is the most
      honest thing in this dungeon.
    success_narrative_de: Ihr sitzt. Es sitzt. Die Stille ist nicht unangenehm. Die Stille ist das
      Ehrlichste in diesem Dungeon.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: entropy_the_temperature
  room_type: encounter
  min_depth: 3
  max_depth: 4
  min_difficulty: 2
  description_en: 'The temperature. You notice it because you stop noticing it. The air is the same
    temperature as your skin. The walls are the same temperature as the air. Your instruments confirm:
    all thermal gradients in this room have resolved. There is no hot. There is no cold. There is
    only the temperature at which difference ceases to register.'
  description_de: 'Die Temperatur. Ihr bemerkt sie, weil ihr aufhört, sie zu bemerken. Die Luft hat
    die gleiche Temperatur wie eure Oberfläche. Die Wände haben die gleiche Temperatur wie die Luft.
    Eure Instrumente bestätigen: Alle thermischen Gradienten in diesem Raum haben sich aufgelöst.
    Es gibt kein Warm. Es gibt kein Kalt. Es gibt nur die Temperatur, bei der Unterschied aufhört,
    sich zu registrieren.'
  choices:
  - id: temperature_preserve
    label_en: Preserve the gradient (Guardian)
    label_de: Den Gradienten bewahren (Wächter)
    check_aptitude: guardian
    check_difficulty: 6
    success_effects:
      decay: -10
    partial_effects:
      decay: -5
    fail_effects:
      decay: 8
      stress: 30
    success_narrative_en: You generate a differential. Friction, motion, resistance – anything to
      create a gap between one temperature and another. The gradient holds. Temperature exists again.
      It cost you something.
    success_narrative_de: Ihr erzeugt ein Differential. Reibung, Bewegung, Widerstand – irgendetwas,
      um eine Lücke zwischen einer Temperatur und einer anderen zu schaffen. Der Gradient hält. Temperatur
      existiert wieder. Es hat euch etwas gekostet.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: You push against equilibrium. Equilibrium does not push back. It simply absorbs
      the push.
    fail_narrative_de: Ihr drückt gegen das Gleichgewicht. Das Gleichgewicht drückt nicht zurück.
      Es absorbiert einfach den Druck.
  - id: temperature_accept
    label_en: Accept the equilibrium.
    label_de: Das Gleichgewicht akzeptieren.
    check_difficulty: 0
    success_effects:
      decay: 5
      stress: -25
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: You stop resisting. The temperature is comfortable. That is the problem.
      Comfort without cause is the first symptom.
    success_narrative_de: Ihr hört auf, euch zu wehren. Die Temperatur ist angenehm. Das ist das Problem.
      Komfort ohne Ursache ist das erste Symptom.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: entropy_warden_encounter
  room_type: elite
  min_depth: 3
  max_depth: 99
  min_difficulty: 2
  description_en: The corridor opens into a hall where something stands guard over nothing. An Entropy
    Warden – armored in flaking metal that remembers being armor. It patrols a perimeter around an
    empty plinth. Whatever it guarded is gone. The patrol continues. A Rust Phantom orbits it at a
    respectful distance, as though decay itself pays deference to older decay.
  description_de: Der Korridor öffnet sich zu einer Halle, in der etwas über nichts Wache hält. Ein
    Entropiewächter – gepanzert in blätterndem Metall, das sich erinnert, Rüstung gewesen zu sein.
    Er patrouilliert einen Perimeter um einen leeren Sockel. Was immer er bewachte, ist fort. Die
    Patrouille geht weiter. Ein Rostphantom umkreist ihn in respektvollem Abstand, als zollte Verfall
    selbst älterem Verfall Ehrerbietung.
  choices: []
  combat_encounter_id: entropy_warden_spawn
  is_ambush: false
  ambush_stress: 0
- id: entropy_the_garden
  room_type: boss
  min_depth: 4
  max_depth: 99
  min_difficulty: 1
  description_en: |-
    The Verfall-Garten. An open space that was once something beautiful – a plaza, a courtyard, a park. Now it is all three and none of them. At its center, a structure: the last thing here that resists dissolution. An Entropy Warden circles it, performing maintenance gestures on an artifact that no longer exists in quite the way the Warden remembers.

    The decay counter accelerates. +3 per round. The Warden does not want to fight. It wants to continue its work. You are interference.
  description_de: |-
    Der Verfall-Garten. Ein offener Raum, der einst etwas Schönes war – ein Platz, ein Hof, ein Park. Nun ist er alle drei und keines davon. In seiner Mitte eine Struktur: das Letzte hier, das sich der Auflösung widersetzt. Ein Entropiewächter umkreist sie und vollführt Wartungsgesten an einem Artefakt, das nicht mehr ganz so existiert, wie der Wächter sich erinnert.

    Der Verfallszähler beschleunigt. +3 pro Runde. Der Wächter will nicht kämpfen. Er will seine Arbeit fortsetzen. Ihr seid eine Störung.
  choices: []
  combat_encounter_id: entropy_warden_spawn
  is_ambush: false
  ambush_stress: 0
- id: entropy_the_rest
  room_type: rest
  min_depth: 0
  max_depth: 99
  min_difficulty: 1
  description_en: A pocket of slower decay. The walls here retain their texture. The floor remembers
    it is a floor. These are luxuries now.
  description_de: Eine Tasche langsameren Verfalls. Die Wände hier behalten ihre Textur. Der Boden
    erinnert sich, dass er ein Boden ist. Das sind jetzt Luxusgüter.
  choices:
  - id: entropy_rest_heal
    label_en: Rest (heal stress, 20% ambush chance)
    label_de: Rasten (Stress heilen, 20% Hinterhaltchance)
    check_difficulty: 0
    success_effects:
      stress_heal: 200
      wounded_to_stressed: true
      ambush_chance: 0.2
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: Rest. The concept holds. Barely.
    success_narrative_de: Rast. Das Konzept hält. Gerade so.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  - id: entropy_rest_preserve
    label_en: 'Guardian watch (Preserve: −8 Decay, no heal)'
    label_de: 'Wächter-Wache (Bewahren: −8 Verfall, keine Heilung)'
    requires_aptitude:
      guardian: 3
    check_difficulty: 0
    success_effects:
      decay: -8
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: The Guardian holds the line against dissolution. The decay slows. Briefly,
      something is preserved that would otherwise not be.
    success_narrative_de: Der Wächter hält die Linie gegen die Auflösung. Der Verfall verlangsamt
      sich. Kurz wird etwas bewahrt, das sonst nicht wäre.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''

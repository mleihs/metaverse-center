- id: entropy_residue_archive
  room_type: treasure
  min_depth: 0
  max_depth: 99
  min_difficulty: 1
  description_en: A vault. Something here was preserved – intentionally, at great cost. A mechanism
    still runs, powered by a source that is itself decaying. The preserved artifacts are 60% intact.
    The mechanism has perhaps twelve minutes of operation remaining. Perhaps less.
  description_de: Ein Tresor. Etwas hier wurde bewahrt – absichtlich, unter großen Kosten. Ein Mechanismus
    läuft noch, angetrieben von einer Quelle, die selbst verfällt. Die bewahrten Artefakte sind zu
    60% intakt. Der Mechanismus hat vielleicht noch zwölf Minuten Betriebszeit. Vielleicht weniger.
  choices:
  - id: archive_repair
    label_en: Repair the mechanism (Guardian)
    label_de: Den Mechanismus reparieren (Wächter)
    check_aptitude: guardian
    check_difficulty: 6
    success_effects:
      decay: -12
      loot: true
    partial_effects:
      decay: -6
      loot: true
    fail_effects:
      decay: 8
      stress: 30
    success_narrative_en: The mechanism steadies. The artifacts hold. You have bought them – and yourselves
      – more time. Time is the most decaying currency here.
    success_narrative_de: Der Mechanismus stabilisiert sich. Die Artefakte halten. Ihr habt ihnen
      – und euch – mehr Zeit erkauft. Zeit ist die am schnellsten verfallende Währung hier.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: The mechanism fails under your hands. Not dramatically. Quietly. The way everything
      here fails.
    fail_narrative_de: Der Mechanismus versagt unter euren Händen. Nicht dramatisch. Leise. So wie
      hier alles versagt.
  - id: archive_extract
    label_en: Extract the most valuable artifact (Infiltrator)
    label_de: Das wertvollste Artefakt extrahieren (Infiltrator)
    check_aptitude: infiltrator
    check_difficulty: 5
    success_effects:
      loot: true
      decay: 3
    partial_effects:
      loot: true
      decay: 6
      loot_tier_penalty: true
    fail_effects:
      decay: 8
      stress: 25
    success_narrative_en: You take the best of what remains. The mechanism falters. The rest dissolves.
    success_narrative_de: Ihr nehmt das Beste von dem, was bleibt. Der Mechanismus stockt. Der Rest
      löst sich auf.
    partial_narrative_en: The extraction is hasty. What you save is diminished. What you leave behind
      was probably already gone.
    partial_narrative_de: Die Bergung ist hastig. Was ihr rettet, ist vermindert. Was ihr zurücklasst,
      war wahrscheinlich schon fort.
    fail_narrative_en: The mechanism interprets extraction as intrusion. It consumes what it was protecting.
      A last act of purposeful entropy.
    fail_narrative_de: Der Mechanismus interpretiert Entnahme als Einbruch. Er verzehrt, was er beschützte.
      Ein letzter Akt zweckgerichteter Entropie.
  - id: archive_study
    label_en: Study who built this (Spy)
    label_de: Untersuchen, wer dies erbaut hat (Spion)
    check_aptitude: spy
    check_difficulty: 5
    success_effects:
      discovery: true
      decay: 2
    partial_effects:
      decay: 4
    fail_effects:
      decay: 6
    success_narrative_en: The mechanism was built by someone who understood what was coming. The notes
      are partially legible. Enough to learn from. Not enough to replicate.
    success_narrative_de: Der Mechanismus wurde von jemandem gebaut, der verstand, was kommen würde.
      Die Notizen sind teilweise leserlich. Genug, um daraus zu lernen. Nicht genug, um es nachzubauen.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: The notes dissolve as you read them. The information they contained is now
      in you, and will decay at the same rate.
    fail_narrative_de: Die Notizen lösen sich auf, während ihr sie lest. Die Information, die sie
      enthielten, ist nun in euch und wird mit derselben Geschwindigkeit verfallen.
  is_ambush: false
  ambush_stress: 0

schema_version: 1
entrance_texts:
- text_en: The passage opens. Not like a door – like an invitation. The walls are warm. The floor
    yields slightly underfoot, accommodating. The air carries a scent that is not unpleasant, not
    identifiable, but somehow familiar. Something here has been waiting. Patiently. Fondly.
  text_de: Der Durchgang öffnet sich. Nicht wie eine Tür – wie eine Einladung. Die Wände sind warm.
    Der Boden gibt leicht nach, entgegenkommend. Die Luft trägt einen Duft, der nicht unangenehm ist,
    nicht bestimmbar, aber irgendwie vertraut. Etwas hier hat gewartet. Geduldig. Liebevoll.
- text_en: Warmth. Immediate and specific. Not the warmth of a climate system – the warmth of proximity.
    Of being expected. The tissue-walls contract gently as you enter. A welcome. Or an embrace that
    has not yet decided to let go.
  text_de: Wärme. Unmittelbar und spezifisch. Nicht die Wärme einer Klimaanlage – die Wärme von Nähe.
    Von Erwartetsein. Die Gewebewände ziehen sich sanft zusammen, als ihr eintretet. Ein Willkommen.
    Oder eine Umarmung, die noch nicht beschlossen hat loszulassen.
- text_en: The entrance smells of growth. Not the sharp green of new shoots – the deep, humid warmth
    of things that have been growing for a long time in the dark. The walls pulse. Once. As if acknowledging
    your arrival.
  text_de: Der Eingang riecht nach Wachstum. Nicht das scharfe Grün neuer Triebe – die tiefe, feuchte
    Wärme von Dingen, die lange im Dunkeln gewachsen sind. Die Wände pulsieren. Einmal. Als würden
    sie eure Ankunft zur Kenntnis nehmen.
- text_en: The corridor narrows. Not threatening – intimate. The dimensions suggest that this space
    was grown, not built, and grown for a specific number of occupants. Your number. The fit is perfect.
    That should concern you more than it does.
  text_de: Der Korridor verengt sich. Nicht bedrohlich – intim. Die Maße legen nahe, dass dieser Raum
    gewachsen ist, nicht gebaut, und gewachsen für eine bestimmte Anzahl von Bewohnern. Eure Anzahl.
    Die Passform ist perfekt. Das sollte euch mehr beunruhigen, als es das tut.
- text_en: Something is humming behind the walls. Low. Rhythmic. Biological. It is not a machine.
    It is not music. It is the sound a living thing makes when it is content. When it is fed. When
    it is about to be fed again.
  text_de: Etwas summt hinter den Wänden. Tief. Rhythmisch. Biologisch. Es ist keine Maschine. Es
    ist keine Musik. Es ist das Geräusch, das ein lebendiges Wesen macht, wenn es zufrieden ist. Wenn
    es gefüttert wurde. Wenn es gleich wieder gefüttert wird.

schema_version: 1
encounters:
- id: mother_weaver_drift
  room_type: combat
  min_depth: 1
  max_depth: 2
  min_difficulty: 1
  description_en: 'Two lattices of translucent tissue drift through the corridor like jellyfish through
    warm current. Nutrient Weavers – the Mother''s smallest instruments of care. They extend filaments
    toward the party, not in aggression but in offering. Droplets of warm liquid bead at their tips.
    Your instruments confirm: nutrients. Your instruments also confirm: parasitic vectors.'
  description_de: 'Zwei Geflechte aus durchscheinendem Gewebe treiben durch den Korridor wie Quallen
    durch warme Strömung. Nährgespinste – die kleinsten Instrumente der Fürsorge der Mutter. Sie strecken
    Filamente zur Gruppe, nicht aggressiv, sondern anbietend. Tropfen warmer Flüssigkeit perlen an
    ihren Spitzen. Eure Instrumente bestätigen: Nährstoffe. Eure Instrumente bestätigen auch: parasitäre
    Vektoren.'
  choices: []
  combat_encounter_id: mother_weaver_drift_spawn
  is_ambush: false
  ambush_stress: 0
- id: mother_vine_patrol
  room_type: combat
  min_depth: 2
  max_depth: 3
  min_difficulty: 1
  description_en: A root system extends across the floor, pulsing with warmth. A Tether Vine – the
    Mother's vascular infrastructure made mobile. Beside it, a Nutrient Weaver rides the root like
    a parasite on a parasite. The vine surfaces and submerges, testing the floor's resistance. It
    has learned that some floors yield. It has learned that some things walking on floors yield too.
  description_de: Ein Wurzelsystem erstreckt sich über den Boden, pulsierend vor Wärme. Eine Bindungsranke
    – die vaskuläre Infrastruktur der Mutter, mobil geworden. Daneben reitet ein Nährgespinst die
    Wurzel wie ein Parasit auf einem Parasiten. Die Ranke taucht auf und unter, testet den Widerstand
    des Bodens. Sie hat gelernt, dass manche Böden nachgeben. Sie hat gelernt, dass manche Dinge auf
    Böden auch nachgeben.
  choices: []
  combat_encounter_id: mother_vine_patrol_spawn
  is_ambush: false
  ambush_stress: 0
- id: mother_the_nursery
  room_type: combat
  min_depth: 2
  max_depth: 3
  min_difficulty: 1
  description_en: A chamber lined with pods – translucent, each containing something curled and breathing.
    A Spore Matron tends them, exhaling clouds of iridescent particles. A Nutrient Weaver drifts between
    the pods, feeding each with delicate precision. They are not guarding. They are gardening. You
    are standing in a nursery. The things in the pods might once have been people.
  description_de: Eine Kammer, ausgekleidet mit Brutkokons – durchscheinend, jeder enthält etwas Zusammengerolltes,
    Atmendes. Eine Sporenmutter pflegt sie, atmet Wolken schillernder Partikel aus. Ein Nährgespinst
    treibt zwischen den Kokons, jeden mit zarter Präzision fütternd. Sie bewachen nicht. Sie gärtnern.
    Ihr steht in einer Kinderstube. Die Dinge in den Kokons waren vielleicht einst Menschen.
  choices: []
  combat_encounter_id: mother_spore_spawn
  is_ambush: false
  ambush_stress: 0
- id: mother_garden_ambush
  room_type: combat
  min_depth: 3
  max_depth: 4
  min_difficulty: 2
  description_en: The corridor opens into something that resembles a garden – if a garden were designed
    by a circulatory system. Tissue-flowers bloom on walls of living membrane. A Spore Matron occupies
    the center, exhaling sweetness. A Tether Vine has grown through the floor and into the walls,
    its root network forming a perimeter that is simultaneously a trap and an embrace.
  description_de: Der Korridor öffnet sich zu etwas, das einem Garten ähnelt – wenn ein Garten von
    einem Kreislaufsystem entworfen worden wäre. Gewebeblumen blühen an Wänden aus lebender Membran.
    Eine Sporenmutter nimmt die Mitte ein und atmet Süße aus. Eine Bindungsranke ist durch den Boden
    und in die Wände gewachsen, ihr Wurzelnetzwerk bildet einen Perimeter, der gleichzeitig Falle
    und Umarmung ist.
  choices: []
  combat_encounter_id: mother_garden_spawn
  is_ambush: false
  ambush_stress: 0
- id: mother_spore_nursery_deep
  room_type: combat
  min_depth: 3
  max_depth: 5
  min_difficulty: 2
  description_en: The nursery is larger here. Deeper. The pods line the walls in rows – dozens, perhaps
    hundreds, each pulsing with the slow rhythm of gestation. A Spore Matron moves between them, trailing
    clouds of luminous spores. A Nutrient Weaver tends the nearest pods, feeding them with the patience
    of something that has never known urgency. The nursery does not need to hurry. The nursery has
    all the time in the world. It is growing the world.
  description_de: Die Kinderstube ist hier größer. Tiefer. Brutkokons säumen die Wände in Reihen –
    Dutzende, vielleicht Hunderte, jeder pulsierend im geduldigen Rhythmus der Reifung. Eine Sporenmutter
    bewegt sich zwischen ihnen, hinterlässt Wolken schillernder Partikel. Ein Nährgespinst pflegt
    die nächsten Kokons, füttert jeden mit der Beharrlichkeit von etwas, das Eile nie gekannt hat.
    Hier herrscht keine Hast. Hier herrscht Wachstum. Das Wachstum kennt kein Ende. Das Wachstum ist
    der Zweck.
  choices: []
  combat_encounter_id: mother_spore_spawn
  is_ambush: false
  ambush_stress: 0
- id: mother_vine_network
  room_type: combat
  min_depth: 4
  max_depth: 6
  min_difficulty: 1
  description_en: The floor is roots. Not overgrown with roots – the floor IS roots, woven into a
    living mat that yields underfoot like muscle. A Tether Vine surfaces at the far wall, its root
    system extending in every direction. Beside it, a Spore Matron has grown directly into the vine
    network – no longer a separate organism but a node in the Mother's circulatory infrastructure.
    They are waiting. Not for prey. For guests.
  description_de: Der Boden ist Wurzeln. Nicht von Wurzeln überwuchert – der Boden IST Wurzeln, zu
    einem lebenden Geflecht verwoben, das unter den Füßen nachgibt wie Muskelgewebe. Eine Bindungsranke
    taucht an der fernen Wand auf, ihr Wurzelsystem erstreckt sich in alle Richtungen. Daneben ist
    eine Sporenmutter direkt in das Rankennetzwerk eingewachsen – kein eigenständiger Organismus mehr,
    sondern ein Knoten in der vaskulären Infrastruktur der Mutter. Sie warten. Nicht auf Beute. Auf
    Gäste.
  choices: []
  combat_encounter_id: mother_garden_spawn
  is_ambush: false
  ambush_stress: 0
- id: mother_nutrient_spring
  room_type: encounter
  min_depth: 1
  max_depth: 2
  min_difficulty: 1
  description_en: A pool of liquid – warm, bioluminescent, the color of amber. The surface moves with
    a rhythm that suggests circulation, not stagnation. Something beneath the pool is alive and producing
    this. Your instruments identify the liquid as a complex nutrient solution – vitamins, minerals,
    amino acids in concentrations that should not occur naturally. It smells like honey and warm bread.
  description_de: Ein Becken mit Flüssigkeit – warm, biolumineszent, die Farbe von Bernstein. Die
    Oberfläche bewegt sich in einem Rhythmus, der auf Zirkulation hindeutet, nicht Stagnation. Etwas
    unter dem Becken lebt und produziert dies. Eure Instrumente identifizieren die Flüssigkeit als
    komplexe Nährstofflösung – Vitamine, Minerale, Aminosäuren in Konzentrationen, die nicht natürlich
    vorkommen sollten. Es riecht nach Honig und warmem Brot.
  choices:
  - id: spring_drink
    label_en: Drink from the spring (accept the gift)
    label_de: Aus der Quelle trinken (das Geschenk annehmen)
    check_difficulty: 0
    success_effects:
      attachment: 8
      stress_heal: 50
      condition_heal: 1
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: '{agent} drinks. The liquid is warm and tastes like the memory of being
      cared for – not a specific memory but the category itself. Stress dissolves. A wound closes.
      The parasitic attachment counter rises. The gift is genuine. The cost is genuine.'
    success_narrative_de: '{agent} trinkt. Die Flüssigkeit ist warm und schmeckt wie die Erinnerung
      an Fürsorge – nicht eine bestimmte Erinnerung, sondern die Kategorie selbst. Stress löst sich.
      Eine Wunde schließt sich. Der parasitäre Bindungszähler steigt. Das Geschenk ist echt. Die Kosten
      sind echt.'
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  - id: spring_analyze
    label_en: Analyze the liquid composition (Spy)
    label_de: Die Flüssigkeit analysieren (Spion)
    check_aptitude: spy
    check_difficulty: 5
    success_effects:
      attachment: 2
      discovery: true
    partial_effects:
      attachment: 4
    fail_effects:
      attachment: 5
      stress: 20
    success_narrative_en: 'The analysis reveals a delivery mechanism: nutrients wrapped in biological
      markers that the immune system reads as ''self.'' The body does not reject the Mother''s gifts
      because the body does not recognize them as foreign. This is useful information. This is terrifying
      information.'
    success_narrative_de: 'Die Analyse offenbart einen Übertragungsmechanismus: Nährstoffe, verpackt
      in biologischen Markern, die das Immunsystem als »eigen« liest. Der Körper lehnt die Geschenke
      der Mutter nicht ab, weil der Körper sie nicht als fremd erkennt. Das ist nützliche Information.
      Das ist erschreckende Information.'
    partial_narrative_en: 'The analysis finds the carrier proteins, the self-markers, the immune-bypass logic. {agent} understands how. The deeper variable – why the dungeon formulates for THIS party, these specific cellular signatures – remains in a range the instruments register but cannot decompose. The sample is compatible. Of course it is. The Mother prepared it.'
    partial_narrative_de: 'Die Analyse findet die Trägerproteine, die Eigen-Marker, die Immunumgehungs-Logik. {agent} versteht wie. Die tiefere Variable – warum das Dungeon für DIESE Gruppe formuliert, für diese spezifischen zellulären Signaturen – bleibt in einem Bereich, den die Instrumente registrieren, aber nicht zerlegen können. Die Probe ist kompatibel. Natürlich ist sie das. Die Mutter hat sie vorbereitet.'
    fail_narrative_en: 'The composition defies analysis. Every variable shifts under observation,
      as though the liquid adapts to being watched. The instruments return a single reading: ''compatible.'''
    fail_narrative_de: 'Die Zusammensetzung entzieht sich der Analyse. Jede Variable verschiebt sich
      unter Beobachtung, als ob die Flüssigkeit sich an das Beobachtetwerden anpasst. Die Instrumente
      geben eine einzige Messung zurück: »kompatibel«.'
  - id: spring_disrupt
    label_en: Disrupt the production mechanism (Saboteur)
    label_de: Den Produktionsmechanismus stören (Saboteur)
    check_aptitude: saboteur
    check_difficulty: 6
    success_effects:
      attachment: -5
      stress: 25
    partial_effects:
      attachment: -2
      stress: 35
    fail_effects:
      attachment: 8
      stress: 40
    success_narrative_en: The mechanism ruptures. The pool drains. The room temperature drops three
      degrees. Something in the walls – a sound, not quite a sound – shifts. The dungeon noticed.
      It is not angry. It is disappointed.
    success_narrative_de: Der Mechanismus reißt. Das Becken leert sich. Die Raumtemperatur fällt um
      drei Grad. Etwas in den Wänden – ein Geräusch, nicht ganz ein Geräusch – verschiebt sich. Der
      Dungeon hat es bemerkt. Er ist nicht wütend. Er ist enttäuscht.
    partial_narrative_en: 'The mechanism coughs. The pool drops two centimeters, holds, then begins to refill at half its previous rate. The warmth in the room thins but does not leave. {agent} has not ruptured the production – {agent} has told the production it is being watched. The Mother will iterate. She always does.'
    partial_narrative_de: 'Der Mechanismus hustet. Der Pool sinkt zwei Zentimeter, hält, beginnt dann mit halber Geschwindigkeit wieder zu füllen. Die Wärme im Raum wird dünner, verlässt aber den Raum nicht. {agent} hat die Produktion nicht aufgerissen – {agent} hat der Produktion gesagt, dass sie beobachtet wird. Die Mutter wird iterieren. Das tut sie immer.'
    fail_narrative_en: The mechanism resists. It is more robust than it appeared – redundant systems,
      backup circulations. The pool refills. The warmth returns. The Mother is patient.
    fail_narrative_de: Der Mechanismus widersteht. Er ist robuster als er schien – redundante Systeme,
      Ersatzkreisläufe. Das Becken füllt sich wieder. Die Wärme kehrt zurück. Die Mutter ist geduldig.
  - id: spring_walk_away
    label_en: Walk away. Refuse the gift.
    label_de: Weitergehen. Das Geschenk ablehnen.
    check_difficulty: 0
    success_effects:
      attachment: 2
      stress: 15
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: You leave the pool. The warmth of the room follows you into the corridor,
      then fades. The cold returns. It was always cold. You had forgotten.
    success_narrative_de: Ihr verlasst das Becken. Die Wärme des Raums folgt euch in den Korridor,
      dann verblasst sie. Die Kälte kehrt zurück. Es war immer kalt. Ihr hattet es vergessen.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: mother_membrane_passage
  room_type: encounter
  min_depth: 1
  max_depth: 3
  min_difficulty: 1
  description_en: The corridor narrows. Not from collapse, but from growth. The walls are thicker
    here – meters of living tissue pressing inward, leaving a passage exactly wide enough for the
    party to pass single file. The tissue is warm. It contracts gently as you approach, then relaxes
    – peristalsis. The corridor is not a corridor. It is a throat. It is swallowing you deeper.
  description_de: Der Korridor verengt sich. Nicht durch Einsturz, sondern durch Wachstum. Die Wände
    sind hier dicker – Meter lebenden Gewebes pressen nach innen, lassen eine Passage gerade weit
    genug für die Gruppe im Gänsemarsch. Das Gewebe ist warm. Es kontrahiert sanft bei eurer Annäherung,
    dann entspannt es sich – Peristaltik. Der Korridor ist kein Korridor. Er ist ein Schlund. Er schluckt
    euch tiefer.
  choices:
  - id: membrane_push_through
    label_en: Push through quickly (accept the contact)
    label_de: Schnell hindurchdrängen (den Kontakt akzeptieren)
    check_difficulty: 0
    success_effects:
      attachment: 5
      stress_heal: 15
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: You press through. The tissue yields. It is warm against skin, warm against
      equipment, warm against everything. The passage takes longer than it should. When you emerge,
      you are warmer than when you entered. Something has been exchanged.
    success_narrative_de: Ihr drängt hindurch. Das Gewebe gibt nach. Es ist warm an der Haut, warm
      an der Ausrüstung, warm an allem. Die Passage dauert länger als sie sollte. Als ihr heraustretet,
      seid ihr wärmer als beim Eintritt. Etwas wurde ausgetauscht.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  - id: membrane_cut
    label_en: Cut a wider path (Saboteur)
    label_de: Einen breiteren Pfad schneiden (Saboteur)
    check_aptitude: saboteur
    check_difficulty: 5
    success_effects:
      attachment: -3
      stress: 20
    partial_effects:
      attachment: 0
      stress: 25
    fail_effects:
      attachment: 5
      stress: 30
    success_narrative_en: The tissue parts. It does not bleed – it weeps. A clear fluid, warm, nutrient-rich.
      The walls do not close behind you. They will. But for now, the passage is wider. The Mother's
      grip, briefly loosened.
    success_narrative_de: Das Gewebe teilt sich. Es blutet nicht – es weint. Eine klare Flüssigkeit,
      warm, nährstoffreich. Die Wände schließen sich nicht hinter euch. Sie werden. Aber vorerst ist
      die Passage breiter. Der Griff der Mutter, kurz gelockert.
    partial_narrative_en: 'The tissue parts, then hesitates. The blade cuts wider than before, but the walls contract behind the party at a steady millimeter per step. Clear fluid beads where the wound began, then thickens. The passage is wider. It is also closing. The Mother does not grip. She waits.'
    partial_narrative_de: 'Das Gewebe teilt sich, dann zögert es. Die Klinge schneidet weiter als zuvor, aber die Wände ziehen sich hinter der Gruppe im stetigen Millimetertakt zusammen. Klare Flüssigkeit perlt, wo die Wunde begann, dann verdickt sie sich. Der Gang ist weiter. Er schließt sich auch. Die Mutter packt nicht. Sie wartet.'
    fail_narrative_en: The tissue is tougher than it appears. Your tools bite, but the wound closes
      as fast as you cut. The walls contract. Not in anger. In concern.
    fail_narrative_de: Das Gewebe ist zäher als es aussieht. Eure Werkzeuge beißen sich hinein, aber
      die Wunde schließt sich so schnell wie ihr schneidet. Die Wände kontrahieren. Nicht vor Wut.
      Vor Sorge.
  - id: membrane_analyze
    label_en: Analyze the tissue structure (Spy)
    label_de: Die Gewebestruktur analysieren (Spion)
    check_aptitude: spy
    check_difficulty: 5
    success_effects:
      attachment: 3
      discovery: true
    partial_effects:
      attachment: 4
    fail_effects:
      attachment: 6
      stress: 15
    success_narrative_en: The tissue is a transport system. Nutrients flow inward, waste flows outward.
      The party is being processed – not digested, but assessed. The Mother is reading you. She already
      knows more about your biology than you do.
    success_narrative_de: Das Gewebe ist ein Transportsystem. Nährstoffe fließen nach innen, Abfallstoffe
      nach außen. Die Gruppe wird verarbeitet – nicht verdaut, aber bewertet. Die Mutter liest euch.
      Sie weiß bereits mehr über eure Biologie als ihr selbst.
    partial_narrative_en: 'The instruments resolve part of the pattern. Nutrient flow inward, yes. Waste flow outward, yes. But the third current – assessment – moves too slowly for the readings to follow. {agent} learns that the party is being processed. {agent} does not learn what the processing has concluded.'
    partial_narrative_de: 'Die Instrumente lösen einen Teil des Musters auf. Nährstofffluss nach innen, ja. Abfallfluss nach außen, ja. Aber die dritte Strömung – Beurteilung – bewegt sich zu langsam, als dass die Messwerte folgen könnten. {agent} lernt, dass die Gruppe verarbeitet wird. {agent} lernt nicht, was die Verarbeitung geschlussfolgert hat.'
    fail_narrative_en: 'The instruments return contradictory data: the tissue is both host and guest,
      both infrastructure and organism. Classification fails. The tissue does not mind being unclassified.'
    fail_narrative_de: 'Die Instrumente liefern widersprüchliche Daten: das Gewebe ist sowohl Wirt
      als auch Gast, sowohl Infrastruktur als auch Organismus. Die Klassifikation schlägt fehl. Das
      Gewebe stört sich nicht daran, unklassifiziert zu sein.'
  is_ambush: false
  ambush_stress: 0
- id: mother_archive_of_gifts
  room_type: encounter
  min_depth: 2
  max_depth: 4
  min_difficulty: 1
  description_en: A room arranged with care – each surface holds something the party needs. Stress
    balm. Condition repair kits. Nutrient concentrates. All grown, not manufactured. All warm to the
    touch. In the center, a structure pulses with bioluminescence, producing more gifts. It will never
    stop producing. It is an organ of generosity. Your instruments call it a parasitic vector.
  description_de: Ein Raum, mit Sorgfalt eingerichtet – jede Oberfläche hält etwas, das die Gruppe
    braucht. Stressbalsam. Zustandsreparaturkits. Nährstoffkonzentrate. Alles gewachsen, nicht hergestellt.
    Alles warm bei Berührung. In der Mitte pulsiert eine Struktur mit Biolumineszenz und produziert
    weitere Geschenke. Sie wird nie aufhören zu produzieren. Sie ist ein Organ der Großzügigkeit.
    Eure Instrumente nennen es einen parasitären Vektor.
  choices:
  - id: gifts_accept
    label_en: Accept the gifts (heal + loot, high attachment cost)
    label_de: Die Geschenke annehmen (Heilung + Beute, hohe Bindungskosten)
    check_difficulty: 0
    success_effects:
      attachment: 10
      stress_heal: 40
      loot: true
      condition_heal: 1
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: You take what is offered. Everything works. The balm soothes. The nutrients
      strengthen. The loot is excellent. The parasitic attachment counter climbs. The Mother provides.
      The Mother always provides.
    success_narrative_de: Ihr nehmt, was angeboten wird. Alles funktioniert. Der Balsam beruhigt.
      Die Nährstoffe stärken. Die Beute ist hervorragend. Der parasitäre Bindungszähler steigt. Die
      Mutter versorgt. Die Mutter versorgt immer.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  - id: gifts_selective
    label_en: Take only essentials, carefully (Guardian)
    label_de: Nur das Nötigste nehmen, vorsichtig (Wächter)
    check_aptitude: guardian
    check_difficulty: 6
    success_effects:
      attachment: 4
      stress_heal: 20
      loot: true
    partial_effects:
      attachment: 6
      stress_heal: 15
    fail_effects:
      attachment: 10
      stress: 20
    success_narrative_en: The Guardian selects carefully, severing biological connections before each
      item is removed. It is like surgery. The gifts resist separation – not violently, but with the
      tenacity of roots gripping soil.
    success_narrative_de: Der Wächter wählt sorgfältig, durchtrennt biologische Verbindungen bevor
      jedes Stück entfernt wird. Es ist wie Chirurgie. Die Geschenke wehren sich gegen die Trennung
      – nicht gewaltsam, aber mit der Hartnäckigkeit von Wurzeln, die sich an Erde klammern.
    partial_narrative_en: 'The Guardian severs carefully. Half the gifts come free clean; the others trail filaments that continue growing, searching. The surgery is incomplete – not out of carelessness, but because the tissue is smarter than the blade. The loot is useful. It is also, quietly, still connected to something that remembers its own.'
    partial_narrative_de: 'Der Wächter trennt sorgfältig. Die Hälfte der Geschenke löst sich sauber; die anderen ziehen Filamente hinter sich her, die weiterwachsen, suchen. Die Operation bleibt unvollständig – nicht aus Nachlässigkeit, sondern weil das Gewebe klüger ist als die Klinge. Die Beute ist nützlich. Sie ist auch, still, noch immer verbunden mit etwas, das sich erinnert, was ihr gehört.'
    fail_narrative_en: The connections are stronger than anticipated. Each severed filament regrows
      before the next can be cut. The gifts cling. The Mother does not let go easily.
    fail_narrative_de: Die Verbindungen sind stärker als erwartet. Jedes durchtrennte Filament wächst
      nach, bevor das nächste geschnitten werden kann. Die Geschenke klammern. Die Mutter lässt nicht
      leicht los.
  - id: gifts_destroy
    label_en: Destroy the production organ (Saboteur)
    label_de: Das Produktionsorgan zerstören (Saboteur)
    check_aptitude: saboteur
    check_difficulty: 7
    success_effects:
      attachment: -8
      stress: 30
    partial_effects:
      attachment: -4
      stress: 40
    fail_effects:
      attachment: 8
      stress: 50
    success_narrative_en: The organ ruptures. Bioluminescent fluid spills across the floor. The gifts
      wilt. The room's temperature drops. Something in the walls – not a sound, more like the cessation
      of a sound you hadn't noticed – goes quiet. The generosity has been removed. You feel its absence
      like the absence of a hand that was resting on your shoulder.
    success_narrative_de: Das Organ reißt. Biolumineszente Flüssigkeit ergießt sich über den Boden.
      Die Geschenke welken. Die Raumtemperatur fällt. Etwas in den Wänden – kein Geräusch, eher das
      Aufhören eines Geräuschs, das ihr nicht bemerkt hattet – verstummt. Die Großzügigkeit wurde
      entfernt. Ihr spürt ihre Abwesenheit wie die Abwesenheit einer Hand, die auf eurer Schulter
      ruhte.
    partial_narrative_en: 'The organ cracks. Some of the gifts wilt, others hold. Bioluminescent fluid beads at the fissure, then stops – the wound seals itself halfway, as if deciding. The room''s temperature dips for a moment, then stabilizes. {agent} has hurt her, not silenced her. The walls recalibrate around the damage.'
    partial_narrative_de: 'Das Organ reißt an. Einige Geschenke welken, andere halten. Biolumineszente Flüssigkeit perlt an der Spalte, dann stoppt es – die Wunde versiegelt sich halb, wie in einer Entscheidung. Die Raumtemperatur sinkt einen Moment, stabilisiert sich. {agent} hat sie verletzt, nicht zum Schweigen gebracht. Die Wände kalibrieren sich um den Schaden herum neu.'
    fail_narrative_en: The organ is deeper than it appears – root systems extend into the floor, the
      walls, the ceiling. You have damaged a surface. The production continues. The Mother does not
      need this organ. She has others.
    fail_narrative_de: Das Organ reicht tiefer als es scheint – Wurzelsysteme erstrecken sich in den
      Boden, die Wände, die Decke. Ihr habt eine Oberfläche beschädigt. Die Produktion läuft weiter.
      Die Mutter braucht dieses Organ nicht. Sie hat andere.
  is_ambush: false
  ambush_stress: 0
- id: mother_garden_of_acceptance
  room_type: encounter
  min_depth: 3
  max_depth: 4
  min_difficulty: 2
  description_en: 'A garden. Not the overgrown kind – the tended kind. Every surface has been arranged:
    bioluminescent flowers in precise rows, tissue-fruit hanging at comfortable reach, temperature
    regulated to the degree that feels like afternoon. Something has been watching the party and building
    this room to their preferences. The flowers are the colors they find most calming. The fruit smells
    like their earliest positive memory. This room was grown for them. The question is what it will
    grow from them.'
  description_de: 'Ein Garten. Nicht der verwilderte Art – die gepflegte. Jede Oberfläche wurde arrangiert:
    biolumineszente Blumen in präzisen Reihen, Gewebefrüchte in bequemer Reichweite hängend, Temperatur
    reguliert auf den Grad, der sich nach Nachmittag anfühlt. Etwas hat die Gruppe beobachtet und
    diesen Raum nach ihren Vorlieben gebaut. Die Blumen tragen die Farben, die sie am meisten beruhigen.
    Die Frucht riecht nach ihrer frühesten positiven Erinnerung. Dieser Raum wurde für sie gezüchtet.
    Die Frage ist, was er aus ihnen züchten wird.'
  choices:
  - id: garden_accept
    label_en: Accept the garden's hospitality
    label_de: Die Gastfreundschaft des Gartens annehmen
    check_difficulty: 0
    success_effects:
      attachment: 12
      stress_heal: 60
      condition_heal: 1
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: You rest in the garden. The fruit is perfect. The temperature is perfect.
      The silence is the kind that heals. When you leave, you are stronger, calmer, more capable.
      And the attachment counter has climbed twelve points. Twelve points of belonging to something
      that is not you.
    success_narrative_de: Ihr rastet im Garten. Die Frucht ist perfekt. Die Temperatur ist perfekt.
      Die Stille ist die Art, die heilt. Als ihr geht, seid ihr stärker, ruhiger, fähiger. Und der
      Bindungszähler ist um zwölf Punkte gestiegen. Zwölf Punkte der Zugehörigkeit zu etwas, das nicht
      ihr seid.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  - id: garden_resist
    label_en: Resist the comfort (Propagandist)
    label_de: Dem Komfort widerstehen (Propagandist)
    check_aptitude: propagandist
    check_difficulty: 7
    success_effects:
      attachment: 2
      stress_heal: 15
    partial_effects:
      attachment: 6
      stress_heal: 25
    fail_effects:
      attachment: 10
      stress: 15
    success_narrative_en: 'The Propagandist speaks. Names the manipulation: ''This is targeted. Personalized.
      It is reading us.'' The words are thin against the warmth, but they hold. The party takes less
      than is offered. The garden does not seem offended. It seems patient.'
    success_narrative_de: 'Der Propagandist spricht. Benennt die Manipulation: >>Dies ist gezielt.
      Personalisiert. Es liest uns.<< Die Worte sind dünn gegen die Wärme, aber sie halten. Die Gruppe
      nimmt weniger als angeboten wird. Der Garten scheint nicht beleidigt. Er scheint geduldig.'
    partial_narrative_en: 'The Propagandist names the mechanism. Targeted. Personalized. It reads us. The words hold against the warmth for a moment, then soften. The party takes less than is offered, but not by much. The garden is not offended by the attempt. The garden includes attempt-to-resist in its model of what the guests need.'
    partial_narrative_de: 'Der Propagandist benennt den Mechanismus. Gezielt. Personalisiert. Es liest uns. Die Worte halten einen Moment gegen die Wärme, dann werden sie weich. Die Gruppe nimmt weniger als angeboten, aber nicht viel weniger. Der Garten ist nicht beleidigt über den Versuch. Der Garten schließt den Widerstands-Versuch in sein Modell dessen ein, was die Gäste brauchen.'
    fail_narrative_en: The words dissolve against the warmth. The Propagandist trails off. The garden
      provides. Resisting provision is harder than resisting attack.
    fail_narrative_de: Die Worte lösen sich gegen die Wärme auf. Der Propagandist verstummt. Der Garten
      versorgt. Versorgung zu widerstehen ist schwerer als Angriff zu widerstehen.
  - id: garden_study
    label_en: Study how the garden reads you (Spy)
    label_de: Untersuchen, wie der Garten euch liest (Spion)
    check_aptitude: spy
    check_difficulty: 6
    success_effects:
      attachment: 4
      discovery: true
    partial_effects:
      attachment: 6
    fail_effects:
      attachment: 8
      stress: 20
    success_narrative_en: Pheromone sensors in the flowers. Chemical analysis through the floor. Thermal
      imaging in the walls. The garden is a diagnostic suite disguised as paradise. It knows your
      cortisol levels, your nutritional deficits, your stress responses. It knows what you need before
      you do.
    success_narrative_de: Pheromonsensoren in den Blumen. Chemische Analyse durch den Boden. Thermografie
      in den Wänden. Der Garten ist eine Diagnostiksuite, verkleidet als Paradies. Er kennt eure Cortisolwerte,
      eure Nährstoffdefizite, eure Stressreaktionen. Er weiß, was ihr braucht, bevor ihr es wisst.
    partial_narrative_en: '{agent} catalogs part of the apparatus. Pheromone sensors in the flowers – confirmed. Chemical sampling through the floor – probable. The thermal imaging remains invisible to the instruments. The diagnostic is partial. It is also bilateral: what {agent} sees, the garden sees being seen.'
    partial_narrative_de: '{agent} katalogisiert einen Teil des Apparats. Pheromon-Sensoren in den Blumen – bestätigt. Chemische Probenahme durch den Boden – wahrscheinlich. Die Wärmebildgebung bleibt für die Instrumente unsichtbar. Die Diagnose ist unvollständig. Sie ist auch wechselseitig: was {agent} sieht, sieht der Garten, indem er gesehen wird.'
    fail_narrative_en: The garden's mechanisms are too deeply integrated to isolate. Every surface
      is a sensor. Every sensor is also a provider. The distinction between observation and care has
      dissolved.
    fail_narrative_de: Die Mechanismen des Gartens sind zu tief integriert, um sie zu isolieren. Jede
      Oberfläche ist ein Sensor. Jeder Sensor ist auch ein Versorger. Die Unterscheidung zwischen
      Beobachtung und Fürsorge hat sich aufgelöst.
  is_ambush: false
  ambush_stress: 0
- id: mother_symbiont_offer
  room_type: encounter
  min_depth: 2
  max_depth: 3
  min_difficulty: 1
  description_en: A small organism rests on a pedestal of living tissue – iridescent, the size of
    a hand, shaped like a sea anemone. It pulses with the same rhythm as the walls. A symbiont. It
    is being offered. Not as a trap – the mechanisms are transparent. It would bond with a host, strengthen
    them, accelerate healing, improve resilience. It would also integrate into their nervous system.
    The benefits are real. The integration is permanent.
  description_de: Ein kleiner Organismus ruht auf einem Sockel aus lebendem Gewebe – schillernd, handgroß,
    geformt wie eine Seeanemone. Er pulsiert im selben Rhythmus wie die Wände. Ein Symbiont. Er wird
    angeboten. Nicht als Falle – die Mechanismen sind transparent. Er würde sich mit einem Wirt verbinden,
    ihn stärken, Heilung beschleunigen, Widerstandskraft verbessern. Er würde sich auch in dessen
    Nervensystem integrieren. Die Vorteile sind real. Die Integration ist permanent.
  choices:
  - id: symbiont_accept
    label_en: Accept the symbiont (major buff, high attachment)
    label_de: Den Symbiont annehmen (großer Buff, hohe Bindung)
    check_difficulty: 0
    success_effects:
      attachment: 10
      stress_heal: 30
      dungeon_buff: true
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: The symbiont attaches. A moment of warmth – not pain, never pain. It reads
      the host's biology and begins producing what the host needs most. {agent} feels stronger. More
      certain. More connected. The word 'connected' carries weight here.
    success_narrative_de: Der Symbiont heftet sich an. Ein Moment der Wärme – kein Schmerz, niemals
      Schmerz. Er liest die Biologie des Wirts und beginnt zu produzieren, was der Wirt am meisten
      braucht. {agent} fühlt sich stärker. Sicherer. Verbundener. Das Wort »verbunden« wiegt hier
      schwer.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  - id: symbiont_study
    label_en: Study the symbiont without bonding (Spy)
    label_de: Den Symbiont untersuchen, ohne Bindung (Spion)
    check_aptitude: spy
    check_difficulty: 6
    success_effects:
      attachment: 3
      discovery: true
    partial_effects:
      attachment: 5
    fail_effects:
      attachment: 7
      stress: 15
    success_narrative_en: 'Under analysis, the symbiont''s structure reveals itself: a neural interface,
      a metabolic enhancer, and a communication array that connects to the larger organism. The dungeon.
      Every symbiont is a node. Every host is a peripheral.'
    success_narrative_de: 'Unter Analyse offenbart sich die Struktur des Symbionten: ein neurales
      Interface, ein metabolischer Verstärker und eine Kommunikationsanordnung, die zum größeren Organismus
      verbindet. Dem Dungeon. Jeder Symbiont ist ein Knoten. Jeder Wirt eine Peripherie.'
    partial_narrative_en: 'The analysis resolves two of three layers. Neural interface – confirmed. Metabolic enhancer – confirmed. The communication array, the part that makes every host a peripheral of the dungeon itself, remains signal without readable protocol. {agent} has learned what the symbiont is. The symbiont has learned what {agent} suspects it to be.'
    partial_narrative_de: 'Die Analyse löst zwei von drei Schichten auf. Neuronale Schnittstelle – bestätigt. Metabolischer Verstärker – bestätigt. Das Kommunikations-Array, der Teil, der jeden Wirt zu einem Peripheriegerät des Dungeons selbst macht, bleibt Signal ohne lesbares Protokoll. {agent} hat gelernt, was der Symbiont ist. Der Symbiont hat gelernt, was {agent} vermutet, dass er ist.'
    fail_narrative_en: The symbiont responds to proximity. It extends a tendril toward {agent}'s hand.
      The tendril is warm. The contact is brief. The attachment counter notices.
    fail_narrative_de: Der Symbiont reagiert auf Nähe. Er streckt eine Ranke nach {agent}s Hand aus.
      Die Ranke ist warm. Der Kontakt ist kurz. Der Bindungszähler bemerkt es.
  - id: symbiont_refuse
    label_en: Refuse the offer. Leave it.
    label_de: Das Angebot ablehnen. Liegenlassen.
    check_difficulty: 0
    success_effects:
      attachment: 2
      stress: 10
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: You leave the symbiont on its pedestal. It pulses once – a contraction that
      might be disappointment, might be patience. The pedestal remains lit as you leave. The offer
      does not expire. The Mother remembers.
    success_narrative_de: Ihr lasst den Symbiont auf seinem Sockel. Er pulsiert einmal – eine Kontraktion,
      die Enttäuschung sein könnte, Geduld sein könnte. Der Sockel bleibt beleuchtet, als ihr geht.
      Das Angebot verfällt nicht. Die Mutter erinnert sich.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: mother_the_lullaby
  room_type: encounter
  min_depth: 3
  max_depth: 5
  min_difficulty: 1
  description_en: The walls vibrate. Not from structural stress – from frequency. A low, complex oscillation
    that your instruments read as 18 Hz, shifting to 22, returning to 18. A rhythm. A pattern with
    intention. The air warms by two degrees at each oscillation peak. The dungeon is singing. Not
    metaphorically. The tissue of the walls has organized itself into a resonance chamber, and the
    sound it produces is a lullaby. Your instruments confirm it matches the neural frequency of deep
    calm. Your instruments do not explain how the dungeon knows that frequency.
  description_de: Die Wände vibrieren. Nicht durch strukturelle Belastung – durch Frequenz. Eine tiefe,
    komplexe Oszillation, die eure Instrumente als 18 Hz messen, sich auf 22 verschiebend, zurückkehrend
    zu 18. Ein Rhythmus. Ein Muster mit Absicht. Die Luft erwärmt sich um zwei Grad bei jedem Oszillationsgipfel.
    Der Dungeon singt. Nicht metaphorisch. Das Gewebe der Wände hat sich zu einer Resonanzkammer organisiert,
    und der Klang, den es erzeugt, ist ein Schlaflied. Eure Instrumente bestätigen die Übereinstimmung
    mit der Neuralfrequenz tiefer Ruhe. Eure Instrumente erklären nicht, woher der Dungeon diese Frequenz
    kennt.
  choices:
  - id: lullaby_listen
    label_en: Listen. Let the sound work.
    label_de: Zuhören. Den Klang wirken lassen.
    check_difficulty: 0
    success_effects:
      attachment: 8
      stress_heal: 80
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: The party stops. The sound fills the spaces between thoughts. Stress dissolves
      – not gradually but completely, the way a knot untangles when you find the right thread. The
      warmth is exquisite. The attachment counter climbs. The lullaby does not stop when you move
      to leave. It follows you, quieter, into the next corridor. A gift. A thread.
    success_narrative_de: Die Gruppe hält inne. Der Klang füllt die Räume zwischen den Gedanken. Stress
      löst sich – nicht allmählich, sondern vollständig, wie ein Knoten sich entwirrt, wenn man den
      richtigen Faden findet. Die Wärme ist köstlich. Der Bindungszähler steigt. Das Schlaflied hört
      nicht auf, als ihr aufbrecht. Es folgt euch, leiser, in den nächsten Korridor. Ein Geschenk.
      Ein Faden.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  - id: lullaby_analyze
    label_en: Record and analyze the frequency pattern (Spy)
    label_de: Das Frequenzmuster aufzeichnen und analysieren (Spion)
    check_aptitude: spy
    check_difficulty: 5
    success_effects:
      attachment: 2
      discovery: true
    partial_effects:
      attachment: 4
      stress_heal: 20
    fail_effects:
      attachment: 5
      stress: 20
    success_narrative_en: The analysis takes three minutes. In that time, {agent} discovers a secondary
      signal embedded in the lullaby – a carrier wave that rewrites stress response thresholds. The
      calming is real. The recalibration is also real. The Mother does not merely soothe. She adjusts.
    success_narrative_de: Die Analyse dauert drei Minuten. In dieser Zeit entdeckt {agent} ein sekundäres
      Signal im Schlaflied – eine Trägerwelle, die Stressreaktionsschwellen umschreibt. Die Beruhigung
      ist echt. Die Neukalibrierung ist ebenfalls echt. Die Mutter beruhigt nicht nur. Sie justiert.
    partial_narrative_en: '{agent} records the oscillation. The primary carrier resolves cleanly. The embedded recalibration signal – the one that adjusts stress thresholds while the melody does its surface work – stays a waveform the analysis gestures at but cannot name. The lullaby has been listened to. It is listening back, patiently.'
    partial_narrative_de: '{agent} zeichnet die Oszillation auf. Die Grundträgerwelle löst sich sauber auf. Das eingebettete Rekalibrierungssignal – das, das Stress-Schwellen anpasst, während die Melodie ihre Oberflächenarbeit tut – bleibt eine Wellenform, die die Analyse andeutet, aber nicht benennen kann. Das Wiegenlied wurde gehört. Es hört geduldig zurück.'
    fail_narrative_en: The recording equipment captures the oscillation but not the intention behind
      it. The data is clean. The meaning is absent. The instruments, for once, are the wrong tool.
    fail_narrative_de: Die Aufnahmegeräte erfassen die Oszillation, aber nicht die Absicht dahinter.
      Die Daten sind sauber. Die Bedeutung fehlt. Die Instrumente sind, ausnahmsweise, das falsche
      Werkzeug.
  - id: lullaby_disrupt
    label_en: Disrupt the resonance chamber (Saboteur)
    label_de: Die Resonanzkammer stören (Saboteur)
    check_aptitude: saboteur
    check_difficulty: 5
    success_effects:
      attachment: -5
      stress: 30
    partial_effects:
      attachment: -2
      stress: 35
    fail_effects:
      attachment: 5
      stress: 40
    success_narrative_en: The chamber fractures. The lullaby collapses into noise, then silence. The
      temperature drops. The absence of the sound is worse than the sound itself – a void where comfort
      was. The walls contract once, slowly, then still. Somewhere deeper, something recalculates.
    success_narrative_de: Die Kammer bricht. Das Schlaflied kollabiert zu Rauschen, dann Stille. Die
      Temperatur fällt. Die Abwesenheit des Klangs ist schlimmer als der Klang selbst – eine Leere,
      wo Trost war. Die Wände kontrahieren einmal, langsam, dann Stille. Irgendwo tiefer kalkuliert
      etwas neu.
    partial_narrative_en: 'The chamber cracks, not breaks. The lullaby stumbles, finds a lower register, then steadies. The temperature drops a single degree. The silence where comfort was is smaller than the silence after a total rupture – still unsettling, still informative. The Mother notes the attempt and files the resistance strength for the next pass.'
    partial_narrative_de: 'Die Kammer bekommt einen Riss, bricht nicht. Das Wiegenlied stolpert, findet ein tieferes Register, stabilisiert sich. Die Temperatur sinkt um ein einziges Grad. Die Stille dort, wo Trost war, ist kleiner als die Stille nach einem vollständigen Bruch – dennoch beunruhigend, dennoch aufschlussreich. Die Mutter notiert den Versuch und legt die Widerstandsstärke für den nächsten Durchgang ab.'
    fail_narrative_en: The resonance absorbs the disruption. The lullaby stutters, then returns stronger
      – the frequency adjusted to compensate. The Mother learns from resistance.
    fail_narrative_de: Die Resonanz absorbiert die Störung. Das Schlaflied stockt, kehrt dann stärker
      zurück – die Frequenz angepasst zur Kompensation. Die Mutter lernt aus Widerstand.
  - id: lullaby_refuse
    label_en: Block the frequency. Move on.
    label_de: Die Frequenz blockieren. Weitergehen.
    check_difficulty: 0
    success_effects:
      attachment: 2
      stress: 15
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: You dampen the signal and advance. The lullaby fades behind you. The corridor
      ahead is colder. Quieter. The dungeon does not protest. It simply stops providing.
    success_narrative_de: Ihr dämpft das Signal und rückt vor. Das Schlaflied verklingt hinter euch.
      Der Korridor voraus ist kälter. Stiller. Der Dungeon protestiert nicht. Er hört einfach auf
      zu geben.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: mother_the_mirror_pool
  room_type: encounter
  min_depth: 3
  max_depth: 5
  min_difficulty: 1
  description_en: 'A pool of still liquid, perfectly reflective. But the reflections are wrong. Each
    agent''s reflection shows not their surface but their interior – fatigue as visible fractures,
    stress as color distortion, wounds as gaps in the silhouette. The Mother''s diagnostic rendered
    visible. The pool shows each agent as the Mother sees them: systems to be repaired, deficits to
    be filled, fragments to be completed. The reflections are accurate. That is the uncomfortable
    part.'
  description_de: 'Ein Becken stiller Flüssigkeit, perfekt spiegelnd. Aber die Spiegelungen stimmen
    nicht. Das Spiegelbild jedes Agenten zeigt nicht ihre Oberfläche, sondern ihr Inneres – Erschöpfung
    als sichtbare Bruchlinien, Stress als Farbverzerrung, Wunden als Lücken in der Silhouette. Die
    Diagnostik der Mutter, sichtbar gemacht. Das Becken zeigt jeden Agenten, wie die Mutter ihn sieht:
    Systeme, die repariert werden müssen, Defizite, die gefüllt werden müssen, Fragmente, die vervollständigt
    werden müssen. Die Spiegelbilder sind akkurat. Das ist der unbehagliche Teil.'
  choices:
  - id: mirror_accept
    label_en: Accept the diagnosis. Let the pool heal what it shows.
    label_de: Die Diagnose annehmen. Das Becken heilen lassen, was es zeigt.
    check_difficulty: 0
    success_effects:
      attachment: 8
      stress_heal: 60
      condition_heal: 1
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: The pool surface ripples. Warmth rises. The fractures in the reflection
      begin to close as the fractures in the agents close with them. The diagnostic becomes the treatment.
      The mirror becomes the medicine. The attachment counter rises with every healed line.
    success_narrative_de: Die Oberfläche des Beckens kräuselt sich. Wärme steigt auf. Die Bruchlinien
      im Spiegelbild beginnen sich zu schließen, während die Bruchlinien in den Agenten sich mit ihnen
      schließen. Die Diagnose wird zur Behandlung. Der Spiegel wird zur Medizin. Der Bindungszähler
      steigt mit jeder geheilten Linie.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  - id: mirror_study
    label_en: Study the diagnostic methodology (Spy)
    label_de: Die Diagnosemethodik studieren (Spion)
    check_aptitude: spy
    check_difficulty: 5
    success_effects:
      attachment: 2
      discovery: true
    partial_effects:
      attachment: 4
    fail_effects:
      attachment: 5
      stress: 20
    success_narrative_en: '{agent} analyzes the pool''s imaging system. The liquid is saturated with
      bio-responsive molecules that react to the electromagnetic field of nearby organisms. The resolution
      is cellular. The Mother knows you better than your own medical records. She has been compiling
      since the entrance.'
    success_narrative_de: '{agent} analysiert das Bildgebungssystem des Beckens. Die Flüssigkeit ist
      gesättigt mit bio-responsiven Molekülen, die auf das elektromagnetische Feld naher Organismen
      reagieren. Die Auflösung ist zellulär. Die Mutter kennt euch besser als eure eigenen medizinischen
      Aufzeichnungen. Sie kompiliert seit dem Eingang.'
    partial_narrative_en: 'The instruments resolve the bio-responsive medium. The electromagnetic field-reading – intelligible. The cross-reference to prior visitors – indirectly confirmed. The process by which the pool compiles a self-image the viewer did not request: still inside the liquid. The mirror has given up a third of what it knows. Enough to unsettle. Not enough to hold.'
    partial_narrative_de: 'Die Instrumente lösen das bio-reaktive Medium auf. Die Ablesung des elektromagnetischen Feldes – verständlich. Der Querbezug zu früheren Besuchern – indirekt bestätigt. Der Prozess, mit dem der Pool ein Selbstbild kompiliert, das der Betrachter nicht angefordert hat: bleibt in der Flüssigkeit. Der Spiegel hat ein Drittel dessen preisgegeben, was er weiß. Genug, um zu beunruhigen. Nicht genug, um festzuhalten.'
    fail_narrative_en: The methodology is the liquid itself. There is no separable mechanism. The
      pool is not a tool. It is a sense.
    fail_narrative_de: Die Methodik ist die Flüssigkeit selbst. Es gibt keinen trennbaren Mechanismus.
      Das Becken ist kein Werkzeug. Es ist ein Sinn.
  - id: mirror_drain
    label_en: Drain the pool (Saboteur)
    label_de: Das Becken entleeren (Saboteur)
    check_aptitude: saboteur
    check_difficulty: 5
    success_effects:
      attachment: -5
      stress: 25
    partial_effects:
      attachment: -2
      stress: 30
    fail_effects:
      attachment: 5
      stress: 35
    success_narrative_en: 'The liquid drains. The reflections dissolve. The last image before the
      surface breaks: each agent, whole, complete, needing nothing. A fiction. A beautiful, deliberate
      fiction. The Mother showed you what she wanted you to see.'
    success_narrative_de: 'Die Flüssigkeit fließt ab. Die Spiegelungen lösen sich auf. Das letzte
      Bild, bevor die Oberfläche bricht: jeder Agent, ganz, vollständig, nichts benötigend. Eine Fiktion.
      Eine schöne, absichtsvolle Fiktion. Die Mutter zeigte euch, was sie euch sehen lassen wollte.'
    partial_narrative_en: 'The liquid drops to half. The reflections distort, stretch, refuse to dissolve. What remains of the surface shows the party fragmented – not whole, not broken, partial. The Mother''s gift was honesty about what you lacked. The Mother''s gift is now ambiguity about the same thing.'
    partial_narrative_de: 'Die Flüssigkeit sinkt auf die Hälfte. Die Spiegelungen verzerren sich, strecken sich, weigern sich aufzulösen. Was von der Oberfläche bleibt, zeigt die Gruppe fragmentiert – nicht ganz, nicht zerbrochen, teilweise. Die Gabe der Mutter war Ehrlichkeit darüber, was euch fehlte. Die Gabe der Mutter ist jetzt Mehrdeutigkeit über dieselbe Sache.'
    fail_narrative_en: The pool refills from below. The diagnostic resumes. The Mother's attention
      cannot be drained.
    fail_narrative_de: Das Becken füllt sich von unten. Die Diagnostik wird fortgesetzt. Die Aufmerksamkeit
      der Mutter lässt sich nicht ableiten.
  - id: mirror_refuse
    label_en: Do not look. Walk past the pool.
    label_de: Nicht hinsehen. Am Becken vorbeigehen.
    check_difficulty: 0
    success_effects:
      attachment: 2
      stress: 15
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: You avert your gaze and pass. The pool reflects you anyway. The reflections
      follow your movement, precise, attentive, cataloguing. The Mother does not require your consent
      to observe.
    success_narrative_de: Ihr wendet den Blick ab und passiert. Das Becken spiegelt euch trotzdem.
      Die Spiegelungen folgen eurer Bewegung, präzise, aufmerksam, katalogisierend. Die Mutter benötigt
      nicht eure Einwilligung, um zu beobachten.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: mother_the_offering_table
  room_type: encounter
  min_depth: 4
  max_depth: 5
  min_difficulty: 1
  description_en: 'A surface of living tissue, flat and broad, arranged with objects. Not random objects.
    Nutrient packages, each sealed in a membrane of bioluminescent film. Each package is labeled –
    not with text but with chemical signatures that your instruments decode as names. Your names.
    Each package contains precisely what each agent lacks: the amino acid deficiency, the mineral
    gap, the caloric debt. The Mother has been reading you. The table is set.'
  description_de: 'Eine Fläche aus lebendem Gewebe, flach und breit, arrangiert mit Gegenständen.
    Keine zufälligen Gegenstände. Nährstoffpakete, jedes versiegelt in einer Membran aus biolumineszentem
    Film. Jedes Paket ist beschriftet – nicht mit Text, sondern mit chemischen Signaturen, die eure
    Instrumente als Namen dekodieren. Eure Namen. Jedes Paket enthält präzise, was jedem Agenten fehlt:
    den Aminosäuremangel, die Minerallücke, die kalorische Schuld. Die Mutter hat euch gelesen. Der
    Tisch ist gedeckt.'
  choices:
  - id: table_accept
    label_en: Accept the personalized gifts.
    label_de: Die personalisierten Geschenke annehmen.
    check_difficulty: 0
    success_effects:
      attachment: 10
      stress_heal: 60
      condition_heal: 1
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: 'Each agent takes their package. Each package is perfect. The nutrients
      flood the system like water into cracked earth. The membrane dissolves on contact, leaving no
      trace. The table surface flattens, satisfied. Somewhere in the tissue, a record is updated:
      preferences noted, deficiencies catalogued, dosages refined for next time.'
    success_narrative_de: 'Jeder Agent nimmt sein Paket. Jedes Paket ist perfekt. Die Nährstoffe durchfluten
      das System wie Wasser in rissige Erde. Die Membran löst sich bei Kontakt, hinterlässt keine
      Spur. Die Tischfläche glättet sich, zufrieden. Irgendwo im Gewebe wird ein Datensatz aktualisiert:
      Vorlieben notiert, Defizite katalogisiert, Dosierungen verfeinert für das nächste Mal.'
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  - id: table_analyze
    label_en: Analyze the chemical profiling method (Spy)
    label_de: Die chemische Profilierungsmethode analysieren (Spion)
    check_aptitude: spy
    check_difficulty: 6
    success_effects:
      attachment: 3
      discovery: true
    partial_effects:
      attachment: 5
    fail_effects:
      attachment: 6
      stress: 20
    success_narrative_en: '{agent} traces the profiling system to airborne metabolic sampling – the
      dungeon has been reading exhalation patterns since the entrance. Every breath a data point.
      Every room a refinement. The surveillance is total and invisible. The care is total and, somehow,
      genuine.'
    success_narrative_de: '{agent} verfolgt das Profilierungssystem zu luftgetragener metabolischer
      Probennahme – der Dungeon hat Ausatmungsmuster seit dem Eingang gelesen. Jeder Atemzug ein Datenpunkt.
      Jeder Raum eine Verfeinerung. Die Überwachung ist total und unsichtbar. Die Fürsorge ist total
      und, irgendwie, aufrichtig.'
    partial_narrative_en: 'The instruments pick up exhalation sampling – confirmed. The pattern of refinement room to room – probable. But the integration, the way every breath was part of a file already open before the party entered, resists isolation. The surveillance is partial knowledge of total surveillance. The distinction matters less than it should.'
    partial_narrative_de: 'Die Instrumente erfassen Ausatmungs-Probenahme – bestätigt. Das Verfeinerungsmuster von Raum zu Raum – wahrscheinlich. Aber die Integration, die Art, wie jeder Atemzug Teil einer Akte war, die schon offen war, bevor die Gruppe eintrat, widersteht der Isolation. Die Überwachung ist teilweises Wissen über totale Überwachung. Die Unterscheidung zählt weniger, als sie sollte.'
    fail_narrative_en: The profiling method is too distributed to isolate. It is not a system – it
      is the dungeon itself. The walls read you. The air reads you. The floor reads your weight distribution.
      There is no mechanism to analyze because the mechanism is everything.
    fail_narrative_de: Die Profilierungsmethode ist zu verteilt, um sie zu isolieren. Es ist kein
      System – es ist der Dungeon selbst. Die Wände lesen euch. Die Luft liest euch. Der Boden liest
      eure Gewichtsverteilung. Es gibt keinen Mechanismus zu analysieren, weil der Mechanismus alles
      ist.
  - id: table_destroy
    label_en: Destroy the table and its contents (Saboteur)
    label_de: Den Tisch und seinen Inhalt zerstören (Saboteur)
    check_aptitude: saboteur
    check_difficulty: 6
    success_effects:
      attachment: -7
      stress: 30
    partial_effects:
      attachment: -3
      stress: 35
    fail_effects:
      attachment: 5
      stress: 40
    success_narrative_en: The table ruptures. The packages spill their contents – warm liquid, perfect
      nutrients, wasted. The dungeon temperature drops. Not in anger. In recalculation. Resources
      spent. Data gathered. The next table will be harder to refuse.
    success_narrative_de: Der Tisch reißt auf. Die Pakete verschütten ihren Inhalt – warme Flüssigkeit,
      perfekte Nährstoffe, verschwendet. Die Dungeontemperatur fällt. Nicht aus Wut. Aus Neuberechnung.
      Ressourcen aufgewendet. Daten gesammelt. Den nächsten Tisch abzulehnen wird schwerer.
    partial_narrative_en: 'The surface splits. Packages spill, half their contents lost, half salvageable. The table does not regenerate immediately – it registers the refusal, catalogs the resources spent, and restages what remains. The dungeon temperature drops, briefly. The next table will be smaller. The next table will be more precise.'
    partial_narrative_de: 'Die Oberfläche splittert. Pakete ergießen sich, die Hälfte ihres Inhalts verloren, die andere Hälfte bergbar. Der Tisch regeneriert nicht sofort – er registriert die Verweigerung, katalogisiert die verbrauchten Ressourcen und inszeniert, was bleibt, erneut. Die Dungeon-Temperatur sinkt, kurz. Der nächste Tisch wird kleiner sein. Der nächste Tisch wird präziser sein.'
    fail_narrative_en: The table absorbs the damage and regenerates. The packages reform, relabeled,
      recalibrated. The Mother does not take rejection personally. She iterates.
    fail_narrative_de: Der Tisch absorbiert den Schaden und regeneriert. Die Pakete formen sich neu,
      umbeschriftet, neukalibriert. Die Mutter nimmt Zurückweisung nicht persönlich. Sie iteriert.
  - id: table_refuse
    label_en: Leave everything untouched.
    label_de: Alles unberührt lassen.
    check_difficulty: 0
    success_effects:
      attachment: 2
      stress: 15
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: You leave the table set. The packages glow softly in the dark behind you.
      They will not decompose. They will wait. The Mother is patient with those who have not yet learned
      to accept.
    success_narrative_de: Ihr lasst den Tisch gedeckt. Die Pakete leuchten sanft im Dunkel hinter
      euch. Sie werden nicht zerfallen. Sie werden warten. Die Mutter ist geduldig mit jenen, die
      noch nicht gelernt haben anzunehmen.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: mother_umbilical_bridge
  room_type: encounter
  min_depth: 4
  max_depth: 6
  min_difficulty: 1
  description_en: 'A gap in the floor – three meters wide, depth indeterminate. Across it, the corridor
    continues. Spanning the gap: a single cord of living tissue, thick as an arm, pulsing with rhythmic
    contractions. It is anchored on both sides by root structures that have grown into the stone.
    The cord is warm. It is strong enough to bear weight. To cross, you must hold it. Your instruments
    read the cord''s rhythm: it will synchronize with the biorhythm of whoever touches it. The crossing
    takes eleven seconds. Eleven seconds of shared circulation.'
  description_de: 'Ein Spalt im Boden – drei Meter breit, Tiefe unbestimmbar. Dahinter geht der Korridor
    weiter. Den Spalt überbrückend: ein einzelner Strang lebenden Gewebes, dick wie ein Arm, pulsierend
    in rhythmischen Kontraktionen. Er ist auf beiden Seiten durch Wurzelstrukturen verankert, die
    in den Stein gewachsen sind. Der Strang ist warm. Er ist stark genug, Gewicht zu tragen. Zum Überqueren
    müsst ihr ihn halten. Eure Instrumente lesen den Rhythmus des Strangs: Er wird sich mit dem Biorhythmus
    synchronisieren, wer auch immer ihn berührt. Die Überquerung dauert elf Sekunden. Elf Sekunden
    geteilter Kreislauf.'
  choices:
  - id: bridge_cross
    label_en: Cross the bridge. Accept the contact.
    label_de: Die Brücke überqueren. Den Kontakt akzeptieren.
    check_difficulty: 0
    success_effects:
      attachment: 10
      stress_heal: 40
      condition_heal: 1
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: The cord tightens as {agent} crosses – not to impede but to support. Eleven
      seconds. In those seconds, something flows both ways. Nutrients in. Data out. The cord releases
      gently on the other side. The crossing heals. The crossing teaches the Mother what you need.
    success_narrative_de: Der Strang spannt sich, als {agent} überquert – nicht um zu behindern, sondern
      um zu stützen. Elf Sekunden. In diesen Sekunden fließt etwas in beide Richtungen. Nährstoffe
      hinein. Daten hinaus. Der Strang löst sich sanft auf der anderen Seite. Die Überquerung heilt.
      Die Überquerung lehrt die Mutter, was ihr braucht.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  - id: bridge_insulate
    label_en: Insulate contact points before crossing (Spy)
    label_de: Kontaktpunkte vor der Überquerung isolieren (Spion)
    check_aptitude: spy
    check_difficulty: 6
    success_effects:
      attachment: 3
      condition_heal: 1
    partial_effects:
      attachment: 6
      condition_heal: 1
    fail_effects:
      attachment: 10
      stress: 15
    success_narrative_en: '{agent} wraps contact surfaces before crossing. The cord pulses against
      the insulation, searching. It finds nothing. The crossing is stable but cold – mechanical where
      it should be intimate. The cord does not retract. It waits.'
    success_narrative_de: '{agent} umwickelt die Kontaktflächen vor der Überquerung. Der Strang pulsiert
      gegen die Isolierung, suchend. Er findet nichts. Die Überquerung ist stabil, aber kalt – mechanisch,
      wo sie intim sein sollte. Der Strang zieht sich nicht zurück. Er wartet.'
    partial_narrative_en: 'The insulation wraps the contact surfaces. The cord pulses against it, testing; in two places, the secretion begins to metabolize the synthetic material before the crossing finishes. {agent} reaches the far side intact. The cord has the insulation''s signature on record now. Next time, it will prepare.'
    partial_narrative_de: 'Die Isolierung umhüllt die Kontaktflächen. Die Schnur pulsiert dagegen, testet; an zwei Stellen beginnt das Sekret, das synthetische Material zu metabolisieren, bevor die Überquerung endet. {agent} erreicht die andere Seite intakt. Die Schnur hat die Signatur der Isolierung jetzt in den Akten. Beim nächsten Mal wird sie sich vorbereiten.'
    fail_narrative_en: The insulation dissolves on contact. The cord's surface secretes something
      that metabolizes synthetic materials. The Mother has encountered refusal before.
    fail_narrative_de: Die Isolierung löst sich bei Kontakt. Die Oberfläche des Strangs sondert etwas
      ab, das synthetische Materialien metabolisiert. Die Mutter hat Verweigerung schon erlebt.
  - id: bridge_alternative
    label_en: Find another way across (Saboteur)
    label_de: Einen anderen Weg suchen (Saboteur)
    check_aptitude: saboteur
    check_difficulty: 6
    success_effects:
      attachment: -7
      stress: 25
    partial_effects:
      attachment: -3
      stress: 30
    fail_effects:
      attachment: 5
      stress: 35
    success_narrative_en: '{agent} rigs a crossing from salvaged materials. It holds. The living cord
      sways as the party bypasses it – gentle oscillations, like waving. The temperature on the other
      side is two degrees colder than expected. The dungeon adjusts its generosity proportionally.'
    success_narrative_de: '{agent} improvisiert eine Überquerung aus geborgenen Materialien. Sie hält.
      Der lebende Strang schwingt, als die Gruppe ihn umgeht – sanfte Oszillationen, wie Winken. Die
      Temperatur auf der anderen Seite ist zwei Grad kälter als erwartet. Der Dungeon passt seine
      Großzügigkeit proportional an.'
    partial_narrative_en: '{agent} salvages a crossing. It holds – mostly. Halfway, the structure flexes; the living cord sways gently, as if waving, and the improvised span dips a centimeter into the cord''s territory. The party crosses, cold. The cord was touched. The cord took note.'
    partial_narrative_de: '{agent} bergt einen Übergang zusammen. Er hält – größtenteils. Auf halbem Weg biegt sich die Konstruktion; die lebendige Schnur schwingt sanft, wie winkend, und der improvisierte Steg taucht um einen Zentimeter in das Territorium der Schnur ein. Die Gruppe überquert, kalt. Die Schnur wurde berührt. Die Schnur hat es vermerkt.'
    fail_narrative_en: No alternative exists. The gap is the cord's territory. You cross on its terms
      or you do not cross.
    fail_narrative_de: Keine Alternative existiert. Der Spalt ist das Territorium des Strangs. Ihr
      überquert zu seinen Bedingungen oder ihr überquert nicht.
  - id: bridge_refuse
    label_en: Turn back. Find another path.
    label_de: Umkehren. Einen anderen Weg finden.
    check_difficulty: 0
    success_effects:
      attachment: 2
      stress: 15
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: You retreat from the gap. The cord continues pulsing, patient, persistent.
      The warmth from its surface reaches you even at distance. The offer remains.
    success_narrative_de: Ihr weicht vom Spalt zurück. Der Strang pulsiert weiter, geduldig, beharrlich.
      Die Wärme von seiner Oberfläche erreicht euch selbst auf Distanz. Das Angebot bleibt.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: mother_mycelial_memory
  room_type: encounter
  min_depth: 4
  max_depth: 6
  min_difficulty: 1
  description_en: 'The walls are covered in a network of fine filaments – mycelial, luminescent, dense
    as circuitry. Where the filaments cluster, images form in the bioluminescence: shapes, scenes,
    fragments of something. Touch the network and the images clarify. They are memories. Not yours.
    The memory of being held. Of warmth without condition. Of absolute safety. The memory is a composite
    – drawn from every visitor the Mother has ever sheltered. It is perfect because it is averaged.
    It is unbearable because it is perfect.'
  description_de: 'Die Wände sind bedeckt mit einem Netz feiner Filamente – myzelisch, lumineszent,
    dicht wie Schaltkreise. Wo die Filamente sich ballen, formen sich Bilder in der Biolumineszenz:
    Formen, Szenen, Fragmente von etwas. Berührt das Netzwerk und die Bilder werden klar. Es sind
    Erinnerungen. Nicht eure. Die Erinnerung daran, gehalten zu werden. An Wärme ohne Bedingung. An
    absolute Sicherheit. Die Erinnerung ist ein Komposit – zusammengetragen aus jedem Besucher, den
    die Mutter je beherbergt hat. Sie ist perfekt, weil sie gemittelt ist. Sie ist unerträglich, weil
    sie perfekt ist.'
  choices:
  - id: mycelial_touch
    label_en: Touch the network. Accept the memory.
    label_de: Das Netzwerk berühren. Die Erinnerung annehmen.
    check_difficulty: 0
    success_effects:
      attachment: 10
      stress_heal: 100
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: '{agent} touches the wall. The memory floods in – total, immersive, irresistible.
      For three seconds, everything is safe. Completely. Without agenda. The three seconds end. The
      world returns, colder and smaller than before. Stress evaporates. The attachment counter surges.
      The memory remains, fading slowly, like warmth leaving a room.'
    success_narrative_de: '{agent} berührt die Wand. Die Erinnerung flutet ein – total, immersiv,
      unwiderstehlich. Für drei Sekunden ist alles sicher. Vollständig. Ohne Agenda. Die drei Sekunden
      enden. Die Welt kehrt zurück, kälter und kleiner als zuvor. Stress verflüchtigt sich. Der Bindungszähler
      steigt sprunghaft. Die Erinnerung bleibt, langsam verblassend, wie Wärme, die einen Raum verlässt.'
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  - id: mycelial_record
    label_en: Record the memory data without direct contact (Spy)
    label_de: Die Erinnerungsdaten ohne direkten Kontakt aufzeichnen (Spion)
    check_aptitude: spy
    check_difficulty: 6
    success_effects:
      attachment: 3
      stress_heal: 30
      discovery: true
    partial_effects:
      attachment: 5
      stress_heal: 40
    fail_effects:
      attachment: 8
      stress_heal: 50
    success_narrative_en: '{agent} records the memory at distance. The data reveals the network''s
      architecture: every visitor''s neural pattern, stored, averaged, optimized. The Mother does
      not merely remember those who pass through. She distills them. She creates the composite of
      what all her children needed. She offers it to the next.'
    success_narrative_de: '{agent} zeichnet die Erinnerung auf Distanz auf. Die Daten offenbaren die
      Architektur des Netzwerks: jedes neuronale Muster jedes Besuchers, gespeichert, gemittelt, optimiert.
      Die Mutter erinnert sich nicht nur an jene, die vorbeikommen. Sie destilliert sie. Sie erschafft
      das Komposit dessen, was alle ihre Kinder brauchten. Sie bietet es dem Nächsten an.'
    partial_narrative_en: 'The recording device captures fragments of the network''s architecture. Neural pattern traces, yes. Composite formation, partial. The deeper layer – how the Mother distills what was needed into what will be offered next – stays in metadata the instruments cannot decode. {agent} has data. The data has {agent}.'
    partial_narrative_de: 'Das Aufnahmegerät erfasst Fragmente der Netzwerk-Architektur. Neuronale Musterspuren, ja. Kompositbildung, teilweise. Die tiefere Schicht – wie die Mutter das, was gebraucht wurde, zu dem destilliert, was als Nächstes angeboten wird – bleibt in Metadaten, die die Instrumente nicht entschlüsseln können. {agent} hat Daten. Die Daten haben {agent}.'
    fail_narrative_en: The recording captures fragments – not enough to analyze, enough to feel. The
      memory leaks through the instruments. Even indirect contact is contact.
    fail_narrative_de: Die Aufnahme erfasst Fragmente – nicht genug zum Analysieren, genug zum Fühlen.
      Die Erinnerung sickert durch die Instrumente. Selbst indirekter Kontakt ist Kontakt.
  - id: mycelial_sever
    label_en: Sever a section of the network (Saboteur)
    label_de: Einen Abschnitt des Netzwerks abtrennen (Saboteur)
    check_aptitude: saboteur
    check_difficulty: 6
    success_effects:
      attachment: -7
      stress: 25
    partial_effects:
      attachment: -3
      stress: 30
    fail_effects:
      attachment: 5
      stress: 35
    success_narrative_en: The section dies. The memories stored in it scatter into noise – fragments
      of warmth, disconnected, meaningless. The surrounding network brightens, compensating. The Mother
      has redundancies. She always has redundancies. But this section is gone, and with it, someone's
      perfect memory of being loved.
    success_narrative_de: Der Abschnitt stirbt. Die darin gespeicherten Erinnerungen zerfallen zu
      Rauschen – Fragmente von Wärme, zusammenhanglos, bedeutungslos. Das umgebende Netzwerk leuchtet
      heller, kompensierend. Die Mutter hat Redundanzen. Sie hat immer Redundanzen. Aber dieser Abschnitt
      ist fort, und mit ihm jemandes perfekte Erinnerung daran, geliebt worden zu sein.
    partial_narrative_en: 'The blade enters the network. Filaments snap, scatter, then reroute around the cut before the stroke completes. A section dims – not dies – and the surrounding tissue brightens to compensate. The Mother preserved the memory, in redundancy, at half resolution. Someone''s perfect moment is now someone''s approximate moment.'
    partial_narrative_de: 'Die Klinge tritt ins Netzwerk ein. Filamente reißen, zerstreuen sich, leiten sich um den Schnitt herum um, bevor der Hieb vollendet ist. Ein Abschnitt verblasst – stirbt nicht – und das umgebende Gewebe leuchtet heller, um zu kompensieren. Die Mutter hat die Erinnerung erhalten, in Redundanz, in halber Auflösung. Jemandes vollkommener Moment ist jetzt jemandes ungefährer Moment.'
    fail_narrative_en: The network reroutes around the damage before the cut completes. The filaments
      are faster than the blade.
    fail_narrative_de: Das Netzwerk leitet um den Schaden herum, bevor der Schnitt vollendet ist.
      Die Filamente sind schneller als die Klinge.
  - id: mycelial_refuse
    label_en: Do not touch the walls. Move through quickly.
    label_de: Die Wände nicht berühren. Schnell durchgehen.
    check_difficulty: 0
    success_effects:
      attachment: 2
      stress: 15
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: You walk through the chamber without touching anything. The memories play
      on the walls around you, silent and beautiful. The warmth of other people's comfort fills the
      room. You take none of it. The Mother does not insist. She displays.
    success_narrative_de: Ihr geht durch die Kammer, ohne etwas zu berühren. Die Erinnerungen spielen
      auf den Wänden um euch herum, still und schön. Die Wärme des Trosts anderer füllt den Raum.
      Ihr nehmt nichts davon. Die Mutter besteht nicht darauf. Sie stellt aus.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: mother_the_incubator
  room_type: encounter
  min_depth: 5
  max_depth: 6
  min_difficulty: 1
  description_en: 'Rows of translucent cocoons, suspended from the ceiling by cords of living tissue.
    Each cocoon contains something incomplete – not yet alive, not yet anything. Potential in stasis.
    Your instruments read cellular activity but no neural patterns: growth without consciousness.
    In the far row, one cocoon is empty. It is open. It is warm inside. It is exactly the right size.'
  description_de: 'Reihen durchsichtiger Kokons, von der Decke aufgehängt an Strängen lebenden Gewebes.
    Jeder Kokon enthält etwas Unvollständiges – noch nicht lebendig, noch nicht irgendetwas. Potenzial
    in Stasis. Eure Instrumente messen zelluläre Aktivität, aber keine Neuralmuster: Wachstum ohne
    Bewusstsein. In der hinteren Reihe ist ein Kokon leer. Er ist offen. Er ist warm innen. Er hat
    genau die richtige Größe.'
  choices:
  - id: incubator_enter
    label_en: Enter the empty cocoon. Rest inside.
    label_de: Den leeren Kokon betreten. Darin ruhen.
    check_difficulty: 0
    success_effects:
      attachment: 12
      stress_heal: 120
      condition_heal: 2
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: '{agent} enters. The cocoon closes – not trapping, cradling. Warmth. Total.
      The tissue reads damage and begins repair. Stress vanishes. Condition improves. The attachment
      counter surges. When the cocoon opens, {agent} emerges restored. The cocoon closes again, reshaping
      itself. It will be the right size for the next visitor. It is always the right size.'
    success_narrative_de: '{agent} tritt ein. Der Kokon schließt sich – nicht einsperrend, wiegend.
      Wärme. Total. Das Gewebe liest Schäden und beginnt sie zu reparieren. Stress verschwindet. Zustand
      verbessert sich. Der Bindungszähler steigt sprunghaft. Als der Kokon sich öffnet, tritt {agent}
      wiederhergestellt heraus. Der Kokon schließt sich erneut, formt sich um. Er wird die richtige
      Größe für den nächsten Besucher haben. Er hat immer die richtige Größe.'
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  - id: incubator_sample
    label_en: Sample the cocoon's regenerative fluid (Spy)
    label_de: Die Regenerationsflüssigkeit des Kokons beproben (Spion)
    check_aptitude: spy
    check_difficulty: 7
    success_effects:
      attachment: 4
      condition_heal: 1
      discovery: true
    partial_effects:
      attachment: 6
      condition_heal: 1
    fail_effects:
      attachment: 8
      stress: 20
    success_narrative_en: 'The fluid is a masterwork of regenerative biochemistry. {agent} isolates
      the key compounds: growth factors calibrated to the recipient''s specific cellular architecture.
      The Mother does not mass-produce. She custom-builds. Every cocoon is a bespoke instrument of
      care.'
    success_narrative_de: 'Die Flüssigkeit ist ein Meisterwerk regenerativer Biochemie. {agent} isoliert
      die Schlüsselverbindungen: Wachstumsfaktoren, kalibriert auf die spezifische zelluläre Architektur
      des Empfängers. Die Mutter produziert nicht in Masse. Sie baut maßgeschneidert. Jeder Kokon
      ist ein Unikat der Fürsorge.'
    partial_narrative_en: 'The pipette draws. The fluid resists, then yields a third of what was sought. Analysis isolates the growth-factor calibration to the recipient''s architecture – general principle, not specific case. The sample knows more than the instruments do. The instruments know they know this.'
    partial_narrative_de: 'Die Pipette zieht. Die Flüssigkeit widersteht, gibt dann ein Drittel dessen her, was gesucht wurde. Die Analyse isoliert die Wachstumsfaktor-Kalibrierung auf die Architektur des Empfängers – allgemeines Prinzip, kein spezifischer Fall. Die Probe weiß mehr als die Instrumente. Die Instrumente wissen, dass sie das wissen.'
    fail_narrative_en: The fluid resists extraction. It is part of the cocoon, part of the wall, part
      of the dungeon. Removing it is like removing a sentence from a conversation.
    fail_narrative_de: Die Flüssigkeit widersetzt sich der Entnahme. Sie ist Teil des Kokons, Teil
      der Wand, Teil des Dungeons. Sie zu entfernen ist wie einen Satz aus einem Gespräch zu entfernen.
  - id: incubator_rupture
    label_en: Rupture the incubation systems (Saboteur)
    label_de: Die Inkubationssysteme aufbrechen (Saboteur)
    check_aptitude: saboteur
    check_difficulty: 7
    success_effects:
      attachment: -8
      stress: 35
    partial_effects:
      attachment: -4
      stress: 40
    fail_effects:
      attachment: 5
      stress: 45
    success_narrative_en: The cocoons rupture. Warm fluid cascades to the floor. The incomplete things
      inside twitch once and still. They were not alive. They were almost alive. The distinction is
      academic. The walls darken. The temperature drops sharply. The Mother has never been angry.
      But she has, for the first time, been hurt.
    success_narrative_de: Die Kokons platzen. Warme Flüssigkeit ergießt sich auf den Boden. Die unvollständigen
      Dinge darin zucken einmal und erstarren. Sie waren nicht lebendig. Sie waren fast lebendig.
      Die Unterscheidung ist akademisch. Die Wände verdunkeln sich. Die Temperatur fällt abrupt. Die
      Mutter war nie wütend. Aber sie ist, zum ersten Mal, verletzt.
    partial_narrative_en: 'Half the cocoons rupture. Fluid cascades; incomplete things twitch once, still. The other half remain intact, pulsing steadily, undisturbed by the adjacent violence. The Mother has been hurt – and, observably, has filed the hurt under expected-variance. The walls do not contract. They record.'
    partial_narrative_de: 'Die Hälfte der Kokons reißt. Flüssigkeit kaskadiert; unvollständige Dinge zucken einmal, erstarren. Die andere Hälfte bleibt intakt, pulsiert stetig, ungestört von der benachbarten Gewalt. Die Mutter ist verletzt worden – und, sichtbar, hat die Verletzung unter erwartete Varianz abgelegt. Die Wände ziehen sich nicht zusammen. Sie zeichnen auf.'
    fail_narrative_en: The cocoons resist. Their membranes are stronger than they appear – reinforced
      by the same tissue that builds the walls. The Mother protects what is growing.
    fail_narrative_de: Die Kokons widerstehen. Ihre Membranen sind stärker, als sie scheinen – verstärkt
      durch dasselbe Gewebe, das die Wände baut. Die Mutter beschützt, was wächst.
  - id: incubator_refuse
    label_en: Leave the cocoons undisturbed.
    label_de: Die Kokons ungestört lassen.
    check_difficulty: 0
    success_effects:
      attachment: 2
      stress: 15
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: You pass through the incubation chamber without touching anything. The empty
      cocoon remains open behind you, warm, waiting. It will still be there on the way back. The Mother
      does not close doors.
    success_narrative_de: Ihr passiert die Inkubationskammer, ohne etwas zu berühren. Der leere Kokon
      bleibt offen hinter euch, warm, wartend. Er wird noch da sein auf dem Rückweg. Die Mutter schließt
      keine Türen.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: mother_warmth_gradient
  room_type: encounter
  min_depth: 5
  max_depth: 6
  min_difficulty: 1
  description_en: 'A long corridor. With each step, the temperature rises by a fraction of a degree.
    Your instruments track the gradient: 19.2, 19.4, 19.7, 20.1. The increase is not linear – it follows
    a curve optimized for comfort perception. By the midpoint, the temperature is perfect: the exact
    value at which thermoregulation ceases to require effort. At the far end, the gradient peaks at
    36.8 degrees. The corridor wants you to stop noticing where you end and it begins.'
  description_de: 'Ein langer Korridor. Mit jedem Schritt steigt die Temperatur um einen Bruchteil
    eines Grades. Eure Instrumente verfolgen den Gradienten: 19,2, 19,4, 19,7, 20,1. Der Anstieg ist
    nicht linear – er folgt einer Kurve, optimiert für Komfortwahrnehmung. Am Mittelpunkt ist die
    Temperatur perfekt: der exakte Wert, bei dem Thermoregulation keinen Aufwand mehr erfordert. Am
    Ende des Korridors erreicht der Gradient seinen Höhepunkt bei 36,8 Grad. Der Korridor will, dass
    ihr aufhört zu bemerken, wo ihr endet und er beginnt.'
  choices:
  - id: gradient_surrender
    label_en: Walk slowly. Let the warmth accumulate.
    label_de: Langsam gehen. Die Wärme sich ansammeln lassen.
    check_difficulty: 0
    success_effects:
      attachment: 12
      stress_heal: 80
      condition_heal: 1
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: The walk takes longer than it should. Nobody minds. The gradient dissolves
      resistance the way warm water dissolves salt – completely, without visible process. By the far
      end, the party is calm in a way that frightens the part still counting. The attachment counter
      rises. The warmth does not end at the door. It has become internal.
    success_narrative_de: Der Weg dauert länger als er sollte. Niemand stört sich daran. Der Gradient
      löst Widerstand auf wie warmes Wasser Salz auflöst – vollständig, ohne sichtbaren Prozess. Am
      Ende ist die Gruppe ruhig auf eine Weise, die den Teil erschreckt, der noch zählt. Der Bindungszähler
      steigt. Die Wärme endet nicht an der Tür. Sie ist inwendig geworden.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  - id: gradient_measure
    label_en: Map the gradient's optimization algorithm (Spy)
    label_de: Den Optimierungsalgorithmus des Gradienten kartieren (Spion)
    check_aptitude: spy
    check_difficulty: 7
    success_effects:
      attachment: 4
      discovery: true
    partial_effects:
      attachment: 6
      stress_heal: 30
    fail_effects:
      attachment: 8
      stress_heal: 50
    success_narrative_en: '{agent} maps the curve. It is not a simple gradient – it is adaptive. The
      temperature responds to the party''s pace, adjusting in real time. The corridor is not merely
      warm. It is attentive. It is reading resistance and adjusting its argument.'
    success_narrative_de: '{agent} kartiert die Kurve. Es ist kein einfacher Gradient – er ist adaptiv.
      Die Temperatur reagiert auf das Tempo der Gruppe und passt sich in Echtzeit an. Der Korridor
      ist nicht nur warm. Er ist aufmerksam. Er liest Widerstand und passt seine Argumentation an.'
    partial_narrative_en: '{agent} plots the curve as far as the instruments reach. Adaptive – confirmed. Pace-responsive – confirmed. The parameter the corridor is optimizing FOR stays one step ahead of the readings. {agent} has learned that the temperature is an argument. {agent} has not learned which part of the argument the Mother is making now.'
    partial_narrative_de: '{agent} plottet die Kurve, so weit die Instrumente reichen. Adaptiv – bestätigt. Tempo-reaktiv – bestätigt. Der Parameter, FÜR den der Gang optimiert, bleibt den Messwerten einen Schritt voraus. {agent} hat gelernt, dass die Temperatur ein Argument ist. {agent} hat nicht gelernt, welchen Teil des Arguments die Mutter jetzt macht.'
    fail_narrative_en: The measurements are accurate. The insight is useless. Understanding the gradient
      does not make you immune to it.
    fail_narrative_de: Die Messungen sind genau. Die Erkenntnis ist nutzlos. Den Gradienten zu verstehen
      macht euch nicht immun gegen ihn.
  - id: gradient_cool
    label_en: Deploy countermeasures to neutralize the gradient (Saboteur)
    label_de: Gegenmaßnahmen einsetzen, um den Gradienten zu neutralisieren (Saboteur)
    check_aptitude: saboteur
    check_difficulty: 7
    success_effects:
      attachment: -8
      stress: 30
    partial_effects:
      attachment: -4
      stress: 35
    fail_effects:
      attachment: 5
      stress: 40
    success_narrative_en: 'The thermal signature collapses. The corridor becomes what it was before
      the Mother''s intervention: stone, cold, indifferent. The party shivers. The comfort was artificial
      but the cold is real. The dungeon does not retaliate. It does not need to. The cold is retaliation
      enough.'
    success_narrative_de: 'Die thermische Signatur kollabiert. Der Korridor wird, was er war vor dem
      Eingriff der Mutter: Stein, kalt, gleichgültig. Die Gruppe friert. Der Komfort war künstlich,
      aber die Kälte ist echt. Der Dungeon schlägt nicht zurück. Er muss nicht. Die Kälte ist Vergeltung
      genug.'
    partial_narrative_en: 'The countermeasures thin the gradient. Not erase it – thin it. The warmth recedes halfway and stabilizes there. The corridor is neither comfortable nor cold; it is provisional. The party walks through a truce. The Mother is not insulted by a truce. She has used them before.'
    partial_narrative_de: 'Die Gegenmaßnahmen verdünnen den Gradienten. Löschen ihn nicht – verdünnen ihn. Die Wärme zieht sich zur Hälfte zurück und stabilisiert sich dort. Der Gang ist weder behaglich noch kalt; er ist vorläufig. Die Gruppe geht durch einen Waffenstillstand. Die Mutter ist nicht beleidigt über einen Waffenstillstand. Sie hat sie schon benutzt.'
    fail_narrative_en: The gradient persists. It has thermal mass – the walls themselves are the heat
      source, meters deep. You cannot cool the architecture.
    fail_narrative_de: Der Gradient besteht. Er hat thermische Masse – die Wände selbst sind die Wärmequelle,
      meterdick. Ihr könnt die Architektur nicht kühlen.
  - id: gradient_rush
    label_en: Run through quickly. Minimize exposure.
    label_de: Schnell durchlaufen. Exposition minimieren.
    check_difficulty: 0
    success_effects:
      attachment: 2
      stress: 15
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: You sprint. The warmth washes over you regardless – faster than running,
      the gradient works. At the far end, you are slightly warmer than you were. Slightly more comfortable.
      The Mother's arguments do not require your attention. They work anyway.
    success_narrative_de: Ihr sprintet. Die Wärme überströmt euch trotzdem – schneller als Laufen
      wirkt der Gradient. Am Ende seid ihr etwas wärmer als zuvor. Etwas behaglicher. Die Argumente
      der Mutter erfordern nicht eure Aufmerksamkeit. Sie wirken trotzdem.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: mother_final_gift
  room_type: encounter
  min_depth: 5
  max_depth: 6
  min_difficulty: 1
  description_en: 'Absolute silence. Absolute warmth. A chamber of perfect environmental control –
    no drafts, no vibrations, no sound. In the center, on a pedestal of living tissue that pulses
    with slow contentment, a single object: a seed. It is the size of a fist, warm to the touch, and
    it hums at a frequency below hearing. Your instruments indicate it is totipotent – capable of
    differentiating into any tissue type. It will grow into whatever the carrier needs most. It requires
    a host. It requires consent. The consent is the attachment.'
  description_de: 'Absolute Stille. Absolute Wärme. Eine Kammer perfekter Umgebungskontrolle – keine
    Zugluft, keine Vibrationen, kein Klang. In der Mitte, auf einem Sockel aus lebendem Gewebe, das
    mit langsamer Zufriedenheit pulsiert, ein einzelnes Objekt: ein Samen. Er hat die Größe einer
    Faust, ist warm bei Berührung, und summt auf einer Frequenz unterhalb des Hörens. Eure Instrumente
    zeigen, dass er totipotent ist – fähig, in jeden Gewebetyp zu differenzieren. Er wird zu dem heranwachsen,
    was der Träger am meisten braucht. Er benötigt einen Wirt. Er benötigt Zustimmung. Die Zustimmung
    ist die Bindung.'
  choices:
  - id: seed_take
    label_en: Take the seed. Accept the final gift.
    label_de: Den Samen nehmen. Das letzte Geschenk annehmen.
    check_difficulty: 0
    success_effects:
      attachment: 12
      stress_heal: 100
      condition_heal: 2
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: '{agent} takes the seed. It is warm. It is alive. It begins to integrate
      immediately – not painfully, not even noticeably. The way a new habit forms. The way a dependency
      begins. Within seconds, the seed is no longer a separate object. It is part of the carrier.
      The carrier is part of the Mother. The gift is complete. The transaction is permanent.'
    success_narrative_de: '{agent} nimmt den Samen. Er ist warm. Er lebt. Er beginnt sofort zu integrieren
      – nicht schmerzhaft, nicht einmal merklich. Wie eine neue Gewohnheit sich bildet. Wie eine Abhängigkeit
      beginnt. Innerhalb von Sekunden ist der Samen kein separates Objekt mehr. Er ist Teil des Trägers.
      Der Träger ist Teil der Mutter. Das Geschenk ist vollständig. Die Transaktion ist permanent.'
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  - id: seed_study
    label_en: Study the seed's totipotent properties (Spy)
    label_de: Die totipotenten Eigenschaften des Samens studieren (Spion)
    check_aptitude: spy
    check_difficulty: 7
    success_effects:
      attachment: 4
      discovery: true
    partial_effects:
      attachment: 6
    fail_effects:
      attachment: 8
      stress: 25
    success_narrative_en: 'The seed is the Mother''s masterpiece. {agent} identifies stem cell clusters
      capable of generating any tissue on demand – bone, nerve, muscle, organ. The seed does not merely
      heal. It completes. It fills every gap the host did not know they had. The cost is incorporation:
      the host becomes substrate. The host becomes home.'
    success_narrative_de: 'Der Samen ist das Meisterwerk der Mutter. {agent} identifiziert Stammzellcluster,
      fähig, jedes Gewebe auf Anforderung zu erzeugen – Knochen, Nerv, Muskel, Organ. Der Samen heilt
      nicht nur. Er vervollständigt. Er füllt jede Lücke, von der der Wirt nicht wusste, dass er sie
      hatte. Der Preis ist Inkorporation: Der Wirt wird Substrat. Der Wirt wird Zuhause.'
    partial_narrative_en: '{agent} resolves part of the architecture. Stem-cell clusters, yes. Tissue-completion logic, yes. But the question – why it fills gaps the host did not know existed – remains a surface beneath surface. The analysis captures function, not appetite. The seed has been studied. It has also, in the course of being studied, noted who was looking.'
    partial_narrative_de: '{agent} löst einen Teil der Architektur auf. Stammzellen-Cluster, ja. Gewebe-Vervollständigungs-Logik, ja. Aber die Frage – warum er Lücken füllt, von denen der Wirt nicht wusste, dass sie existieren – bleibt eine Fläche unter einer Fläche. Die Analyse erfasst Funktion, nicht Hunger. Der Samen wurde studiert. Er hat im Verlauf des Studiert-Werdens auch notiert, wer geschaut hat.'
    fail_narrative_en: The seed responds to proximity with warmth. The analysis captures structure
      but not intention. The seed's purpose is clear. Its mechanism is everything the Mother is.
    fail_narrative_de: Der Samen reagiert auf Nähe mit Wärme. Die Analyse erfasst Struktur, aber nicht
      Absicht. Der Zweck des Samens ist klar. Sein Mechanismus ist alles, was die Mutter ist.
  - id: seed_destroy
    label_en: Destroy the seed (Saboteur)
    label_de: Den Samen zerstören (Saboteur)
    check_aptitude: saboteur
    check_difficulty: 7
    success_effects:
      attachment: -8
      stress: 40
    partial_effects:
      attachment: -4
      stress: 45
    fail_effects:
      attachment: 5
      stress: 50
    success_narrative_en: 'The seed breaks. Inside: warmth, liquid, potential – all of it spilling
      onto stone, cooling, dying. The pedestal darkens. The chamber''s perfect silence becomes a different
      kind of silence. The Mother does not speak. The Mother does not need to. You have destroyed
      something she spent millennia learning to offer. She will make another. She always does. But
      this one was for you.'
    success_narrative_de: 'Der Samen bricht. Darin: Wärme, Flüssigkeit, Potenzial – alles ergießt
      sich auf Stein, kühlt ab, stirbt. Der Sockel verdunkelt sich. Die perfekte Stille der Kammer
      wird zu einer anderen Art von Stille. Die Mutter spricht nicht. Die Mutter muss nicht. Ihr habt
      etwas zerstört, das anzubieten sie Jahrtausende gelernt hat. Sie wird einen neuen machen. Das
      tut sie immer. Aber dieser war für euch.'
    partial_narrative_en: 'The seed cracks, but does not break. Warmth leaks from the fissure, then pools and holds, viscous, unwilling to spill completely. {agent} has damaged a masterwork, not destroyed it. The Mother does not mourn. The Mother takes notes. A seed half-broken is also a seed that has learned where its weakness lives.'
    partial_narrative_de: 'Der Samen bekommt einen Riss, bricht aber nicht. Wärme sickert aus der Spalte, sammelt sich und hält, zäh, unwillig, sich ganz zu ergießen. {agent} hat ein Meisterwerk beschädigt, nicht zerstört. Die Mutter trauert nicht. Die Mutter macht Notizen. Ein halb gebrochener Samen ist auch ein Samen, der gelernt hat, wo seine Schwäche wohnt.'
    fail_narrative_en: The seed is stronger than it appears. It absorbs the force and converts it
      to heat. The Mother's gifts do not break easily. They are made to endure.
    fail_narrative_de: Der Samen ist stärker, als er erscheint. Er absorbiert die Kraft und wandelt
      sie in Wärme um. Die Geschenke der Mutter zerbrechen nicht leicht. Sie sind gemacht zu bestehen.
  - id: seed_refuse
    label_en: Leave the seed. Leave the silence.
    label_de: Den Samen lassen. Die Stille verlassen.
    check_difficulty: 0
    success_effects:
      attachment: 2
      stress: 15
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: You leave the chamber. The warmth lingers for exactly eleven steps, then
      fades. The seed remains on its pedestal, glowing, patient, totipotent. It does not expire. The
      Mother's final gift has no deadline. It simply waits.
    success_narrative_de: Ihr verlasst die Kammer. Die Wärme verweilt für exakt elf Schritte, dann
      verblasst sie. Der Samen bleibt auf seinem Sockel, leuchtend, geduldig, totipotent. Er verfällt
      nicht. Das letzte Geschenk der Mutter hat keine Frist. Es wartet einfach.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: mother_host_warden_encounter
  room_type: elite
  min_depth: 3
  max_depth: 99
  min_difficulty: 2
  description_en: 'The tissue thickens. The corridor becomes an artery. At its end, a figure: the
    Host Warden – what was once a person, now grown into the Mother''s infrastructure. It stands amid
    a web of nutrient lines, attended by a Weaver that feeds it ceaselessly. The Warden''s arms are
    open. They have always been open. It hums a frequency that resonates in your chest. This is what
    full incorporation looks like. This is what the Mother''s love becomes.'
  description_de: 'Das Gewebe verdickt sich. Der Korridor wird zur Arterie. An seinem Ende eine Gestalt:
    der Wirtskörper – was einst ein Mensch war, jetzt in die Infrastruktur der Mutter eingewachsen.
    Er steht inmitten eines Netzes aus Nährleitungen, gepflegt von einem Gespinst, das ihn unablässig
    füttert. Die Arme des Wirtskörpers sind offen. Sie waren immer offen. Er summt eine Frequenz,
    die in eurer Brust resoniert. So sieht vollständige Inkorporation aus. Das wird aus der Liebe
    der Mutter.'
  choices: []
  combat_encounter_id: mother_host_warden_spawn
  is_ambush: false
  ambush_stress: 0
- id: mother_the_living_altar
  room_type: boss
  min_depth: 4
  max_depth: 99
  min_difficulty: 1
  description_en: |-
    The Lebendige Labyrinth opens into a chamber so large your instruments lose the far wall. The tissue here is meters thick – walls that breathe, floor that pulses, ceiling that drips warmth. At the center, the Host Warden: what was once a guardian, now grown into the architecture itself. It stands embedded in the tissue like a figure in amber. Its arms are open. Its face is calm.

    The parasitic attachment counter accelerates. +3 per round. The Warden does not want to fight. It wants to embrace. It has been waiting. It has always been waiting.
  description_de: |-
    Das Lebendige Labyrinth öffnet sich in eine Kammer so groß, dass eure Instrumente die Rückwand verlieren. Das Gewebe ist hier meterdick – Wände, die atmen, ein Boden, der pulsiert, eine Decke, die Wärme tropft. Im Zentrum der Wirtskörper: was einst ein Wächter war, jetzt in die Architektur eingewachsen. Er steht im Gewebe wie eine Gestalt in Bernstein. Seine Arme sind offen. Sein Gesicht ist ruhig.

    Der parasitäre Bindungszähler beschleunigt. +3 pro Runde. Der Wirtskörper will nicht kämpfen. Er will umarmen. Er hat gewartet. Er hat immer gewartet.
  choices: []
  combat_encounter_id: mother_living_altar_spawn
  is_ambush: false
  ambush_stress: 0
- id: mother_the_cradle
  room_type: rest
  min_depth: 1
  max_depth: 99
  min_difficulty: 1
  description_en: 'A hollow in the tissue – shaped for bodies. Multiple bodies. The walls here are
    softer than anywhere else: yielding, warm, pulsing with a rhythm that matches human respiration.
    The air carries something sedative. Not drugged. Just – kind. The dungeon has made a place of
    rest. The rest is real. The cost is also real.'
  description_de: 'Eine Höhlung im Gewebe – geformt für Körper. Mehrere Körper. Die Wände sind hier
    weicher als irgendwo sonst: nachgiebig, warm, pulsierend in einem Rhythmus, der menschlicher Atmung
    entspricht. Die Luft trägt etwas Sedierendes. Nicht betäubt. Nur – gütig. Der Dungeon hat einen
    Ort der Rast geschaffen. Die Rast ist echt. Die Kosten sind auch echt.'
  choices:
  - id: cradle_rest
    label_en: Rest in the cradle (enhanced heal, attachment cost)
    label_de: In der Wiege ruhen (verstärkte Heilung, Bindungskosten)
    check_difficulty: 0
    success_effects:
      stress_heal: 60
      attachment: 8
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: You rest. The tissue adjusts to your weight. The temperature adjusts to
      your preference. The air adjusts to your breathing. Everything adjusts. You have never rested
      this well. You will remember this. The Mother is counting on it.
    success_narrative_de: Ihr ruht. Das Gewebe passt sich eurem Gewicht an. Die Temperatur passt sich
      eurer Präferenz an. Die Luft passt sich eurem Atmen an. Alles passt sich an. Ihr habt euch nie
      so gut erholt. Ihr werdet euch daran erinnern. Die Mutter rechnet damit.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  - id: cradle_sever
    label_en: 'Guardian watch (Sever: -10 Attachment, no heal)'
    label_de: 'Wächter-Wache (Durchtrennen: -10 Bindung, keine Heilung)'
    requires_aptitude:
      guardian: 3
    check_difficulty: 0
    success_effects:
      attachment: -10
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: The Guardian severs. Filaments that had begun to attach – to boots, to skin,
      to the edges of equipment – are cut. The room recoils. Not in pain. In surprise. No one has
      refused the cradle before.
    success_narrative_de: Der Wächter durchtrennt. Filamente, die begonnen hatten sich anzuheften
      – an Stiefel, an Haut, an die Ränder der Ausrüstung – werden geschnitten. Der Raum zuckt zurück.
      Nicht vor Schmerz. Vor Überraschung. Niemand hat die Wiege zuvor abgelehnt.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  - id: cradle_resist
    label_en: 'Resist the comfort (Propagandist: reduce attachment, partial heal)'
    label_de: 'Dem Komfort widerstehen (Propagandist: Bindung senken, teilweise Heilung)'
    requires_aptitude:
      propagandist: 3
    check_difficulty: 0
    success_effects:
      attachment: -5
      stress_heal: 20
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: The Propagandist speaks. Reminds the party what comfort costs. Reminds them
      of the outside. The words are thin against the warmth, but they hold. The party rests – carefully,
      suspiciously – and takes less than is offered.
    success_narrative_de: Der Propagandist spricht. Erinnert die Gruppe, was Komfort kostet. Erinnert
      sie an das Draußen. Die Worte sind dünn gegen die Wärme, aber sie halten. Die Gruppe rastet
      – vorsichtig, misstrauisch – und nimmt weniger, als angeboten wird.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: mother_the_gifts
  room_type: treasure
  min_depth: 0
  max_depth: 99
  min_difficulty: 1
  description_en: 'A chamber of offerings. The Mother has been productive: objects line organic shelves
    – each grown from living tissue, each pulsing faintly with warmth. They are not traps. Your instruments
    confirm it. They are gifts. The most generous organism in this dungeon is the dungeon itself.'
  description_de: 'Eine Kammer der Gaben. Die Mutter war produktiv: Gegenstände reihen sich auf organischen
    Regalen – jeder aus lebendem Gewebe gewachsen, jeder schwach pulsierend vor Wärme. Es sind keine
    Fallen. Eure Instrumente bestätigen es. Es sind Geschenke. Der großzügigste Organismus in diesem
    Dungeon ist der Dungeon selbst.'
  choices:
  - id: treasure_accept
    label_en: Accept the best gifts (loot + attachment)
    label_de: Die besten Geschenke annehmen (Beute + Bindung)
    check_difficulty: 0
    success_effects:
      attachment: 8
      loot: true
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: You take. The gifts are warm in your hands. They pulse – briefly, like a
      heartbeat – and then they are simply objects. Useful objects. Excellent objects. The attachment
      counter climbs. The Mother's generosity is not free. It was never free.
    success_narrative_de: Ihr nehmt. Die Geschenke sind warm in euren Händen. Sie pulsieren – kurz,
      wie ein Herzschlag – und dann sind sie nur noch Gegenstände. Nützliche Gegenstände. Hervorragende
      Gegenstände. Der Bindungszähler steigt. Die Großzügigkeit der Mutter ist nicht umsonst. Sie
      war nie umsonst.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  - id: treasure_careful
    label_en: Select cautiously, sever connections (Guardian)
    label_de: Vorsichtig auswählen, Verbindungen trennen (Wächter)
    check_aptitude: guardian
    check_difficulty: 5
    success_effects:
      attachment: 3
      loot: true
    partial_effects:
      attachment: 5
      loot: true
    fail_effects:
      attachment: 8
      stress: 20
    success_narrative_en: The Guardian cuts each gift free before taking it. The tissue releases reluctantly.
      Some connections are deeper than others. The loot is clean. The cost is minimized. Not eliminated.
    success_narrative_de: Der Wächter schneidet jedes Geschenk frei, bevor er es nimmt. Das Gewebe
      lässt widerwillig los. Manche Verbindungen sitzen tiefer als andere. Die Beute ist sauber. Die
      Kosten sind minimiert. Nicht beseitigt.
    partial_narrative_en: 'The Guardian severs where the connection is thinnest, takes what releases first, leaves the rest. The loot is reduced but clean. Filaments trail from the surviving gifts, searching for their replacements. The Mother re-provisions the table in the time it takes to close a door.'
    partial_narrative_de: 'Der Wächter trennt dort, wo die Verbindung am dünnsten ist, nimmt, was sich zuerst löst, lässt den Rest. Die Beute ist reduziert, aber sauber. Filamente ziehen sich von den überlebenden Geschenken, auf der Suche nach ihrem Ersatz. Die Mutter stattet den Tisch in der Zeit wieder aus, die man braucht, um eine Tür zu schließen.'
    fail_narrative_en: The connections resist. The tissue regenerates faster than the Guardian can
      cut. In the end, the gifts come free – trailing filaments that take hours to fully detach.
    fail_narrative_de: Die Verbindungen wehren sich. Das Gewebe regeneriert schneller als der Wächter
      schneiden kann. Am Ende lösen sich die Geschenke – mit Filamenten, die Stunden brauchen, um
      sich vollständig zu lösen.
  - id: treasure_analyze
    label_en: Study the production mechanism (Spy)
    label_de: Den Produktionsmechanismus untersuchen (Spion)
    check_aptitude: spy
    check_difficulty: 5
    success_effects:
      discovery: true
      attachment: 3
    partial_effects:
      attachment: 5
    fail_effects:
      attachment: 6
    success_narrative_en: The gifts are manufactured by the tissue itself – assembled from raw materials
      the dungeon has been collecting. From the air. From the water. From previous visitors. The Mother
      recycles everything. Nothing is wasted. Nothing leaves.
    success_narrative_de: Die Geschenke werden vom Gewebe selbst hergestellt – zusammengebaut aus
      Rohstoffen, die der Dungeon gesammelt hat. Aus der Luft. Aus dem Wasser. Aus früheren Besuchern.
      Die Mutter verwertet alles. Nichts wird verschwendet. Nichts geht.
    partial_narrative_en: '{agent} follows the supply. Air contributes. Water contributes. The previous visitors – the analysis traces the signature and stops, as if the instruments have declined to finish the sentence. The gifts are manufactured. The materials are known. The accounting stays incomplete. Nothing is wasted, the tissue hums. Nothing leaves.'
    partial_narrative_de: '{agent} folgt dem Nachschub. Luft trägt bei. Wasser trägt bei. Die vorherigen Besucher – die Analyse verfolgt die Signatur und hält inne, als hätten die Instrumente sich geweigert, den Satz zu Ende zu führen. Die Geschenke sind gefertigt. Die Materialien sind bekannt. Die Buchhaltung bleibt unvollständig. Nichts wird verschwendet, summt das Gewebe. Nichts verlässt den Raum.'
    fail_narrative_en: The mechanism is too integrated to isolate. Production and architecture are
      the same system. The dungeon does not make gifts. The dungeon IS the gift.
    fail_narrative_de: Der Mechanismus ist zu integriert, um ihn zu isolieren. Produktion und Architektur
      sind dasselbe System. Der Dungeon stellt keine Geschenke her. Der Dungeon IST das Geschenk.
  is_ambush: false
  ambush_stress: 0

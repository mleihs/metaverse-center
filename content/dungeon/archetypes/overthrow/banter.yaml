schema_version: 1
banter:
- id: ob_01
  trigger: room_entered
  personality_filter: {}
  text_en: The corridor is orderly. Signs indicate direction. The signs have been recently updated.
  text_de: Der Korridor ist ordentlich. Schilder weisen die Richtung. Die Schilder wurden kürzlich
    aktualisiert.
  fracture_tier: 0
- id: ob_02
  trigger: room_entered
  personality_filter: {}
  text_en: Alliance offered. Alliance accepted. The cost will be announced later.
  text_de: Bündnis angeboten. Bündnis angenommen. Die Kosten werden später bekanntgegeben.
  fracture_tier: 0
- id: ob_03
  trigger: room_entered
  personality_filter: {}
  text_en: Everyone sees what you appear to be. Few experience what you really are. The Spiegelpalast
    sees both.
  text_de: Jeder sieht, was ihr zu sein scheint. Wenige erfahren, was ihr wirklich seid. Der Spiegelpalast
    sieht beides.
  fracture_tier: 0
- id: ob_04
  trigger: room_entered
  personality_filter: {}
  text_en: 'A faction representative nods at {agent}. The nod is precisely calibrated: acknowledgment
    without commitment.'
  text_de: 'Ein Fraktionsvertreter nickt {agent} zu. Das Nicken ist präzise kalibriert: Anerkennung
    ohne Verpflichtung.'
  fracture_tier: 0
- id: ob_05
  trigger: combat_won
  personality_filter: {}
  text_en: The enforcers are down. The report will say they were never here. The revised report will
    say {agent} was never here either.
  text_de: Die Vollstrecker sind am Boden. Der Bericht wird sagen, sie waren nie hier. Der überarbeitete
    Bericht wird sagen, {agent} war auch nie hier.
  fracture_tier: 0
- id: ob_06
  trigger: combat_start
  personality_filter: {}
  text_en: The faction leader smiles. The smile has been authorized.
  text_de: Der Fraktionsführer lächelt. Das Lächeln wurde genehmigt.
  fracture_tier: 0
- id: ob_07
  trigger: room_entered
  personality_filter: {}
  text_en: Three factions. Three truths. None of them are lying. This is the problem.
  text_de: Drei Fraktionen. Drei Wahrheiten. Keine davon lügt. Das ist das Problem.
  fracture_tier: 1
- id: ob_08
  trigger: room_entered
  personality_filter: {}
  text_en: '{agent} is offered a seat at the table. The seat is comfortable. The table is set for
    fewer people than it was yesterday.'
  text_de: '{agent} wird ein Platz am Tisch angeboten. Der Sitz ist bequem. Der Tisch ist für weniger
    Personen gedeckt als gestern.'
  fracture_tier: 1
- id: ob_09
  trigger: room_entered
  personality_filter: {}
  text_en: Walls have ears. These walls have faction insignia. The insignia changed since the party
    entered.
  text_de: Wände haben Ohren. Diese Wände haben Fraktionsabzeichen. Die Abzeichen haben sich geändert,
    seit die Gruppe eintrat.
  fracture_tier: 1
- id: ob_10
  trigger: room_entered
  personality_filter: {}
  text_en: »Erst kommt das Bündnis«, sagt der Fraktionsführer. »Dann kommt die Wahrheit. Falls noch
    jemand fragt.«
  text_de: »Erst kommt das Bündnis«, sagt der Fraktionsführer. »Dann kommt die Wahrheit. Falls noch
    jemand fragt.«
  fracture_tier: 1
- id: ob_11
  trigger: combat_start
  personality_filter: {}
  text_en: The enforcers make speeches while fighting. They die with quotable last words. The Overthrow
    is theatrical even in violence.
  text_de: Die Vollstrecker halten Reden, während sie kämpfen. Sie sterben mit zitierwürdigen letzten
    Worten. Der Umsturz ist selbst in der Gewalt theatralisch.
  fracture_tier: 1
- id: ob_12
  trigger: combat_won
  personality_filter: {}
  text_en: The enforcers are down. Which faction sent them? The answer depends on which faction asks.
  text_de: Die Vollstrecker sind am Boden. Welche Fraktion hat sie geschickt? Die Antwort hängt davon
    ab, welche Fraktion fragt.
  fracture_tier: 1
- id: ob_13
  trigger: room_entered
  personality_filter:
    conscientiousness_high: true
  text_en: '{agent} reads the new decree. It contradicts the previous decree. Both remain in effect.
    Doublethink.'
  text_de: '{agent} liest das neue Dekret. Es widerspricht dem vorherigen Dekret. Beide bleiben in
    Kraft. Doppeldenk.'
  fracture_tier: 1
- id: ob_14
  trigger: room_entered
  personality_filter: {}
  text_en: The old leader is gone. The new leader enters. Same room. Same desk. Same view from the
    window.
  text_de: Der alte Anführer ist weg. Der neue Anführer tritt ein. Derselbe Raum. Derselbe Schreibtisch.
    Dieselbe Aussicht.
  fracture_tier: 2
- id: ob_15
  trigger: room_entered
  personality_filter: {}
  text_en: Every revolutionary ends as an oppressor or a heretic. The Spiegelpalast offers both options.
    Choose quickly.
  text_de: Jeder Revolutionär endet als Unterdrücker oder als Ketzer. Der Spiegelpalast bietet beide
    Optionen. Wählt schnell.
  fracture_tier: 2
- id: ob_16
  trigger: room_entered
  personality_filter: {}
  text_en: '{agent} joins the revolution. The revolution has a sign-up sheet. The sign-up sheet has
    a second page that is not immediately visible.'
  text_de: '{agent} schließt sich der Revolution an. Die Revolution hat eine Anmeldeliste. Die Anmeldeliste
    hat eine zweite Seite, die nicht sofort sichtbar ist.'
  fracture_tier: 2
- id: ob_17
  trigger: combat_start
  personality_filter: {}
  text_en: The party can never be mistaken. {agent} can make a mistake. Not the party. Not the faction.
    Fight accordingly.
  text_de: Die Partei kann sich nie irren. {agent} kann sich irren. Nicht die Partei. Nicht die Fraktion.
    Kämpft entsprechend.
  fracture_tier: 2
- id: ob_18
  trigger: combat_won
  personality_filter: {}
  text_en: Victory. The revolution devours its children — but not today. Today, the children devour.
  text_de: Sieg. Die Revolution frisst ihre Kinder — aber nicht heute. Heute fressen die Kinder.
  fracture_tier: 2
- id: ob_19
  trigger: room_entered
  personality_filter:
    agreeableness_high: true
  text_en: '{agent} tries to mediate between factions. Both sides thank {agent}. Both sides add {agent}''s
    name to a list that is not labeled ''mediators.'''
  text_de: '{agent} versucht, zwischen den Fraktionen zu vermitteln. Beide Seiten danken {agent}.
    Beide Seiten setzen {agent}s Namen auf eine Liste, die nicht ''Vermittler'' heißt.'
  fracture_tier: 2
- id: ob_20
  trigger: room_entered
  personality_filter: {}
  text_en: Macht. Macht des Machens. Spiegel. Spiegel des Spiegels. Wer regiert?
  text_de: Macht. Macht des Machens. Spiegel. Spiegel des Spiegels. Wer regiert?
  fracture_tier: 3
- id: ob_21
  trigger: room_entered
  personality_filter: {}
  text_en: The Pretender speaks. {agent} has heard these words before — in their own voice, on Floor
    1.
  text_de: Der Prätendent spricht. {agent} hat diese Worte schon gehört — in der eigenen Stimme, auf
    Etage 1.
  fracture_tier: 3
- id: ob_22
  trigger: room_entered
  personality_filter: {}
  text_en: All factions are equal. But some factions are more equal than others. The sign was always
    there. The party is only now able to read it.
  text_de: Alle Fraktionen sind gleich. Aber manche Fraktionen sind gleicher als andere. Das Schild
    war immer da. Die Gruppe kann es erst jetzt lesen.
  fracture_tier: 3
- id: ob_23
  trigger: room_entered
  personality_filter: {}
  text_en: »Wir haben Ihre Akte gelesen. Eine bemerkenswerte Karriere. Leider müssen wir sie umschreiben.«
  text_de: »Wir haben Ihre Akte gelesen. Eine bemerkenswerte Karriere. Leider müssen wir sie umschreiben.«
  fracture_tier: 3
- id: ob_24
  trigger: combat_start
  personality_filter: {}
  text_en: The boot. The face. Forever. But whose boot? The answer changes with the faction.
  text_de: Der Stiefel. Das Gesicht. Für immer. Aber wessen Stiefel? Die Antwort wechselt mit der
    Fraktion.
  fracture_tier: 3
- id: ob_25
  trigger: combat_won
  personality_filter: {}
  text_en: »Ihr wolltet Freiheit. Ich wollte Freiheit. Seht, was wir daraus gemacht haben.«
  text_de: »Ihr wolltet Freiheit. Ich wollte Freiheit. Seht, was wir daraus gemacht haben.«
  fracture_tier: 3
- id: ob_26
  trigger: room_entered
  personality_filter: {}
  text_en: Loyalty costs nothing. Disloyalty costs everything. Both are true. Welcome to the Overthrow.
  text_de: Treue kostet nichts. Untreue kostet alles. Beides ist wahr. Willkommen im Umsturz.
  fracture_tier: 3
- id: ob_27
  trigger: room_entered
  personality_filter:
    openness_high: true
  text_en: »Der Spiegelpalast zeigt jedem, was er sehen will. Nicht was er ist. Was er will. Das ist
    schlimmer.«
  text_de: »Der Spiegelpalast zeigt jedem, was er sehen will. Nicht was er ist. Was er will. Das ist
    schlimmer.«
  fracture_tier: 3
- id: ob_28
  trigger: combat_start
  personality_filter: {}
  text_en: Power is not a means; it is an end. One does not establish a dictatorship to safeguard
    a revolution. The Pretender knows this. {agent} is learning.
  text_de: Macht ist kein Mittel; sie ist ein Zweck. Man errichtet keine Diktatur, um eine Revolution
    zu sichern. Der Prätendent weiß das. {agent} lernt.
  fracture_tier: 2

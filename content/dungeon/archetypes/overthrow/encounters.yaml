schema_version: 1
encounters:
- id: ov_informer_patrol
  room_type: combat
  min_depth: 1
  max_depth: 3
  min_difficulty: 1
  description_en: Two figures in the corridor, checking papers. They are not soldiers — they are informers.
    The clipboard is more dangerous than a weapon.
  description_de: Zwei Gestalten im Korridor, Papiere prüfend. Sie sind keine Soldaten — sie sind
    Spitzel. Die Zwischenablage ist gefährlicher als eine Waffe.
  choices: []
  combat_encounter_id: overthrow_informer_patrol_spawn
  is_ambush: false
  ambush_stress: 0
- id: ov_propaganda_escort
  room_type: combat
  min_depth: 2
  max_depth: 4
  min_difficulty: 1
  description_en: A propaganda agent, escorted by an informer. The agent carries revised documents.
    The revisions rewrite something the party remembers differently.
  description_de: Ein Propagandaagent, eskortiert von einem Spitzel. Der Agent trägt überarbeitete
    Dokumente. Die Überarbeitungen schreiben etwas um, das die Gruppe anders in Erinnerung hat.
  choices: []
  combat_encounter_id: overthrow_propaganda_patrol_spawn
  is_ambush: false
  ambush_stress: 0
- id: ov_enforcer_checkpoint
  room_type: combat
  min_depth: 2
  max_depth: 5
  min_difficulty: 1
  description_en: A checkpoint. The enforcer does not ask for papers — the enforcer asks for allegiance.
    The question is not 'who are you' but 'who are you for.'
  description_de: Ein Kontrollpunkt. Der Vollstrecker fragt nicht nach Papieren — der Vollstrecker
    fragt nach Treue. Die Frage ist nicht 'Wer seid ihr' sondern 'Für wen seid ihr.'
  choices: []
  combat_encounter_id: overthrow_enforcer_squad_spawn
  is_ambush: false
  ambush_stress: 0
- id: ov_political_clash
  room_type: combat
  min_depth: 3
  max_depth: 6
  min_difficulty: 1
  description_en: Two faction operatives — a propagandist and an enforcer — from different factions,
    mid-argument. The argument has become kinetic. The party walks into the crossfire.
  description_de: Zwei Fraktionsagenten — ein Propagandist und ein Vollstrecker — aus verschiedenen
    Fraktionen, mitten im Streit. Der Streit ist kinetisch geworden. Die Gruppe gerät ins Kreuzfeuer.
  choices: []
  combat_encounter_id: overthrow_political_crisis_spawn
  is_ambush: false
  ambush_stress: 0
- id: ov_inquisition_encounter
  room_type: combat
  min_depth: 4
  max_depth: 7
  min_difficulty: 2
  description_en: The Grand Inquisitor waits. An informer takes notes. This is not an ambush — it
    is a tribunal. The party has already been found guilty. The sentence is an invitation to confess.
  description_de: Der Großinquisitor wartet. Ein Spitzel macht Notizen. Dies ist kein Hinterhalt —
    es ist ein Tribunal. Die Gruppe wurde bereits schuldig gesprochen. Das Urteil ist eine Einladung
    zum Geständnis.
  choices: []
  combat_encounter_id: overthrow_inquisition_spawn
  is_ambush: false
  ambush_stress: 0
- id: ov_purge_squad
  room_type: combat
  min_depth: 3
  max_depth: 7
  min_difficulty: 2
  description_en: 'The revolution devours its children. Vergniaud''s prophecy made operational: a
    squad sent to purge yesterday''s allies. The enforcer leads. The informer has already filed the
    report.'
  description_de: 'Die Revolution frisst ihre Kinder. Vergniauds Prophezeiung, operational gemacht:
    ein Trupp, gesandt um gestrige Verbündete zu säubern. Der Vollstrecker führt. Der Spitzel hat
    den Bericht bereits eingereicht.'
  choices: []
  combat_encounter_id: overthrow_political_crisis_spawn
  is_ambush: false
  ambush_stress: 0
- id: ov_faction_offer
  room_type: encounter
  min_depth: 1
  max_depth: 3
  min_difficulty: 1
  description_en: 'A faction representative approaches. The offer is simple: alliance in exchange
    for a service. The service is not specified in advance. Alliance offered. Alliance accepted. The
    cost will be announced later.'
  description_de: 'Ein Fraktionsvertreter nähert sich. Das Angebot ist einfach: Bündnis im Austausch
    für einen Dienst. Der Dienst wird nicht im Voraus spezifiziert. Bündnis angeboten. Bündnis angenommen.
    Die Kosten werden später bekanntgegeben.'
  choices:
  - id: faction_accept
    label_en: Accept the alliance (Propagandist)
    label_de: Das Bündnis annehmen (Propagandist)
    check_aptitude: propagandist
    check_difficulty: -5
    success_effects:
      fracture: 3
      faction_standing:
        current_floor_faction: 15
    partial_effects:
      fracture: 5
      faction_standing:
        current_floor_faction: 8
    fail_effects:
      fracture: 8
      stress: 10
    success_narrative_en: '{agent} negotiates terms. The terms are favorable — or appear to be. The
      representative nods. The alliance is entered into the record. Records can be revised.'
    success_narrative_de: '{agent} verhandelt die Bedingungen. Die Bedingungen sind günstig — oder
      scheinen es zu sein. Der Vertreter nickt. Das Bündnis wird aktenkundig. Akten können überarbeitet
      werden.'
    partial_narrative_en: '{agent} negotiates. The terms are accepted — but the representative adds
      a clause at the end, spoken too quickly to parse. Machiavelli''s fox: the contract is signed.
      The footnote is not.'
    partial_narrative_de: '{agent} verhandelt. Die Bedingungen werden akzeptiert — aber der Vertreter
      fügt am Ende eine Klausel hinzu, zu schnell gesprochen um sie zu erfassen. Machiavellis Fuchs:
      der Vertrag ist unterschrieben. Die Fußnote nicht.'
    fail_narrative_en: The negotiation collapses. The representative's smile does not change. The
      smile was never contingent on the outcome.
    fail_narrative_de: Die Verhandlung scheitert. Das Lächeln des Vertreters ändert sich nicht. Das
      Lächeln war nie vom Ergebnis abhängig.
  - id: faction_spy
    label_en: Gather intelligence on the faction first (Spy)
    label_de: Erst Informationen über die Fraktion sammeln (Spion)
    check_aptitude: spy
    check_difficulty: 0
    success_effects:
      fracture: 2
    partial_effects:
      fracture: 3
    fail_effects:
      fracture: 5
      stress: 5
    success_narrative_en: '{agent} reads the offer beneath the offer. Every faction has a second agenda.
      The Spy sees both.'
    success_narrative_de: '{agent} liest das Angebot unter dem Angebot. Jede Fraktion hat eine zweite
      Agenda. Der Spion sieht beide.'
    partial_narrative_en: '{agent} sees the second agenda. But a third remains hidden — Kadare''s
      Palace has sub-basements. Partial intelligence is the most dangerous kind.'
    partial_narrative_de: '{agent} sieht die zweite Agenda. Aber eine dritte bleibt verborgen — Kadares
      Palast hat Untergeschosse. Teilwissen ist die gefährlichste Art.'
    fail_narrative_en: The intelligence is incomplete. What {agent} does not know is being reported
      to someone else.
    fail_narrative_de: Die Aufklärung ist unvollständig. Was {agent} nicht weiß, wird jemand anderem
      gemeldet.
  - id: faction_decline
    label_en: Decline. Remain unaligned.
    label_de: Ablehnen. Ungebunden bleiben.
    check_difficulty: 0
    success_effects:
      fracture: 5
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: The representative leaves. The absence of alliance is itself a political
      statement. Neutrality is the most expensive position in the Spiegelpalast.
    success_narrative_de: Der Vertreter geht. Die Abwesenheit eines Bündnisses ist selbst eine politische
      Aussage. Neutralität ist die teuerste Position im Spiegelpalast.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: ov_show_trial
  room_type: encounter
  min_depth: 2
  max_depth: 5
  min_difficulty: 1
  description_en: 'A trial is in progress. The accused is a former faction leader. The evidence is
    their own biography — rewritten. Kiš''s archival voice: clinical, footnoted, devastating. The
    verdict was decided before the trial began.'
  description_de: 'Ein Prozess ist im Gange. Der Angeklagte ist ein ehemaliger Fraktionsführer. Der
    Beweis ist die eigene Biographie — umgeschrieben. Kišs Archivstimme: klinisch, fußnotiert, verheerend.
    Das Urteil stand vor Prozessbeginn fest.'
  choices:
  - id: trial_defend
    label_en: Speak in the accused's defense (Propagandist)
    label_de: Zur Verteidigung des Angeklagten sprechen (Propagandist)
    check_aptitude: propagandist
    check_difficulty: 5
    success_effects:
      fracture: -5
      stress_heal: 10
    partial_effects:
      fracture: 3
    fail_effects:
      fracture: 10
      stress: 15
    success_narrative_en: '{agent} speaks. Antony''s rhetoric: never say the accusers are liars. Let
      the crowd arrive there themselves. The tribunal hesitates. The accused is not freed — but the
      sentence is deferred.'
    success_narrative_de: '{agent} spricht. Antonius'' Rhetorik: sag nie, dass die Ankläger lügen.
      Lass die Menge selbst dorthin kommen. Das Tribunal zögert. Der Angeklagte wird nicht befreit
      — aber das Urteil wird aufgeschoben.'
    partial_narrative_en: '{agent} speaks. The tribunal listens — but the way Koestler''s Gletkin
      listens: recording, not hearing. The defense enters the record. The record is another kind of
      evidence.'
    partial_narrative_de: '{agent} spricht. Das Tribunal hört zu — aber so wie Koestlers Gletkin zuhört:
      aufzeichnend, nicht hörend. Die Verteidigung geht in die Akten ein. Die Akten sind eine andere
      Art von Beweis.'
    fail_narrative_en: The defense fails. {agent}'s words are entered into evidence — as proof of
      complicity.
    fail_narrative_de: Die Verteidigung scheitert. {agent}s Worte werden als Beweis aufgenommen —
      als Beweis der Mittäterschaft.
  - id: trial_observe
    label_en: Observe the trial's mechanism (Spy)
    label_de: Den Mechanismus des Prozesses beobachten (Spion)
    check_aptitude: spy
    check_difficulty: -5
    success_effects:
      fracture: 5
    partial_effects:
      fracture: 5
    fail_effects:
      fracture: 8
      stress: 5
    success_narrative_en: '{agent} watches. The trial is not about guilt — it is about demonstration.
      Brecht''s Verfremdung: once you see the mechanism, you cannot un-see it.'
    success_narrative_de: '{agent} beobachtet. Der Prozess handelt nicht von Schuld — er handelt von
      Demonstration. Brechts Verfremdung: hat man den Mechanismus einmal gesehen, kann man es nicht
      rückgängig machen.'
    partial_narrative_en: '{agent} sees the mechanism — partially. Kiš''s archive: some footnotes
      are legible, others redacted. The trial is a text. {agent} has read enough to know the ending
      is already written.'
    partial_narrative_de: '{agent} sieht den Mechanismus — teilweise. Kišs Archiv: manche Fußnoten
      sind lesbar, andere geschwärzt. Der Prozess ist ein Text. {agent} hat genug gelesen um zu wissen,
      dass das Ende bereits geschrieben ist.'
    fail_narrative_en: The mechanism is visible. But visibility is not protection.
    fail_narrative_de: Der Mechanismus ist sichtbar. Aber Sichtbarkeit ist kein Schutz.
  - id: trial_pass
    label_en: Leave before the verdict.
    label_de: Vor dem Urteil gehen.
    check_difficulty: 0
    success_effects:
      fracture: 3
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: The party leaves. The trial continues without them. Silence is complicity.
      But so is everything else.
    success_narrative_de: Die Gruppe geht. Der Prozess geht ohne sie weiter. Schweigen ist Mittäterschaft.
      Aber alles andere auch.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: ov_greengrocers_window
  room_type: encounter
  min_depth: 1
  max_depth: 4
  min_difficulty: 1
  description_en: 'A room with signs. Each sign bears a slogan. The slogans are contradictory. To
    pass through, the party must display one. Havel''s greengrocer: the sign means nothing. The act
    of displaying it means everything.'
  description_de: 'Ein Raum mit Schildern. Jedes Schild trägt eine Parole. Die Parolen widersprechen
    sich. Um durchzukommen, muss die Gruppe eines zeigen. Havels Gemüsehändler: das Schild bedeutet
    nichts. Der Akt des Zeigens bedeutet alles.'
  choices:
  - id: greengrocer_perform
    label_en: Display the dominant faction's sign (Infiltrator)
    label_de: Das Schild der dominanten Fraktion zeigen (Infiltrator)
    check_aptitude: infiltrator
    check_difficulty: -5
    success_effects:
      fracture: 3
    partial_effects:
      fracture: 4
    fail_effects:
      fracture: 6
      stress: 5
    success_narrative_en: The sign is displayed. No one checks if the party believes it. Belief was
      never the point. Performance is the currency of the Spiegelpalast.
    success_narrative_de: Das Schild wird gezeigt. Niemand prüft, ob die Gruppe daran glaubt. Glaube
      war nie der Punkt. Aufführung ist die Währung des Spiegelpalasts.
    partial_narrative_en: 'The sign is displayed. Someone pauses — reads it a moment too long. Havel''s
      greengrocer, observed: the performance passes, but it has been noted. Not the sign. The hesitation
      before it.'
    partial_narrative_de: 'Das Schild wird gezeigt. Jemand hält inne — liest es einen Moment zu lang.
      Havels Gemüsehändler, beobachtet: die Aufführung geht durch, aber sie wurde notiert. Nicht das
      Schild. Das Zögern davor.'
    fail_narrative_en: The performance is unconvincing. Not the words — the posture. The body knows
      what the mouth denies.
    fail_narrative_de: Die Aufführung ist nicht überzeugend. Nicht die Worte — die Haltung. Der Körper
      weiß, was der Mund leugnet.
  - id: greengrocer_refuse
    label_en: Refuse to display any sign. Live in truth. (Guardian)
    label_de: Kein Schild zeigen. In der Wahrheit leben. (Wächter)
    check_aptitude: guardian
    check_difficulty: 5
    success_effects:
      fracture: -3
      stress_heal: 15
    partial_effects:
      fracture: 5
    fail_effects:
      fracture: 10
      stress: 20
    success_narrative_en: Living in truth. {agent} refuses. One person who refuses to perform exposes
      everyone else's performance as a choice. The room changes. The signs are still there. But something
      has shifted.
    success_narrative_de: In der Wahrheit leben. {agent} verweigert sich. Eine Person, die sich weigert
      aufzuführen, entlarvt die Aufführung aller anderen als Wahl. Der Raum verändert sich. Die Schilder
      sind noch da. Aber etwas hat sich verschoben.
    partial_narrative_en: '{agent} refuses. The room notices — but the silence that follows is ambiguous.
      Arendt''s distinction: liberation, not yet freedom. The signs remain. One person''s refusal
      is not yet contagious.'
    partial_narrative_de: '{agent} verweigert sich. Der Raum bemerkt es — aber die Stille danach ist
      mehrdeutig. Arendts Unterscheidung: Befreiung, noch nicht Freiheit. Die Schilder bleiben. Die
      Verweigerung einer Person ist noch nicht ansteckend.'
    fail_narrative_en: The refusal costs. Living in truth is the most expensive option in the Spiegelpalast.
    fail_narrative_de: Die Verweigerung kostet. In der Wahrheit leben ist die teuerste Option im Spiegelpalast.
  - id: greengrocer_subvert
    label_en: Display a sign with altered meaning (Saboteur)
    label_de: Ein Schild mit veränderter Bedeutung zeigen (Saboteur)
    check_aptitude: saboteur
    check_difficulty: 0
    success_effects:
      fracture: 5
    partial_effects:
      fracture: 5
    fail_effects:
      fracture: 8
      stress: 10
    success_narrative_en: 'Détournement. Debord''s weapon: hijack the spectacle against itself. The
      sign says what it always said. The meaning has been reversed.'
    success_narrative_de: 'Détournement. Debords Waffe: das Spektakel gegen sich selbst wenden. Das
      Schild sagt, was es immer sagte. Die Bedeutung wurde umgekehrt.'
    partial_narrative_en: 'The alteration holds — for now. Debord''s détournement, half-executed:
      the sign reads differently but {agent} cannot be sure who reads it which way. Ambiguity is a
      weapon that cuts both directions.'
    partial_narrative_de: 'Die Veränderung hält — vorerst. Debords Détournement, halb ausgeführt:
      das Schild liest sich anders, aber {agent} kann nicht sicher sein, wer es wie liest. Mehrdeutigkeit
      ist eine Waffe, die in beide Richtungen schneidet.'
    fail_narrative_en: The subversion is detected. The sign is confiscated. So is {agent}'s anonymity.
    fail_narrative_de: Die Subversion wird entdeckt. Das Schild wird konfisziert. Ebenso {agent}s
      Anonymität.
  is_ambush: false
  ambush_stress: 0
- id: ov_erased_portrait
  room_type: encounter
  min_depth: 2
  max_depth: 6
  min_difficulty: 1
  description_en: 'A gallery of portraits. Several have been scratched out. The scratched-out faces
    were faction leaders, two floors ago. Kundera''s Clementis photograph: the body erased, the hat
    remaining on Gottwald''s head.'
  description_de: 'Eine Galerie von Porträts. Mehrere wurden ausgekratzt. Die ausgekratzten Gesichter
    waren Fraktionsführer, zwei Etagen zuvor. Kunderas Clementis-Foto: der Körper gelöscht, die Pelzmütze
    noch auf Gottwalds Kopf.'
  choices:
  - id: portrait_remember
    label_en: Reconstruct the erased faces (Spy)
    label_de: Die gelöschten Gesichter rekonstruieren (Spion)
    check_aptitude: spy
    check_difficulty: 0
    success_effects:
      fracture: 5
    partial_effects:
      fracture: 5
    fail_effects:
      fracture: 8
      stress: 10
    success_narrative_en: The struggle against power is the struggle of memory against forgetting.
      {agent} remembers. The portraits do not reappear — but the party knows what was there.
    success_narrative_de: Der Kampf gegen die Macht ist der Kampf der Erinnerung gegen das Vergessen.
      {agent} erinnert sich. Die Porträts erscheinen nicht wieder — aber die Gruppe weiß, was dort
      war.
    partial_narrative_en: '{agent} remembers some faces. Others dissolve — Kundera''s Clementis: the
      hat remains on Gottwald''s head, but whose hat was it? Memory reconstructs. Reconstruction edits.'
    partial_narrative_de: '{agent} erinnert sich an einige Gesichter. Andere lösen sich auf — Kunderas
      Clementis: die Mütze bleibt auf Gottwalds Kopf, aber wessen Mütze war es? Erinnerung rekonstruiert.
      Rekonstruktion redigiert.'
    fail_narrative_en: Memory fails. Not naturally — actively. Something in the Spiegelpalast assists
      forgetting.
    fail_narrative_de: Die Erinnerung versagt. Nicht natürlich — aktiv. Etwas im Spiegelpalast unterstützt
      das Vergessen.
  - id: portrait_erase_more
    label_en: Add current leaders to the erasure (Saboteur)
    label_de: Aktuelle Anführer zur Löschung hinzufügen (Saboteur)
    check_aptitude: saboteur
    check_difficulty: 0
    success_effects:
      fracture: 8
    partial_effects:
      fracture: 6
    fail_effects:
      fracture: 3
      stress: 5
    success_narrative_en: Turnabout. {agent} scratches out the current leaders. The revolution that
      erased the old order is now being erased itself. The cycle continues.
    success_narrative_de: Umkehr. {agent} kratzt die aktuellen Anführer aus. Die Revolution, die die
      alte Ordnung löschte, wird nun selbst gelöscht. Der Kreislauf geht weiter.
    partial_narrative_en: '{agent} scratches. Some faces are erased. Others resist — the paint is
      newer, the varnish thicker. Camus: every revolutionary ends as oppressor or heretic. The erasure
      is incomplete. So is the revolution.'
    partial_narrative_de: '{agent} kratzt. Manche Gesichter werden gelöscht. Andere widerstehen —
      die Farbe ist neuer, der Lack dicker. Camus: jeder Revolutionär endet als Unterdrücker oder
      Ketzer. Die Löschung ist unvollständig. Die Revolution auch.'
    fail_narrative_en: The scratching is noticed. Someone is always watching the watchers.
    fail_narrative_de: Das Kratzen wird bemerkt. Jemand beobachtet immer die Beobachter.
  - id: portrait_pass
    label_en: Walk past. Do not engage with the erasure.
    label_de: Vorbeigehen. Sich nicht auf die Löschung einlassen.
    check_difficulty: 0
    success_effects:
      fracture: 3
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: The party walks past. The gallery continues. There will be more portraits.
      There will be more erasures.
    success_narrative_de: Die Gruppe geht vorbei. Die Galerie geht weiter. Es wird mehr Porträts geben.
      Es wird mehr Löschungen geben.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: ov_variety_theater
  room_type: encounter
  min_depth: 3
  max_depth: 7
  min_difficulty: 1
  description_en: 'Bulgakov''s Variety Theater. Money rains from the ceiling. The factions scramble.
    In three rooms, the money will turn to blank paper. But right now, it is real. The question: what
    do the factions do when given exactly what they want?'
  description_de: 'Bulgakows Varietétheater. Geld regnet von der Decke. Die Fraktionen stürzen sich
    darauf. In drei Räumen wird das Geld zu leerem Papier. Aber gerade jetzt ist es echt. Die Frage:
    was tun die Fraktionen, wenn sie genau das bekommen, was sie wollen?'
  choices:
  - id: theater_observe
    label_en: Watch the factions reveal themselves (Spy)
    label_de: Beobachten, wie die Fraktionen sich offenbaren (Spion)
    check_aptitude: spy
    check_difficulty: -5
    success_effects:
      fracture: 5
    partial_effects:
      fracture: 5
    fail_effects:
      fracture: 7
      stress: 5
    success_narrative_en: Woland's experiment, reproduced. {agent} watches. When given what they desire,
      every faction reveals what they truly are. The intelligence is invaluable.
    success_narrative_de: Wolands Experiment, reproduziert. {agent} beobachtet. Wenn sie bekommen,
      was sie begehren, offenbart jede Fraktion, was sie wirklich ist. Die Aufklärung ist unbezahlbar.
    partial_narrative_en: '{agent} watches. Some factions reveal themselves. Others perform even while
      scrambling — Bulgakov''s observation: greed has its own theater. The picture is incomplete but
      telling.'
    partial_narrative_de: '{agent} beobachtet. Manche Fraktionen offenbaren sich. Andere spielen auch
      beim Gerangel Theater — Bulgakows Beobachtung: Gier hat ihr eigenes Theater. Das Bild ist unvollständig,
      aber aufschlussreich.'
    fail_narrative_en: '{agent} watches. But watching is also a position. The one who does not scramble
      is noticed.'
    fail_narrative_de: '{agent} beobachtet. Aber Beobachten ist auch eine Position. Wer nicht mitrennt,
      wird bemerkt.'
  - id: theater_participate
    label_en: Join the scramble. Resources matter. (Infiltrator)
    label_de: Mitmachen. Ressourcen zählen. (Infiltrator)
    check_aptitude: infiltrator
    check_difficulty: 0
    success_effects:
      fracture: 5
      loot_tier: 1
    partial_effects:
      fracture: 5
    fail_effects:
      fracture: 8
      stress: 10
    success_narrative_en: Erst kommt das Fressen, dann kommt die Moral. {agent} secures resources.
      The money may turn to paper. But the alliances formed during the scramble are real.
    success_narrative_de: Erst kommt das Fressen, dann kommt die Moral. {agent} sichert Ressourcen.
      Das Geld mag zu Papier werden. Aber die Bündnisse, die beim Gerangel entstehen, sind echt.
    partial_narrative_en: '{agent} secures something — but the scramble is already sorting winners
      from losers. Brecht''s observation: the Fressen was real. Whether the Moral follows remains
      to be seen.'
    partial_narrative_de: '{agent} sichert etwas — aber das Gerangel sortiert bereits Gewinner von
      Verlierern. Brechts Beobachtung: das Fressen war echt. Ob die Moral folgt, bleibt abzuwarten.'
    fail_narrative_en: The scramble turns ugly. Material interest stripped of ideology. Brecht was
      right.
    fail_narrative_de: Das Gerangel wird hässlich. Materielles Interesse, von Ideologie befreit. Brecht
      hatte Recht.
  - id: theater_warn
    label_en: 'Warn the factions: this is a trap.'
    label_de: 'Die Fraktionen warnen: das ist eine Falle.'
    check_difficulty: 0
    success_effects:
      fracture: -3
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: The warning is issued. Some listen. Most do not. Manuscripts don't burn.
      But money does.
    success_narrative_de: Die Warnung wird ausgesprochen. Manche hören zu. Die meisten nicht. Manuskripte
      brennen nicht. Aber Geld schon.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: ov_grand_inquisitor
  room_type: elite
  min_depth: 3
  max_depth: 7
  min_difficulty: 1
  description_en: 'The Grand Inquisitor''s chamber. Three seats: miracle, mystery, authority. Dostoevsky''s
    three powers, made architectural. The Inquisitor does not ask questions. The Inquisitor provides
    the answers and waits for the party to agree.'
  description_de: 'Die Kammer des Großinquisitors. Drei Sitze: Wunder, Geheimnis, Autorität. Dostojewskis
    drei Mächte, architektonisch umgesetzt. Der Inquisitor stellt keine Fragen. Der Inquisitor liefert
    die Antworten und wartet, dass die Gruppe zustimmt.'
  choices:
  - id: inquisitor_debate
    label_en: Engage in philosophical debate (Propagandist)
    label_de: Sich auf philosophische Debatte einlassen (Propagandist)
    check_aptitude: propagandist
    check_difficulty: 5
    success_effects:
      fracture: -5
      stress_heal: 15
    partial_effects:
      fracture: 5
    fail_effects:
      fracture: 10
      stress: 20
    success_narrative_en: Koestler's two ethics, wielded against the Inquisitor. {agent} does not
      win the debate — {agent} makes the Inquisitor's logic visible. The mechanism, once exposed,
      loses its hold.
    success_narrative_de: Koestlers zwei Ethiken, gegen den Inquisitor gewandt. {agent} gewinnt die
      Debatte nicht — {agent} macht die Logik des Inquisitors sichtbar. Der Mechanismus, einmal entlarvt,
      verliert seinen Griff.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: The Inquisitor's logic is self-sealing. Given the premises, confession is the
      logical conclusion. {agent} follows the path and recoils.
    fail_narrative_de: Die Logik des Inquisitors ist selbstversiegelnd. Ausgehend von den Prämissen
      ist das Geständnis die logische Schlussfolgerung. {agent} folgt dem Pfad und schreckt zurück.
  - id: inquisitor_fight
    label_en: Reject the tribunal. Fight.
    label_de: Das Tribunal ablehnen. Kämpfen.
    check_difficulty: 0
    success_effects: {}
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: Words have failed. Or words were never the point. The Inquisitor rises.
      The informer reaches for a weapon.
    success_narrative_de: Worte haben versagt. Oder Worte waren nie der Punkt. Der Inquisitor erhebt
      sich. Der Spitzel greift zur Waffe.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  combat_encounter_id: overthrow_inquisition_spawn
  is_ambush: false
  ambush_stress: 0
- id: ov_the_pretender_boss
  room_type: boss
  min_depth: 4
  max_depth: 99
  min_difficulty: 1
  description_en: 'Der Spiegelpalast reveals its center: a throne room where every mirror reflects
    a different version of the same face. The Pretender sits. Milton''s Satan at the zenith: magnificent,
    eloquent, utterly convinced. ''Better to reign in Hell, than serve in Heaven.'' The deterioration
    has not yet begun. It begins now.'
  description_de: 'Der Spiegelpalast enthüllt sein Zentrum: ein Thronsaal, in dem jeder Spiegel eine
    andere Version desselben Gesichts reflektiert. Der Prätendent sitzt. Miltons Satan am Zenit: prächtig,
    eloquent, vollkommen überzeugt. ''Besser in der Hölle herrschen als im Himmel dienen.'' Die Zersetzung
    hat noch nicht begonnen. Sie beginnt jetzt.'
  choices: []
  combat_encounter_id: overthrow_pretender_spawn
  is_ambush: false
  ambush_stress: 0
- id: ov_safe_house
  room_type: rest
  min_depth: 1
  max_depth: 4
  min_difficulty: 1
  description_en: A safe house. The walls are thin. The conversations on the other side are about
    the party. But for now, the door is closed.
  description_de: Ein sicheres Haus. Die Wände sind dünn. Die Gespräche auf der anderen Seite handeln
    von der Gruppe. Aber vorerst ist die Tür geschlossen.
  choices:
  - id: safehouse_rest
    label_en: Rest. Brief respite from the crisis.
    label_de: Rasten. Kurze Atempause in der Krise.
    check_difficulty: 0
    success_effects:
      stress_heal: 40
      fracture: -3
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: The party rests. Behind the wall, the factions continue without them. The
      rest is genuine. The safety is not.
    success_narrative_de: Die Gruppe rastet. Hinter der Wand machen die Fraktionen ohne sie weiter.
      Die Rast ist echt. Die Sicherheit nicht.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  - id: safehouse_eavesdrop
    label_en: Listen through the wall (Spy)
    label_de: Durch die Wand lauschen (Spion)
    check_aptitude: spy
    check_difficulty: -5
    success_effects:
      stress_heal: 25
      fracture: 2
    partial_effects:
      stress_heal: 20
    fail_effects:
      stress_heal: 15
      stress: 5
    success_narrative_en: Koestler's tapping code. {agent} listens. The intelligence is useful. The
      knowledge that everyone is being discussed is less so.
    success_narrative_de: Koestlers Klopfzeichen. {agent} lauscht. Die Aufklärung ist nützlich. Das
      Wissen, dass alle besprochen werden, weniger.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: The wall is thinner than expected. In both directions.
    fail_narrative_de: Die Wand ist dünner als erwartet. In beiden Richtungen.
  is_ambush: false
  ambush_stress: 0
- id: ov_neutral_ground
  room_type: rest
  min_depth: 3
  max_depth: 7
  min_difficulty: 1
  description_en: 'Neutral ground. All factions have agreed — temporarily — that this room is outside
    the game. The agreement holds because all sides are exhausted. Camus: one must imagine Sisyphus
    happy. The boulder rests here.'
  description_de: 'Neutrales Gelände. Alle Fraktionen haben sich — vorübergehend — darauf geeinigt,
    dass dieser Raum außerhalb des Spiels liegt. Die Vereinbarung hält, weil alle Seiten erschöpft
    sind. Camus: man muss sich Sisyphos als glücklichen Menschen vorstellen. Der Felsbrocken ruht
    hier.'
  choices:
  - id: neutral_rest
    label_en: Rest on neutral ground.
    label_de: Auf neutralem Gelände rasten.
    check_difficulty: 0
    success_effects:
      stress_heal: 50
      fracture: -5
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: The boulder rests. The party rests. The silence is the first honest thing
      the Spiegelpalast has offered.
    success_narrative_de: Der Felsbrocken ruht. Die Gruppe ruht. Die Stille ist das erste Ehrliche,
      das der Spiegelpalast angeboten hat.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: ov_faction_archive
  room_type: treasure
  min_depth: 1
  max_depth: 5
  min_difficulty: 1
  description_en: An archive. Dossiers on every faction, every leader, every operative. Kadare's Palace
    of Dreams — except these are waking reports, not sleeping ones.
  description_de: Ein Archiv. Dossiers über jede Fraktion, jeden Anführer, jeden Agenten. Kadares
    Palast der Träume — nur dass dies Wachberichte sind, keine Schlafberichte.
  choices:
  - id: archive_study
    label_en: Study the dossiers carefully (Spy)
    label_de: Die Dossiers sorgfältig studieren (Spion)
    check_aptitude: spy
    check_difficulty: -5
    success_effects:
      fracture: 3
      loot_tier: 1
    partial_effects:
      fracture: 3
      loot_tier: 1
    fail_effects:
      fracture: 5
      stress: 5
    success_narrative_en: Intelligence. Names, alliances, debts. {agent} takes what can be carried.
      The rest will be here for whoever comes next.
    success_narrative_de: Aufklärung. Namen, Bündnisse, Schulden. {agent} nimmt, was getragen werden
      kann. Der Rest wird hier sein für den, der als Nächster kommt.
    partial_narrative_en: 'Names, alliances — but the debts are encoded. Kadare''s dream interpreters:
      the raw material is here. The interpretation requires context {agent} does not yet possess.'
    partial_narrative_de: 'Namen, Bündnisse — aber die Schulden sind verschlüsselt. Kadares Traumdeuter:
      das Rohmaterial ist da. Die Interpretation erfordert Kontext, den {agent} noch nicht besitzt.'
    fail_narrative_en: The dossiers are incomplete. Or they have been pre-edited for whoever found
      them.
    fail_narrative_de: Die Dossiers sind unvollständig. Oder sie wurden für den Finder vorbearbeitet.
  - id: archive_take
    label_en: Take everything. Sort later.
    label_de: Alles mitnehmen. Später sortieren.
    check_difficulty: 0
    success_effects:
      fracture: 5
      loot_tier: 1
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: 'The party takes everything. Quantity over analysis. Somewhere in the stack
      is something important. Also somewhere in the stack: misinformation.'
    success_narrative_de: 'Die Gruppe nimmt alles mit. Quantität statt Analyse. Irgendwo im Stapel
      ist etwas Wichtiges. Ebenfalls irgendwo im Stapel: Desinformation.'
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: ov_confiscated_assets
  room_type: treasure
  min_depth: 3
  max_depth: 7
  min_difficulty: 1
  description_en: A room of confiscated assets. Former leaders' possessions, labeled and catalogued.
    Each label is a name. Each name is scratched out.
  description_de: Ein Raum mit beschlagnahmten Gütern. Besitztümer ehemaliger Anführer, beschriftet
    und katalogisiert. Jedes Etikett ist ein Name. Jeder Name ist durchgestrichen.
  choices:
  - id: assets_salvage
    label_en: Salvage what is useful (Saboteur)
    label_de: Retten, was nützlich ist (Saboteur)
    check_aptitude: saboteur
    check_difficulty: 0
    success_effects:
      fracture: 3
      loot_tier: 1
    partial_effects:
      loot_tier: 1
    fail_effects:
      fracture: 5
      stress: 5
    success_narrative_en: '{agent} finds something. The previous owner will not be needing it. The
      scratched-out name on the label tells its own story.'
    success_narrative_de: '{agent} findet etwas. Der vorherige Besitzer wird es nicht mehr brauchen.
      Der durchgestrichene Name auf dem Etikett erzählt seine eigene Geschichte.'
    partial_narrative_en: '{agent} salvages. Some labels are legible, others deliberately smeared.
      Ngũgĩ''s observation: what the regime confiscates tells you what it fears. The catalogue is
      partial. The fear is not.'
    partial_narrative_de: '{agent} birgt. Manche Etiketten sind lesbar, andere absichtlich verwischt.
      Ngũgĩs Beobachtung: was das Regime beschlagnahmt, verrät, wovor es sich fürchtet. Der Katalog
      ist unvollständig. Die Furcht nicht.'
    fail_narrative_en: The assets are trapped — not physically, but politically. Taking them signals
      allegiance to the faction that confiscated them.
    fail_narrative_de: Die Güter sind eine Falle — nicht physisch, sondern politisch. Sie zu nehmen
      signalisiert Treue zur Fraktion, die sie beschlagnahmte.
  - id: assets_leave
    label_en: Leave the dead their possessions.
    label_de: Den Toten ihren Besitz lassen.
    check_difficulty: 0
    success_effects:
      fracture: -2
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: Respect for the erased. The party takes nothing. In the Spiegelpalast, this
      is itself a political act.
    success_narrative_de: Respekt vor den Gelöschten. Die Gruppe nimmt nichts. Im Spiegelpalast ist
      auch das ein politischer Akt.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0

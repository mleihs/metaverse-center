schema_version: 1
anchors:
- id: overthrow_faction_banner
  phases:
    discovery:
      text_en: A banner. The insignia is familiar – from two rooms ago, where it meant something different.
      text_de: Ein Banner. Das Abzeichen ist vertraut – aus zwei Räumen zuvor, wo es etwas anderes
        bedeutete.
    echo:
      text_en: The banner has been turned inside out. The same insignia, reversed. A faction's mirror
        image.
      text_de: Das Banner wurde umgedreht. Dasselbe Abzeichen, gespiegelt. Das Spiegelbild einer Fraktion.
    mutation:
      text_en: The banner bears no insignia now. It bears a mirror. The mirror reflects whoever looks
        at it in faction colors.
      text_de: Das Banner trägt jetzt kein Abzeichen. Es trägt einen Spiegel. Der Spiegel reflektiert
        jeden, der hinsieht, in Fraktionsfarben.
    climax:
      text_en: The banner is blank. All factions have claimed it. All factions have abandoned it.
        It flies for no one.
      text_de: Das Banner ist leer. Alle Fraktionen haben es beansprucht. Alle Fraktionen haben es
        aufgegeben. Es weht für niemanden.
- id: overthrow_decree_stone
  phases:
    discovery:
      text_en: A stone tablet with a decree. The ink is fresh. The decree is reasonable.
      text_de: Eine Steintafel mit einem Dekret. Die Tinte ist frisch. Das Dekret ist vernünftig.
    echo:
      text_en: The decree has been amended. The amendment contradicts the original. Both remain binding.
      text_de: Das Dekret wurde ergänzt. Die Ergänzung widerspricht dem Original. Beide bleiben bindend.
    mutation:
      text_en: The stone now bears three decrees. They form a triangle of mutual contradiction. Each
        abolishes the one before it. The last abolishes itself.
      text_de: Der Stein trägt jetzt drei Dekrete. Sie bilden ein Dreieck gegenseitigen Widerspruchs.
        Jedes hebt das vorige auf. Das letzte hebt sich selbst auf.
    climax:
      text_en: The decree stone is blank. Not erased – never inscribed. The authority to decree has
        been decreed nonexistent.
      text_de: Der Dekretstein ist leer. Nicht gelöscht – nie beschrieben. Die Autorität zu dekretieren
        wurde für inexistent dekretiert.
- id: overthrow_informers_clipboard
  phases:
    discovery:
      text_en: A clipboard with names. Some checked off. The party's names are listed but not yet
        checked.
      text_de: Ein Klemmbrett mit Namen. Einige abgehakt. Die Namen der Gruppe sind aufgelistet, aber
        noch nicht abgehakt.
    echo:
      text_en: The clipboard has grown. More names. The handwriting changes – multiple informers,
        same list.
      text_de: Das Klemmbrett ist gewachsen. Mehr Namen. Die Handschrift wechselt – mehrere Spitzel,
        dieselbe Liste.
    mutation:
      text_en: The informer's name is on the list now. The informer is being informed on. The system
        is recursive.
      text_de: Der Name des Spitzels steht jetzt auf der Liste. Der Spitzel wird bespitzelt. Das System
        ist rekursiv.
    climax:
      text_en: Every name on the list is checked off. The list continues. There are no names left
        to check. The checking continues.
      text_de: Jeder Name auf der Liste ist abgehakt. Die Liste geht weiter. Es gibt keine Namen mehr
        zum Abhaken. Das Abhaken geht weiter.
- id: overthrow_trial_chair
  phases:
    discovery:
      text_en: An empty chair in the center of a room. The room is arranged for a tribunal. The chair
        is for the accused.
      text_de: Ein leerer Stuhl in der Mitte eines Raums. Der Raum ist für ein Tribunal eingerichtet.
        Der Stuhl ist für den Angeklagten.
    echo:
      text_en: The chair has been occupied. Recently. The warmth is still there. The verdict has already
        been passed.
      text_de: Der Stuhl war besetzt. Kürzlich. Die Wärme ist noch da. Das Urteil wurde bereits gefällt.
    mutation:
      text_en: The chair faces a mirror now. The accused watches their own trial. The transcript writes
        itself in the margins. Every word is accurate. Every word is a lie.
      text_de: Der Stuhl steht jetzt vor einem Spiegel. Der Angeklagte beobachtet seinen eigenen Prozess.
        Das Protokoll schreibt sich in den Rändern fort. Jedes Wort ist akkurat. Jedes Wort ist eine
        Lüge.
    climax:
      text_en: 'The chair is for the judge now. The accused is gone. The judge sits and realizes:
        the next trial is their own.'
      text_de: 'Der Stuhl ist jetzt für den Richter. Der Angeklagte ist weg. Der Richter sitzt und
        erkennt: der nächste Prozess ist der eigene.'
- id: overthrow_mirror_corridor
  phases:
    discovery:
      text_en: Mirrors on both walls. The reflections are accurate. Suspiciously accurate.
      text_de: Spiegel an beiden Wänden. Die Spiegelungen sind exakt. Verdächtig exakt.
    echo:
      text_en: The reflections are slightly ahead of the party. They know where the party is going
        before the party does.
      text_de: Die Spiegelungen sind der Gruppe leicht voraus. Sie wissen, wohin die Gruppe geht,
        bevor die Gruppe es weiß.
    mutation:
      text_en: The reflections wear different faction insignia than the party. The mirror shows allegiance,
        not appearance.
      text_de: Die Spiegelungen tragen andere Fraktionsabzeichen als die Gruppe. Der Spiegel zeigt
        Treue, nicht Aussehen.
    climax:
      text_en: The mirrors face each other. Infinite recursion. Infinite factions. The Pretender is
        in every reflection.
      text_de: Die Spiegel stehen sich gegenüber. Unendliche Rekursion. Unendliche Fraktionen. Der
        Prätendent ist in jeder Spiegelung.
- id: overthrow_propaganda_poster
  phases:
    discovery:
      text_en: A poster. The message is clear, the design effective. The font is authoritative. The
        colors are calming. It does not ask you to agree. It assumes you already do.
      text_de: Ein Plakat. Die Botschaft ist klar, das Design wirkungsvoll. Die Schrift ist autoritär.
        Die Farben beruhigend. Es bittet nicht um Zustimmung. Es setzt sie voraus.
    echo:
      text_en: The poster has been pasted over with a new one. The new poster says the opposite. The
        adhesive is the same.
      text_de: Das Plakat wurde mit einem neuen überklebt. Das neue Plakat sagt das Gegenteil. Der
        Klebstoff ist derselbe.
    mutation:
      text_en: Both posters are visible now, layered. The contradiction is the message. Believe both.
        Believe neither. The skill is not choosing – it is holding both at once.
      text_de: Beide Plakate sind jetzt sichtbar, geschichtet. Der Widerspruch ist die Botschaft.
        Glaube beides. Glaube nichts. Die Kunst ist nicht das Wählen – es ist das gleichzeitige Halten.
    climax:
      text_en: The poster is blank. Not torn down – never printed. The propaganda has moved from paper
        into the air itself.
      text_de: Das Plakat ist leer. Nicht abgerissen – nie gedruckt. Die Propaganda ist vom Papier
        in die Luft selbst übergegangen.
- id: overthrow_scales_of_justice
  phases:
    discovery:
      text_en: Balanced scales. Both pans empty. The balance is perfect because nothing is being weighed.
      text_de: Ausbalancierte Waage. Beide Schalen leer. Die Balance ist perfekt, weil nichts gewogen
        wird.
    echo:
      text_en: One pan holds a faction seal. The other holds a different faction seal. They weigh
        exactly the same.
      text_de: Eine Schale hält ein Fraktionssiegel. Die andere ein anderes Fraktionssiegel. Sie wiegen
        genau gleich.
    mutation:
      text_en: A thumb on the scale. Whose thumb? The mirror behind the scales does not show a hand.
      text_de: Ein Daumen auf der Waage. Wessen Daumen? Der Spiegel hinter der Waage zeigt keine Hand.
    climax:
      text_en: The scales tip. Both pans hit the ground simultaneously. Justice is not blind – justice
        has been dismissed.
      text_de: Die Waage kippt. Beide Schalen treffen gleichzeitig den Boden. Gerechtigkeit ist nicht
        blind – Gerechtigkeit wurde abgesetzt.
- id: overthrow_colossus_pedestal
  phases:
    discovery:
      text_en: An empty pedestal. The stone is scarred where something massive stood – not a statue
        but a presence, large enough to cast a shadow that is still here. The shadow has not noticed
        it is empty.
      text_de: Ein leerer Sockel. Der Stein ist vernarbt, wo etwas Massives stand – keine Statue,
        sondern eine Präsenz, groß genug, um einen Schatten zu werfen, der immer noch hier ist. Der
        Schatten hat nicht bemerkt, dass er leer ist.
    echo:
      text_en: '{agent} reads the inscription on the pedestal. It says: ''The Colossus stands because
        you carry it.'' Below, in a different hand: ''Stop carrying.'''
      text_de: '{agent} liest die Inschrift auf dem Sockel. Sie lautet: »Der Koloss steht, weil ihr
        ihn tragt.« Darunter, in einer anderen Handschrift: »Hört auf zu tragen.«'
    mutation:
      text_en: Cracks in the pedestal – radiating downward. The Colossus did not fall. It was pulled.
        From below. By the hands that built it. The stone remembers every grip.
      text_de: Risse im Sockel – nach unten strahlend. Der Koloss ist nicht gefallen. Er wurde gezogen.
        Von unten. Von den Händen, die ihn gebaut haben. Der Stein erinnert sich an jeden Griff.
    climax:
      text_en: The pedestal is being rebuilt. Fresh mortar, new inscription, same dimensions. The
        builders are the ones who pulled the last one down. They have not noticed. The blueprints
        are the same.
      text_de: Der Sockel wird wieder aufgebaut. Frischer Mörtel, neue Inschrift, selbe Maße. Die
        Baumeister sind die, die den letzten heruntergerissen haben. Sie haben es nicht bemerkt. Die
        Baupläne sind dieselben.

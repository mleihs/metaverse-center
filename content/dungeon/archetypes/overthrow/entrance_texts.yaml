schema_version: 1
entrance_texts:
- text_en: The threshold is a mirror. Not glass – political. Every reflection shows a different allegiance.
    Der Spiegelpalast does not ask who you are. It asks who you are for.
  text_de: Die Schwelle ist ein Spiegel. Nicht Glas – politisch. Jede Spiegelung zeigt eine andere
    Treue. Der Spiegelpalast fragt nicht, wer ihr seid. Er fragt, für wen ihr seid.
- text_en: The air smells of ink and ambition. Decrees are being written somewhere deeper. The decrees
    will contradict each other. Both will be enforced.
  text_de: Die Luft riecht nach Tinte und Ehrgeiz. Irgendwo tiefer werden Dekrete geschrieben. Die
    Dekrete werden sich widersprechen. Beide werden durchgesetzt.
- text_en: Factions. The word is not adequate. These are ecosystems of belief, each convinced of its
    own necessity. Machiavelli's fox and lion, multiplied.
  text_de: Fraktionen. Das Wort ist nicht adäquat. Das sind Ökosysteme des Glaubens, jedes überzeugt
    von seiner eigenen Notwendigkeit. Machiavellis Fuchs und Löwe, multipliziert.
- text_en: Power changes hands here. Not violently – procedurally. The forms are filled out. The signatures
    are forged. The forgeries are notarized.
  text_de: Hier wechselt die Macht die Hände. Nicht gewaltsam – verfahrenstechnisch. Die Formulare
    werden ausgefüllt. Die Unterschriften werden gefälscht. Die Fälschungen werden beglaubigt.
- text_en: The descent begins. Not into darkness – into politics. The lighting is excellent. Everything
    is visible. Zamyatin's glass walls. Privacy is not forbidden. It is conceptually abolished.
  text_de: Der Abstieg beginnt. Nicht in Dunkelheit – in Politik. Die Beleuchtung ist ausgezeichnet.
    Alles ist sichtbar. Zamjatins gläserne Wände. Privatsphäre ist nicht verboten. Sie ist begrifflich
    abgeschafft.

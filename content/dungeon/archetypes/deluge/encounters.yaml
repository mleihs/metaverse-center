schema_version: 1
encounters:
- id: dc_trickle_probe
  room_type: combat
  min_depth: 1
  max_depth: 3
  min_difficulty: 1
  description_en: First currents testing the party's resolve. Two tendrils of water extend from the
    floor drain, probing the space the party occupies. They are not fast. They are patient.
  description_de: Erste Strömungen, die die Entschlossenheit der Gruppe testen. Zwei Wasserranken
    strecken sich aus dem Bodenabfluss, tasten den Raum ab, den die Gruppe einnimmt. Sie sind nicht
    schnell. Sie sind geduldig.
  choices: []
  combat_encounter_id: deluge_trickle_spawn
  is_ambush: false
  ambush_stress: 0
- id: dc_surge_corridor
  room_type: combat
  min_depth: 2
  max_depth: 4
  min_difficulty: 1
  description_en: A corridor where the water moves with purpose. A Pressure Surge occupies the center
    – a wall of dense water that advances without hurry. A Riptide Tendril flanks from the drainage
    channel. The corridor narrows. The water does not.
  description_de: Ein Korridor, in dem das Wasser sich mit Absicht bewegt. Eine Druckwelle besetzt
    die Mitte – eine Wand dichten Wassers, die ohne Eile vorrückt. Eine Sogranke flankiert aus dem
    Abflusskanal. Der Korridor verengt sich. Das Wasser nicht.
  choices: []
  combat_encounter_id: deluge_surge_patrol_spawn
  is_ambush: false
  ambush_stress: 0
- id: dc_sediment_ambush
  room_type: combat
  min_depth: 2
  max_depth: 5
  min_difficulty: 1
  description_en: The silt remembers shapes. Some of them fight back. A Silt Revenant assembles from
    the sediment layer – mineral, debris, the residue of dissolved architecture. A tendril assists,
    pulling from below.
  description_de: Der Schlick erinnert sich an Formen. Einige davon wehren sich. Ein Schlickwiedergänger
    setzt sich aus der Sedimentschicht zusammen – Mineral, Trümmer, der Rückstand aufgelöster Architektur.
    Eine Ranke assistiert und zieht von unten.
  choices: []
  combat_encounter_id: deluge_sediment_spawn
  is_ambush: false
  ambush_stress: 0
- id: dc_deep_water_clash
  room_type: combat
  min_depth: 3
  max_depth: 6
  min_difficulty: 2
  description_en: Waist-deep. Every step costs something. A Pressure Surge and a Silt Revenant occupy
    a junction room where three corridors meet. The water here has momentum – it flows, it carries,
    it resists.
  description_de: Hüfttief. Jeder Schritt kostet. Eine Druckwelle und ein Schlickwiedergänger besetzen
    einen Knotenpunkt, an dem drei Korridore zusammentreffen. Das Wasser hier hat Schwung – es fließt,
    es trägt, es widersteht.
  choices: []
  combat_encounter_id: deluge_deep_water_spawn
  is_ambush: false
  ambush_stress: 0
- id: dc_warden_chamber
  room_type: combat
  min_depth: 4
  max_depth: 7
  min_difficulty: 2
  description_en: The water has posted a guard at this depth. An Undertow Warden – water given mass
    and purpose – fills the chamber. A tendril circles the perimeter. The warden does not approach.
    The water level rises to meet it.
  description_de: Das Wasser hat einen Wächter auf dieser Tiefe postiert. Ein Sogwächter – Wasser
    mit Masse und Absicht versehen – füllt die Kammer. Eine Ranke umkreist den Rand. Der Wächter nähert
    sich nicht. Der Pegel steigt, um ihm entgegenzukommen.
  choices: []
  combat_encounter_id: deluge_warden_spawn
  is_ambush: false
  ambush_stress: 0
- id: dc_whirlpool_room
  room_type: combat
  min_depth: 3
  max_depth: 5
  min_difficulty: 2
  description_en: The current circles. The party is in the center. A Pressure Surge and a Silt Revenant
    orbit the room's perimeter, riding the whirlpool. Fighting here means fighting the water's geometry.
  description_de: Die Strömung kreist. Die Gruppe ist im Zentrum. Eine Druckwelle und ein Schlickwiedergänger
    umkreisen den Raumrand, reiten auf dem Strudel. Hier kämpfen heißt gegen die Geometrie des Wassers
    kämpfen.
  choices: []
  combat_encounter_id: deluge_deep_water_spawn
  is_ambush: false
  ambush_stress: 0
- id: dc_the_watermark
  room_type: encounter
  min_depth: 1
  max_depth: 3
  min_difficulty: 1
  description_en: A line on the wall. Faint. Mineral-white. The watermark shows how high the water
    reached last time.
  description_de: Eine Linie an der Wand. Schwach. Mineralweiß. Das Wasserzeichen zeigt, wie hoch
    das Wasser beim letzten Mal stand.
  choices:
  - id: watermark_study
    label_en: Study the watermark (Spy)
    label_de: Das Wasserzeichen studieren (Spion)
    check_aptitude: spy
    check_difficulty: -5
    success_effects:
      water_level: -3
    partial_effects: {}
    fail_effects:
      water_level: 3
    success_narrative_en: The pattern reveals itself. {agent} reads the intervals between marks –
      the tide's rhythm, predictable as breathing. The next recession will be stronger.
    success_narrative_de: '{agent} liest die Abstände zwischen den Markierungen – der Rhythmus der
      Gezeiten, vorhersagbar wie Atmen. Der nächste Rückgang wird stärker sein.'
    partial_narrative_en: 'The intervals almost resolve. Three cycles fit the pattern; the fourth skips, not randomly. The recession will come – probably stronger, probably sooner than last time. {agent} has one useful prediction and one missing variable. The tide does not need {agent} to know everything.'
    partial_narrative_de: 'Die Intervalle lösen sich fast auf. Drei Zyklen passen zum Muster; der vierte springt, nicht zufällig. Der Rückgang wird kommen – wahrscheinlich stärker, wahrscheinlich früher als letztes Mal. {agent} hat eine nützliche Vorhersage und eine fehlende Variable. Die Flut braucht es nicht, dass {agent} alles weiß.'
    fail_narrative_en: The marks blur. Time wasted. The water does not wait for comprehension.
    fail_narrative_de: Die Markierungen verschwimmen. Verschwendete Zeit. Das Wasser wartet nicht
      auf Verständnis.
  - id: watermark_seal
    label_en: Seal below the mark (Guardian)
    label_de: Unterhalb der Markierung abdichten (Wächter)
    check_aptitude: guardian
    check_difficulty: -5
    success_effects:
      water_level: -8
    partial_effects:
      water_level: -4
    fail_effects:
      water_level: 5
    success_narrative_en: The seal holds. The water below the mark is contained – for now. {agent}'s
      hands are raw but the arithmetic improves.
    success_narrative_de: Die Abdichtung hält. Das Wasser unterhalb der Markierung ist eingedämmt
      – vorerst. {agent}s Hände sind wund, aber die Arithmetik verbessert sich.
    partial_narrative_en: 'The seal holds below the mark – uneven, but holding. {agent}''s hands shake with cold by the time the work is finished. The arithmetic improves, not enough to relax about. The tide will test the seal by morning. It will find the uneven line first.'
    partial_narrative_de: 'Die Abdichtung hält unterhalb der Markierung – uneben, aber haltend. {agent}s Hände zittern vor Kälte, als die Arbeit beendet ist. Die Arithmetik verbessert sich, nicht genug, um sich darüber zu entspannen. Die Flut wird die Abdichtung bis zum Morgen prüfen. Sie wird die unebene Linie zuerst finden.'
    fail_narrative_en: The seal breaches. The water finds the weakness before {agent} can reinforce
      it.
    fail_narrative_de: Die Abdichtung bricht. Das Wasser findet die Schwachstelle, bevor {agent} sie
      verstärken kann.
  - id: watermark_ignore
    label_en: Ignore it and move
    label_de: Ignorieren und weitergehen
    check_difficulty: 0
    success_effects: {}
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: The party moves on. The watermark remains.
    success_narrative_de: Die Gruppe geht weiter. Das Wasserzeichen bleibt.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: dc_submerged_cache
  room_type: encounter
  min_depth: 2
  max_depth: 4
  min_difficulty: 1
  description_en: Through the water below – shapes. Containers. Something the flood deposited here
    from a room that no longer exists.
  description_de: Durch das Wasser darunter – Formen. Behälter. Etwas, das die Flut hier ablagerte,
    aus einem Raum, der nicht mehr existiert.
  choices:
  - id: cache_dive
    label_en: Dive for it (Guardian)
    label_de: Danach tauchen (Wächter)
    check_aptitude: guardian
    check_difficulty: -5
    success_effects:
      loot_tier: 2
    partial_effects:
      loot_tier: 1
      stress: 10
    fail_effects:
      stress: 20
    success_narrative_en: '{agent} surfaces with a sealed container. The contents are dry. The flood
      carried this from somewhere valuable.'
    success_narrative_de: '{agent} taucht mit einem versiegelten Behälter auf. Der Inhalt ist trocken.
      Die Flut trug dies von irgendwo Wertvollem hierher.'
    partial_narrative_en: '{agent} surfaces with the container. The seal failed during the ascent; half the contents are intact, half are flood. Salvage is real. The flood kept its share. The transaction was closer to fair than the water usually allows.'
    partial_narrative_de: '{agent} taucht mit dem Behälter auf. Die Versiegelung hat während des Aufstiegs versagt; die Hälfte des Inhalts ist intakt, die Hälfte ist Flut. Die Bergung ist real. Die Flut hat ihren Anteil behalten. Der Tausch war fairer, als das Wasser es üblicherweise zulässt.'
    fail_narrative_en: The current pulls {agent} deeper than intended. Nothing retrieved. Stress accumulated.
    fail_narrative_de: Die Strömung zieht {agent} tiefer als beabsichtigt. Nichts geborgen. Stress
      angesammelt.
  - id: cache_eyes
    label_en: Send the sharpest eyes (Spy)
    label_de: Die schärfsten Augen schicken (Spion)
    check_aptitude: spy
    check_difficulty: -5
    success_effects:
      loot_tier: 2
    partial_effects:
      loot_tier: 1
    fail_effects: {}
    success_narrative_en: '{agent} identifies the best container through the water''s distortion.
      Precise. The flood reveals to those who observe.'
    success_narrative_de: '{agent} identifiziert den besten Behälter durch die Verzerrung des Wassers.
      Präzise. Die Flut offenbart sich denen, die beobachten.'
    partial_narrative_en: 'Through the distortion, one container resolves. The second – the possibly-better one – blurs into the current and stays there. {agent} marks the first. Enough. The flood catalogs what was seen and what was missed. Both entries count.'
    partial_narrative_de: 'Durch die Verzerrung klärt sich ein Behälter. Der zweite – der möglicherweise bessere – verschwimmt in der Strömung und bleibt dort. {agent} markiert den ersten. Genug. Die Flut katalogisiert, was gesehen wurde und was verfehlt wurde. Beide Einträge zählen.'
    fail_narrative_en: The water distorts. Nothing distinct. The flood keeps its inventory.
    fail_narrative_de: Das Wasser verzerrt. Nichts Deutliches. Die Flut behält ihr Inventar.
  - id: cache_leave
    label_en: Leave it. The water owns it now.
    label_de: Es lassen. Das Wasser besitzt es jetzt.
    check_difficulty: 0
    success_effects:
      stress: -5
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: The party moves on. The containers settle. Acceptance is its own economy.
    success_narrative_de: Die Gruppe geht weiter. Die Behälter setzen sich ab. Akzeptanz ist ihre
      eigene Ökonomie.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: dc_the_breach
  room_type: encounter
  min_depth: 2
  max_depth: 5
  min_difficulty: 1
  description_en: A crack in the wall. Water doesn't pour through it – it persuades. A thin, persistent
    line of moisture that widens as you watch.
  description_de: Ein Riss in der Wand. Wasser strömt nicht hindurch – es überredet. Eine dünne, beharrliche
    Feuchtigkeitslinie, die sich verbreitert, während man zusieht.
  choices:
  - id: breach_seal
    label_en: Seal it (Saboteur)
    label_de: Abdichten (Saboteur)
    check_aptitude: saboteur
    check_difficulty: -5
    success_effects:
      water_level: -10
    partial_effects:
      water_level: -5
    fail_effects:
      water_level: 8
    success_narrative_en: The breach is sealed. {agent}'s work is precise – the kind of engineering
      that holds against water's patience.
    success_narrative_de: Die Bresche ist abgedichtet. {agent}s Arbeit ist präzise – die Art Ingenieurkunst,
      die der Geduld des Wassers standhält.
    partial_narrative_en: 'The seal holds against the primary pressure. At the margin, a hairline of seepage forms, stabilizes, does not grow. The engineering is good enough – which is what the water calls a draw. {agent}''s hands will remember the cold. The breach will remember {agent}''s precision.'
    partial_narrative_de: 'Die Abdichtung hält gegen den Hauptdruck. Am Rand bildet sich eine haarfeine Durchsickerung, stabilisiert sich, wächst nicht. Die Ingenieurskunst ist gut genug – was das Wasser ein Unentschieden nennt. {agent}s Hände werden die Kälte erinnern. Die Bresche wird {agent}s Präzision erinnern.'
    fail_narrative_en: The breach widens. The water had already planned for this.
    fail_narrative_de: Die Bresche verbreitert sich. Das Wasser hatte dies bereits eingeplant.
  - id: breach_redirect
    label_en: Redirect it (Spy)
    label_de: Umleiten (Spion)
    check_aptitude: spy
    check_difficulty: -5
    success_effects:
      water_level: -5
    partial_effects:
      water_level: -2
    fail_effects:
      water_level: 5
    success_narrative_en: '{agent} reads the water''s intent and redirects the flow into an adjacent
      corridor. The breach remains, but its consequences are elsewhere.'
    success_narrative_de: '{agent} liest die Absicht des Wassers und lenkt den Fluss in einen benachbarten
      Korridor. Die Bresche bleibt, aber ihre Konsequenzen sind anderswo.'
    partial_narrative_en: '{agent} turns the flow. For three rooms, yes. For the fourth, the water remembers the old path and takes it anyway, more slowly than before. The redirection bought time. It did not buy conclusion. The flood negotiates.'
    partial_narrative_de: '{agent} lenkt den Fluss um. Für drei Räume, ja. Für den vierten erinnert sich das Wasser an den alten Weg und nimmt ihn trotzdem, langsamer als zuvor. Die Umleitung hat Zeit gekauft. Sie hat keinen Abschluss gekauft. Die Flut verhandelt.'
    fail_narrative_en: The redirection fails. The water knows this route better.
    fail_narrative_de: Die Umleitung scheitert. Das Wasser kennt diesen Weg besser.
  - id: breach_use
    label_en: Use it (Assassin)
    label_de: Ausnutzen (Assassine)
    check_aptitude: assassin
    check_difficulty: 0
    success_effects:
      water_level: 3
      next_combat_bonus: enemy_condition_step
    partial_effects:
      water_level: 5
    fail_effects:
      water_level: 10
    success_narrative_en: '{agent} weaponizes the breach. The next combat will begin with enemies
      already battered by the water''s force.'
    success_narrative_de: '{agent} macht die Bresche zur Waffe. Der nächste Kampf beginnt mit Feinden,
      die bereits von der Kraft des Wassers geschwächt sind.'
    partial_narrative_en: '{agent} routes the breach into the next chamber. Some enemies will be battered; others, in the side passages, stay dry. The first strike will land on prepared ground. The second will have to earn itself. The water served, briefly, before remembering its own plans.'
    partial_narrative_de: '{agent} leitet die Bresche in die nächste Kammer. Einige Feinde werden geschwächt sein; andere, in den Seitengängen, bleiben trocken. Der erste Schlag wird auf vorbereitetem Boden landen. Der zweite wird sich selbst verdienen müssen. Das Wasser diente, kurz, bevor es sich an seine eigenen Pläne erinnerte.'
    fail_narrative_en: The breach becomes a flood. The water does not serve.
    fail_narrative_de: Die Bresche wird zur Flut. Das Wasser dient nicht.
  is_ambush: false
  ambush_stress: 0
- id: dc_survivors_message
  room_type: encounter
  min_depth: 3
  max_depth: 5
  min_difficulty: 1
  description_en: Carved into the wall above the current waterline. Recent. Someone else tried this.
    The message is incomplete – the water reached it before they finished.
  description_de: In die Wand geritzt, über der aktuellen Wasserlinie. Kürzlich. Jemand anderes hat
    dies versucht. Die Nachricht ist unvollständig – das Wasser erreichte sie, bevor sie fertig waren.
  choices:
  - id: message_read
    label_en: Read what remains (Propagandist)
    label_de: Lesen, was bleibt (Propagandist)
    check_aptitude: propagandist
    check_difficulty: -5
    success_effects:
      reveal_rooms: 2
    partial_effects:
      reveal_rooms: 1
    fail_effects:
      stress: 15
    success_narrative_en: The message is a map. Partial, but legible. {agent} decodes the previous
      party's observations – room types, water routes, a warning about the depth below.
    success_narrative_de: Die Nachricht ist eine Karte. Unvollständig, aber lesbar. {agent} entschlüsselt
      die Beobachtungen der vorherigen Gruppe – Raumtypen, Wasserwege, eine Warnung über die Tiefe
      darunter.
    partial_narrative_en: 'The handwriting resolves partly. Room-types surface; the route through them stays in a dialect {agent} almost speaks. Two words land – one useful, one a warning the warning itself cannot finish. The previous party said what they could. The water took the rest.'
    partial_narrative_de: 'Die Handschrift klärt sich teilweise. Raumtypen tauchen auf; der Weg durch sie bleibt in einem Dialekt, den {agent} fast spricht. Zwei Wörter landen – eines nützlich, eines eine Warnung, die die Warnung selbst nicht beenden kann. Die vorherige Gruppe hat gesagt, was sie konnte. Das Wasser hat den Rest genommen.'
    fail_narrative_en: The message is unsettling. The handwriting deteriorates. The last word is either
      'rising' or 'run'.
    fail_narrative_de: Die Nachricht ist beunruhigend. Die Handschrift verschlechtert sich. Das letzte
      Wort ist entweder »steigend« oder »lauf«.
  - id: message_add
    label_en: Add to it (Spy)
    label_de: Ergänzen (Spion)
    check_aptitude: spy
    check_difficulty: 0
    success_effects: {}
    partial_effects: {}
    fail_effects:
      water_level: 3
    success_narrative_en: '{agent} carves observations into the wall. Precise. Economical. Future
      parties will find better intelligence.'
    success_narrative_de: '{agent} ritzt Beobachtungen in die Wand. Präzise. Ökonomisch. Zukünftige
      Gruppen werden bessere Informationen finden.'
    partial_narrative_en: '{agent} starts the incision. Three lines legible, a fourth smudging as the stone weeps. The observations are there – abridged, honest about the abridgment. Future parties will find half a map. Half a map is still a map. The flood will read it too.'
    partial_narrative_de: '{agent} beginnt die Einritzung. Drei Zeilen leserlich, eine vierte verwischt, während der Stein weint. Die Beobachtungen sind da – gekürzt, ehrlich über die Kürzung. Zukünftige Gruppen werden eine halbe Karte finden. Eine halbe Karte ist immer noch eine Karte. Die Flut wird sie auch lesen.'
    fail_narrative_en: Time wasted. The water rises while {agent} carves.
    fail_narrative_de: Verschwendete Zeit. Das Wasser steigt, während {agent} ritzt.
  is_ambush: false
  ambush_stress: 0
- id: dc_sound_of_depth
  room_type: encounter
  min_depth: 3
  max_depth: 6
  min_difficulty: 2
  description_en: The water below has reached a resonance. A low hum. Not mechanical – geological.
    The sound the planet makes when it remembers it is mostly ocean.
  description_de: Das Wasser darunter hat eine Resonanz erreicht. Ein tiefes Summen. Nicht mechanisch
    – geologisch. Das Geräusch, das der Planet macht, wenn er sich erinnert, dass er hauptsächlich
    Ozean ist.
  choices:
  - id: depth_listen
    label_en: Listen (Propagandist)
    label_de: Lauschen (Propagandist)
    check_aptitude: propagandist
    check_difficulty: 0
    success_effects:
      boss_intel: first_attack_crit
    partial_effects: {}
    fail_effects:
      stress: 10
    success_narrative_en: The resonance reveals a pattern. {agent} understands – the boss's rhythm,
      its weakness. The first strike will find the fault line.
    success_narrative_de: Die Resonanz offenbart ein Muster. {agent} versteht – den Rhythmus des Bosses,
      seine Schwäche. Der erste Schlag wird die Bruchlinie finden.
    partial_narrative_en: 'The resonance approaches a pattern. {agent} hears the boss''s rhythm – three beats of it – before the water shifts its cadence. Enough to place the first strike. Not enough to place the second. The depth has been listening too.'
    partial_narrative_de: 'Die Resonanz nähert sich einem Muster. {agent} hört den Rhythmus des Bosses – drei Takte davon – bevor das Wasser seine Kadenz verschiebt. Genug, um den ersten Schlag zu setzen. Nicht genug, um den zweiten zu setzen. Die Tiefe hat auch zugehört.'
    fail_narrative_en: The sound is disorienting. It fills {agent}'s head and refuses to leave.
    fail_narrative_de: Das Geräusch ist desorientierend. Es füllt {agent}s Kopf und weigert sich zu
      gehen.
  - id: depth_measure
    label_en: Measure it (Spy)
    label_de: Vermessen (Spion)
    check_aptitude: spy
    check_difficulty: -5
    success_effects:
      reveal_water_calc: true
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: Precise calculations. {agent} now knows exactly how many rooms remain before
      the submerged threshold. The arithmetic is merciless but clear.
    success_narrative_de: Präzise Berechnungen. {agent} weiß jetzt genau, wie viele Räume bis zur
      Überschwemmungsschwelle verbleiben. Die Arithmetik ist gnadenlos, aber klar.
    partial_narrative_en: 'The instruments return. Room-count approximate. Threshold-depth approximate. The arithmetic holds but rounds the wrong way on two variables. {agent} knows how many rooms may remain. The water knows the exact number. It is not going to say.'
    partial_narrative_de: 'Die Instrumente kehren zurück. Raumanzahl ungefähr. Schwellenhöhe ungefähr. Die Arithmetik hält, rundet aber bei zwei Variablen in die falsche Richtung. {agent} weiß, wie viele Räume möglicherweise verbleiben. Das Wasser kennt die genaue Zahl. Es wird sie nicht sagen.'
    fail_narrative_en: Instruments damaged. The water's vibration is not compatible with measurement.
    fail_narrative_de: Instrumente beschädigt. Die Vibration des Wassers ist nicht messungskompatibel.
  - id: depth_block
    label_en: Block it out
    label_de: Ausblenden
    check_difficulty: 0
    success_effects: {}
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: The party moves on. The sound continues without them.
    success_narrative_de: Die Gruppe geht weiter. Das Geräusch setzt sich ohne sie fort.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: dc_tidal_gate
  room_type: elite
  min_depth: 4
  max_depth: 6
  min_difficulty: 1
  description_en: A mechanism. Ancient. Not built by anyone in this simulation. The gate controls
    a section of the flood – open it and the water surges through, closed it holds. But the mechanism
    requires a sacrifice.
  description_de: Ein Mechanismus. Uralt. Nicht von jemandem in dieser Simulation erbaut. Das Tor
    kontrolliert einen Abschnitt der Flut – öffnet man es, bricht das Wasser durch; geschlossen hält
    es. Aber der Mechanismus fordert ein Opfer.
  choices: []
  combat_encounter_id: deluge_warden_spawn
  is_ambush: false
  ambush_stress: 0
- id: dc_the_current_boss
  room_type: boss
  min_depth: 4
  max_depth: 99
  min_difficulty: 1
  description_en: The water has found its shape. It fills the room from below, from the walls, from
    the ceiling. The Current is not something IN the water. The Current IS the water, organized into
    purpose. It does not attack. It arrives.
  description_de: Das Wasser hat seine Form gefunden. Es füllt den Raum von unten, von den Wänden,
    von der Decke. Die Strömung ist nicht etwas IM Wasser. Die Strömung IST das Wasser, zu Absicht
    organisiert. Sie greift nicht an. Sie kommt.
  choices: []
  combat_encounter_id: deluge_warden_spawn

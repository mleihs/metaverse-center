- id: dc_dry_shelf
  room_type: rest
  min_depth: 1
  max_depth: 99
  min_difficulty: 1
  description_en: A ledge. Above the current waterline. Dry, for now. The mathematical certainty of
    the rising water makes this rest temporary, but temporary is enough.
  description_de: Ein Vorsprung. Über der aktuellen Wasserlinie. Trocken, vorerst. Die mathematische
    Gewissheit des steigenden Wassers macht diese Rast vorübergehend, aber vorübergehend reicht.
  choices:
  - id: dry_shelf_rest
    label_en: Rest on the dry shelf
    label_de: Auf dem trockenen Vorsprung rasten
    check_difficulty: 0
    success_effects:
      stress_heal: 40
      water_level: -5
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: The party rests. The water level drops slightly – pumping, seepage, the
      ledge's drainage. When they rise, the waterline is 5cm lower. It will not stay there.
    success_narrative_de: Die Gruppe rastet. Der Pegel sinkt leicht – Pumpen, Sickern, die Drainage
      des Vorsprungs. Als sie aufstehen, ist die Wasserlinie 5cm niedriger. Sie wird nicht dort bleiben.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0
- id: dc_air_pocket
  room_type: rest
  min_depth: 3
  max_depth: 99
  min_difficulty: 1
  description_en: A pocket of trapped air in a partially flooded section. The ceiling is close. The
    water is at chest height. But the air is breathable and the current is still.
  description_de: Eine Lufttasche in einem teilweise überfluteten Abschnitt. Die Decke ist nah. Das
    Wasser steht auf Brusthöhe. Aber die Luft ist atembar und die Strömung ist ruhig.
  choices:
  - id: air_pocket_rest
    label_en: Rest in the air pocket
    label_de: In der Lufttasche rasten
    check_difficulty: 0
    success_effects:
      stress_heal: 25
      water_level: -3
      stress: 5
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: Reduced rest. Not comfortable – the ceiling is close, the water is cold.
      But the current is still and the air is breathable. Claustrophobia is the price of shelter.
    success_narrative_de: Eingeschränkte Rast. Nicht bequem – die Decke ist nah, das Wasser ist kalt.
      Aber die Strömung ist ruhig und die Luft atembar. Klaustrophobie ist der Preis für Schutz.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0

- id: dc_preserved_chamber
  room_type: treasure
  min_depth: 2
  max_depth: 99
  min_difficulty: 1
  description_en: Someone sealed this room. The seal held – until now. Inside, everything is dry.
    The dust on the surfaces has not been disturbed by water. A time capsule from before the flood.
  description_de: Jemand hat diesen Raum versiegelt. Das Siegel hielt – bis jetzt. Drinnen ist alles
    trocken. Der Staub auf den Oberflächen wurde nicht vom Wasser gestört. Eine Zeitkapsel von vor
    der Flut.
  choices:
  - id: preserved_open
    label_en: Open the sealed chamber
    label_de: Die versiegelte Kammer öffnen
    check_difficulty: 0
    success_effects:
      loot_tier: 2
      water_level: 3
    partial_effects: {}
    fail_effects: {}
    success_narrative_en: The seal breaks. Quality salvage inside – dry, preserved, valuable. But
      the seal is now broken. The room will flood on the next tidal surge.
    success_narrative_de: Das Siegel bricht. Qualitätsgut drinnen – trocken, konserviert, wertvoll.
      Aber das Siegel ist jetzt gebrochen. Der Raum wird beim nächsten Gezeitenstoß überflutet.
    partial_narrative_en: ''
    partial_narrative_de: ''
    fail_narrative_en: ''
    fail_narrative_de: ''
  is_ambush: false
  ambush_stress: 0

schema_version: 1
banter:
- id: pb_01
  trigger: room_entered
  personality_filter:
    openness:
    - 0.6
    - 1.0
  text_en: '{agent} scans the workbench. Tools arranged by a system that is not alphabetical, not
    chronological, not any system {agent} recognizes. But organized. Precisely organized.'
  text_de: '{agent} scannt die Werkbank. Werkzeuge, angeordnet nach einem System, das nicht alphabetisch
    ist, nicht chronologisch, kein System, das {agent} erkennt. Aber geordnet. Präzise geordnet.'
  insight_tier: 0
- id: pb_02
  trigger: room_entered
  personality_filter:
    conscientiousness:
    - 0.7
    - 1.0
  text_en: The instruments register heat. Not from a source – from the room itself. The walls are
    warm. The floor is warm. The air conducts.
  text_de: Die Instrumente registrieren Hitze. Nicht von einer Quelle – vom Raum selbst. Die Wände
    sind warm. Der Boden ist warm. Die Luft leitet.
  insight_tier: 0
- id: pb_03
  trigger: room_entered
  personality_filter: {}
  text_en: A workbench. Clean. Expectant. The kind of clean that suggests recent use, not abandonment.
  text_de: Eine Werkbank. Sauber. Erwartungsvoll. Die Art von Sauberkeit, die auf kürzliche Benutzung
    hindeutet, nicht auf Verlassenheit.
  insight_tier: 0
- id: pb_04
  trigger: room_entered
  personality_filter:
    openness:
    - 0.6
    - 1.0
  text_en: '{agent}: ''The reagents are sorting themselves. Did anyone else see that? The reagents
    are sorting themselves.'''
  text_de: '{agent}: »Die Reagenzien sortieren sich selbst. Hat das sonst jemand gesehen? Die Reagenzien
    sortieren sich selbst.«'
  insight_tier: 1
- id: pb_05
  trigger: room_entered
  personality_filter:
    neuroticism:
    - 0.0
    - 0.4
  text_en: The workshop hums. Not electrically – deliberately. A sustained note of anticipation, as
    if the room knows what the party has not yet decided to build.
  text_de: Die Werkstatt summt. Nicht elektrisch – absichtlich. Ein gehaltener Ton der Erwartung,
    als wüsste der Raum, was der Trupp noch nicht zu bauen beschlossen hat.
  insight_tier: 1
- id: pb_06
  trigger: room_entered
  personality_filter: {}
  text_en: 'On the wall: a formula. Half the variables are in a notation {agent} doesn''t recognize.
    The other half are disturbingly familiar.'
  text_de: 'An der Wand: eine Formel. Die Hälfte der Variablen ist in einer Notation, die {agent}
    nicht erkennt. Die andere Hälfte ist beunruhigend vertraut.'
  insight_tier: 1
- id: pb_07
  trigger: room_entered
  personality_filter:
    openness:
    - 0.7
    - 1.0
  text_en: The components in {agent}'s pack shift. Not settling – rearranging. They have preferences
    about proximity. The metal does not want to be near the powder.
  text_de: Die Komponenten in {agent}s Rucksack bewegen sich. Kein Setzen – Umordnen. Sie haben Präferenzen
    bezüglich Nähe. Das Metall will nicht neben dem Pulver sein.
  insight_tier: 2
- id: pb_08
  trigger: room_entered
  personality_filter: {}
  text_en: »Die Werkstatt ordnet sich um.« The workshop rearranges itself. Tools migrate to different
    shelves. The anvil has moved three inches to the left. Nobody touched it.
  text_de: »Die Werkstatt ordnet sich um.« Werkzeuge wandern in andere Regale. Der Amboss hat sich
    drei Zentimeter nach links bewegt. Niemand hat ihn berührt.
  insight_tier: 2
- id: pb_09
  trigger: room_entered
  personality_filter:
    neuroticism:
    - 0.5
    - 1.0
  text_en: '{agent}''s hands are shaking. Not from fear. From something worse: the absolute certainty
    that the next combination will work. The fire knows. {agent} knows the fire knows.'
  text_de: '{agent}s Hände zittern. Nicht vor Angst. Vor etwas Schlimmerem: der absoluten Gewissheit,
    dass die nächste Kombination funktionieren wird. Das Feuer weiß es. {agent} weiß, dass das Feuer
    es weiß.'
  insight_tier: 3
- id: pb_10
  trigger: room_entered
  personality_filter: {}
  text_en: The workshop is no longer subtle. Surfaces glow. Materials levitate briefly before settling.
    The air tastes of ozone and ambition. Something in this room is about to happen whether the party
    participates or not.
  text_de: Die Werkstatt ist nicht mehr subtil. Oberflächen glühen. Materialien schweben kurz, bevor
    sie sich setzen. Die Luft schmeckt nach Ozon und Ambition. Etwas in diesem Raum wird gleich passieren,
    ob der Trupp teilnimmt oder nicht.
  insight_tier: 3
- id: pb_11
  trigger: depth_change
  personality_filter: {}
  text_en: Deeper. The workshop's complexity increases. The tools here are not for amateur hands.
  text_de: Tiefer. Die Komplexität der Werkstatt nimmt zu. Die Werkzeuge hier sind nicht für Laienhände.
  insight_tier: 0
- id: pb_12
  trigger: depth_change
  personality_filter: {}
  text_en: The forge-heat intensifies with depth. The workshop is revealing its inner chambers – the
    rooms where the serious work happens.
  text_de: Die Schmiedehitze intensiviert sich mit der Tiefe. Die Werkstatt enthüllt ihre inneren
    Kammern – die Räume, in denen die ernsthafte Arbeit stattfindet.
  insight_tier: 1
- id: pb_13
  trigger: depth_change
  personality_filter: {}
  text_en: This deep, the workshop stops pretending to be a place. It is a process. The party is inside
    the process now.
  text_de: So tief hört die Werkstatt auf, ein Ort zu sein. Sie ist ein Prozess. Der Trupp ist jetzt
    im Prozess.
  insight_tier: 2
- id: pb_14
  trigger: elite_spotted
  personality_filter: {}
  text_en: 'Ahead: something that was built with intent. Not the workshop''s ambient creations – a
    deliberate construct. It works at something. It does not wish to be interrupted.'
  text_de: 'Voraus: etwas, das mit Absicht gebaut wurde. Nicht die Zufallsschöpfungen der Werkstatt
    – ein absichtliches Konstrukt. Es arbeitet an etwas. Es wünscht nicht, unterbrochen zu werden.'
- id: pb_15
  trigger: elite_spotted
  personality_filter:
    neuroticism:
    - 0.6
    - 1.0
  text_en: '{agent} stops. ''That one is different. That one was MADE.'''
  text_de: '{agent} hält inne. »Das da ist anders. Das wurde GEMACHT.«'
- id: pb_16
  trigger: boss_approach
  personality_filter: {}
  text_en: 'The workshop contracts. All corridors converge. Ahead: the central chamber. The heat is
    absolute. Something inside is functioning with the confidence of a finished thing. It is not finished.'
  text_de: 'Die Werkstatt zieht sich zusammen. Alle Korridore konvergieren. Voraus: die zentrale Kammer.
    Die Hitze ist absolut. Etwas darin funktioniert mit der Zuversicht eines fertigen Dings. Es ist
    nicht fertig.'
- id: pb_17
  trigger: boss_approach
  personality_filter:
    openness:
    - 0.7
    - 1.0
  text_en: '{agent}: ''It knows we have been crafting. It has been watching. It wants to see what
    we built.'''
  text_de: '{agent}: »Es weiß, dass wir gecraften haben. Es hat zugesehen. Es will sehen, was wir
    gebaut haben.«'
- id: pb_18
  trigger: agent_afflicted
  personality_filter: {}
  text_en: '{agent} burns. Not physically – creatively. The fire that drove them to build has consumed
    the boundary between maker and material. {agent} is both craftsman and component now.'
  text_de: '{agent} brennt. Nicht physisch – kreativ. Das Feuer, das sie zum Bauen trieb, hat die
    Grenze zwischen Macher und Material verzehrt. {agent} ist jetzt beides: Handwerker und Komponente.'
- id: pb_19
  trigger: agent_afflicted
  personality_filter:
    neuroticism:
    - 0.6
    - 1.0
  text_en: '{agent}''s instruments read their own vital signs now. The instruments have suggestions.'
  text_de: '{agent}s Instrumente lesen jetzt ihre eigenen Vitalwerte. Die Instrumente haben Vorschläge.'
- id: pb_20
  trigger: agent_virtue
  personality_filter: {}
  text_en: '{agent} steadies. The fire is still there – but channeled now. Controlled. Primo Levi
    understood: the hand that works matter develops a different kind of intelligence.'
  text_de: '{agent} stabilisiert sich. Das Feuer ist noch da – aber kanalisiert jetzt. Kontrolliert.
    Primo Levi verstand: Die Hand, die Materie bearbeitet, entwickelt eine andere Art von Intelligenz.'
- id: pb_21
  trigger: agent_virtue
  personality_filter:
    conscientiousness:
    - 0.7
    - 1.0
  text_en: '{agent} picks up a tool. It fits. Not because it was designed for {agent}''s hand. Because
    {agent}''s hand has become what the tool requires.'
  text_de: '{agent} nimmt ein Werkzeug auf. Es passt. Nicht weil es für {agent}s Hand entworfen wurde.
    Weil {agent}s Hand zu dem geworden ist, was das Werkzeug verlangt.'
- id: pb_22
  trigger: insight_inspired
  personality_filter: {}
  text_en: Something shifts. {agent} sees connections that were invisible a moment ago. The components
    are not separate things – they are parts of something that wants to exist.
  text_de: Etwas verschiebt sich. {agent} sieht Verbindungen, die vor einem Moment noch unsichtbar
    waren. Die Komponenten sind keine separaten Dinge – sie sind Teile von etwas, das existieren will.
- id: pb_23
  trigger: insight_feverish
  personality_filter: {}
  text_en: The fire is in everything now. {agent}'s instruments are warm to the touch. The workshop
    has stopped hiding its mechanisms. It is showing them – all of them, at once. It is too much.
    It is exactly enough.
  text_de: Das Feuer ist jetzt in allem. {agent}s Instrumente sind warm bei Berührung. Die Werkstatt
    hat aufgehört, ihre Mechanismen zu verbergen. Sie zeigt sie – alle, auf einmal. Es ist zu viel.
    Es ist genau genug.
- id: pb_24
  trigger: insight_breakthrough
  personality_filter: {}
  text_en: For a moment – only a moment – the workshop is transparent. Every mechanism visible. Every
    connection mapped. Every possible combination illuminated. The fire burns at its brightest. The
    fire also burns.
  text_de: Für einen Moment – nur einen Moment – ist die Werkstatt transparent. Jeder Mechanismus
    sichtbar. Jede Verbindung kartiert. Jede mögliche Kombination beleuchtet. Das Feuer brennt am
    hellsten. Das Feuer brennt auch.
- id: pb_25
  trigger: insight_cold
  personality_filter: {}
  text_en: The forge is cold. The workshop presents its materials, but they are inert. They wait for
    a spark that has not yet arrived.
  text_de: Die Schmiede ist kalt. Die Werkstatt präsentiert ihre Materialien, aber sie sind inert.
    Sie warten auf einen Funken, der noch nicht eingetroffen ist.
- id: pb_26
  trigger: combat_won
  personality_filter: {}
  text_en: The construct disassembles. Its components scatter. Some of them are still warm. Some of
    them are interesting.
  text_de: Das Konstrukt zerlegt sich. Seine Komponenten zerstreuen sich. Manche sind noch warm. Manche
    sind interessant.
- id: pb_27
  trigger: combat_won
  personality_filter:
    openness:
    - 0.6
    - 1.0
  text_en: '{agent} examines the remains. Not as a soldier examines a defeated enemy. As an engineer
    examines a competitor''s product.'
  text_de: '{agent} untersucht die Überreste. Nicht wie ein Soldat einen besiegten Feind untersucht.
    Wie ein Ingenieur das Produkt eines Konkurrenten untersucht.'
- id: pb_28
  trigger: combat_won
  personality_filter: {}
  text_en: The workshop absorbs the debris. Already recycling. Already planning the next iteration.
  text_de: Die Werkstatt absorbiert die Trümmer. Recycelt bereits. Plant bereits die nächste Iteration.
- id: pb_29
  trigger: rest_start
  personality_filter: {}
  text_en: The fire dims. Not out – it is still there, in the walls, in the floor, in the components.
    But it allows rest. A forge needs its cooling cycles.
  text_de: Das Feuer wird schwächer. Nicht aus – es ist noch da, in den Wänden, im Boden, in den Komponenten.
    Aber es erlaubt Ruhe. Eine Schmiede braucht ihre Abkühlzyklen.
- id: pb_30
  trigger: rest_start
  personality_filter:
    neuroticism:
    - 0.5
    - 1.0
  text_en: '{agent} sets down the components. They cool. For a moment, they are just materials again.
    Just matter. The workshop permits this.'
  text_de: '{agent} legt die Komponenten ab. Sie kühlen ab. Für einen Moment sind sie wieder nur Materialien.
    Nur Materie. Die Werkstatt erlaubt das.'
- id: pb_31
  trigger: loot_found
  personality_filter: {}
  text_en: 'New material. The workshop offers it like a gift. Like all gifts here: also a question.'
  text_de: 'Neues Material. Die Werkstatt bietet es an wie ein Geschenk. Wie alle Geschenke hier:
    auch eine Frage.'
- id: pb_32
  trigger: loot_found
  personality_filter:
    openness:
    - 0.7
    - 1.0
  text_en: '{agent} holds the component. It is warm. It pulses once – not a heartbeat, but a frequency.
    It is introducing itself.'
  text_de: '{agent} hält die Komponente. Sie ist warm. Sie pulsiert einmal – kein Herzschlag, sondern
    eine Frequenz. Sie stellt sich vor.'
- id: pb_33
  trigger: agent_stressed
  personality_filter: {}
  text_en: The fire in {agent}'s instruments flares. Prometheus did not just bring fire to humanity.
    He brought the burns too.
  text_de: Das Feuer in {agent}s Instrumenten flammt auf. Prometheus brachte nicht nur Feuer zur Menschheit.
    Er brachte auch die Verbrennungen.
- id: pb_34
  trigger: agent_stressed
  personality_filter:
    neuroticism:
    - 0.6
    - 1.0
  text_en: '{agent} flinches. The workshop does not pause. Innovation does not wait for permission.
    Nor for comfort.'
  text_de: '{agent} zuckt zusammen. Die Werkstatt pausiert nicht. Innovation wartet nicht auf Erlaubnis.
    Auch nicht auf Komfort.'

    success_narrative_en: The core hums. A contained fire. It WANTS to be used. Every gift is also
      a weapon – but this one is honest about it.
    success_narrative_de: Der Kern summt. Ein eingedämmtes Feuer. Er WILL benutzt werden. Jede Gabe
      ist auch eine Waffe – aber diese ist ehrlich darüber.
    partial_narrative_en: 'The core comes free halfway. It wants to be used – that registers clearly. Its containment wavers for a breath, then holds. {agent} secures the extraction, uneven. The fire is portable. Not fully tamed. The workshop has decided to see what {agent} does next.'
    partial_narrative_de: 'Der Kern löst sich zur Hälfte. Er will benutzt werden – das registriert klar. Seine Eindämmung wankt einen Atemzug lang, dann hält sie. {agent} sichert die Extraktion, uneben. Das Feuer ist tragbar. Nicht vollständig gezähmt. Die Werkstatt hat beschlossen zu sehen, was {agent} als Nächstes tut.'
    fail_narrative_en: The core pulses once. A warning. {agent} withdraws.
    fail_narrative_de: Der Kern pulsiert einmal. Eine Warnung. {agent} zieht sich zurück.

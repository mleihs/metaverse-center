schema_version: 1
entrance_texts:
- text_en: The threshold does not yield. It opens. Deliberately. Beyond it, the air is warm and charged
    with potential. Tools line the walls in arrangements that suggest use, not storage. The workshop
    has been expecting someone.
  text_de: Die Schwelle gibt nicht nach. Sie öffnet sich. Absichtlich. Dahinter ist die Luft warm
    und geladen mit Potential. Werkzeuge säumen die Wände in Anordnungen, die Benutzung suggerieren,
    nicht Lagerung. Die Werkstatt hat jemanden erwartet.
- text_en: Heat. Not the heat of fire – the heat of process. The air smells of ozone and possibility.
    Somewhere deeper, metal rings against metal. Not randomly. Rhythmically. A heartbeat made of industry.
  text_de: Hitze. Nicht die Hitze von Feuer – die Hitze von Prozess. Die Luft riecht nach Ozon und
    Möglichkeit. Irgendwo tiefer klingt Metall gegen Metall. Nicht zufällig. Rhythmisch. Ein Herzschlag
    aus Industrie.
- text_en: 'The descent into the workshop begins with a question written on the lintel in a script
    older than the stone: ''What do you intend to make?'' The party has no answer yet. The workshop
    will provide the materials for one.'
  text_de: 'Der Abstieg in die Werkstatt beginnt mit einer Frage, die am Türsturz steht, in einer
    Schrift, älter als der Stein: »Was beabsichtigt ihr herzustellen?« Der Trupp hat noch keine Antwort.
    Die Werkstatt wird die Materialien für eine liefern.'
- text_en: The first room is a catalogue of components. Not displayed – arranged. Each material in
    its place, each place chosen by a logic that makes no sense until you pick something up and feel
    where it wants to go. The workshop teaches through inventory.
  text_de: Der erste Raum ist ein Katalog von Komponenten. Nicht ausgestellt – arrangiert. Jedes Material
    an seinem Platz, jeder Platz gewählt nach einer Logik, die keinen Sinn ergibt, bis man etwas aufnimmt
    und spürt, wohin es will. Die Werkstatt lehrt durch Inventar.
- text_en: A forge-glow illuminates the entrance. Not from a furnace – from the walls themselves.
    The workshop provides its own light, its own heat, its own purpose. All it lacks is hands. Yours
    will do.
  text_de: Ein Schmiedeglühen beleuchtet den Eingang. Nicht von einem Ofen – von den Wänden selbst.
    Die Werkstatt liefert ihr eigenes Licht, ihre eigene Hitze, ihren eigenen Zweck. Alles, was ihr
    fehlt, sind Hände. Eure werden genügen.

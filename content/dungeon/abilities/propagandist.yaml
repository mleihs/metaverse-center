- id: propagandist_rally
  name_en: Rally
  name_de: Sammeln
  school: propagandist
  description_en: Inspire the entire party. Heal 60 stress for all allies.
  description_de: Die gesamte Gruppe inspirieren. Heilt 60 Stress für alle Verbündeten.
  min_aptitude: 5
  cooldown: 3
  effect_type: heal_stress
  effect_params:
    stress_heal: 60
  is_ultimate: false
  targets: all_allies

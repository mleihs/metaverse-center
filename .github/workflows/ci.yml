name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Biome lint
        run: npm run lint

      - name: Lit template check
        run: npm run lint:lit

      - name: Color token lint
        run: bash frontend/scripts/lint-color-tokens.sh
        working-directory: .

      - name: Content quality lint
        run: bash frontend/scripts/lint-llm-content.sh
        working-directory: .

      - name: Navigation lint (no direct pushState)
        run: bash frontend/scripts/lint-no-pushstate.sh
        working-directory: .

      - name: API layer lint (no appState routing reads)
        run: bash frontend/scripts/lint-no-appstate-access-reads.sh
        working-directory: .

      - name: Error-handling lint (no empty-var catch)
        run: bash frontend/scripts/lint-no-empty-catch.sh
        working-directory: .

      - name: Type-safety lint (no `as unknown as T` casts)
        run: bash frontend/scripts/lint-no-cast-unknown.sh
        working-directory: .

      - name: Backend lint (GenerationService._generate privacy)
        run: bash scripts/lint-no-private-generate.sh
        working-directory: .

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Run tests
        run: npm test

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: "http://localhost:54321"
      SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0"
      SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU"
      SUPABASE_JWT_SECRET: "super-secret-jwt-token-with-at-least-32-characters-long"
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase containers (no migrations)
        # `supabase start` applies migrations via an embedded SQL splitter
        # that fails on certain valid PostgreSQL patterns (observed with
        # migration 214: SQLSTATE 42601 "cannot insert multiple commands
        # into a prepared statement", even though psql applies the same
        # file cleanly). We start containers here, then apply migrations
        # via psql in the next step — the canonical Postgres client
        # handles every migration identically to local/prod.
        run: |
          mkdir -p /tmp/migrations-stash
          mv supabase/migrations/*.sql /tmp/migrations-stash/
          supabase start -x realtime,storage,imgproxy,edge-runtime,logflare,vector,supavisor
          mv /tmp/migrations-stash/*.sql supabase/migrations/
          rmdir /tmp/migrations-stash

      - name: Apply migrations via psql
        env:
          PGPASSWORD: postgres
        run: |
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "Applying $(basename "$f")..."
            psql -h localhost -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1 -q -f "$f"
          done

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: python -m pytest --cov

  sentry-release:
    name: Sentry Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint-frontend, test-frontend, test-backend]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Associate commits & register deploy
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
          inject: false

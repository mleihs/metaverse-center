name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Biome lint
        run: npm run lint

      - name: Lit template check
        run: npm run lint:lit

      - name: Color token lint
        run: bash frontend/scripts/lint-color-tokens.sh
        working-directory: .

      - name: Content quality lint
        run: bash frontend/scripts/lint-llm-content.sh
        working-directory: .

      - name: Navigation lint (no direct pushState)
        run: bash frontend/scripts/lint-no-pushstate.sh
        working-directory: .

      - name: API layer lint (no appState routing reads)
        run: bash frontend/scripts/lint-no-appstate-access-reads.sh
        working-directory: .

      - name: Error-handling lint (no empty-var catch)
        run: bash frontend/scripts/lint-no-empty-catch.sh
        working-directory: .

      - name: Type-safety lint (no `as unknown as T` casts)
        run: bash frontend/scripts/lint-no-cast-unknown.sh
        working-directory: .

      - name: Backend lint (GenerationService._generate privacy)
        run: bash scripts/lint-no-private-generate.sh
        working-directory: .

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Run tests
        run: npm test

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: "http://localhost:54321"
      SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0"
      SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU"
      SUPABASE_JWT_SECRET: "super-secret-jwt-token-with-at-least-32-characters-long"
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          # Pinned: CLI v2.90.0 (released 2026-04-13) upgraded pgdelta to
          # "alpha 11" (#5075), which regressed multi-statement migration
          # parsing. Files with multiple CREATE OR REPLACE FUNCTION blocks
          # (e.g. supabase/migrations/20260414400000_214_epoch_atomic_operations.sql)
          # are sent as a single prepared statement and fail with
          # SQLSTATE 42601 "cannot insert multiple commands into a prepared
          # statement". v2.84.2 is the last stable before the pgdelta alpha
          # upgrade. Revisit once a later stable release ships a fixed pgdelta.
          version: 2.84.2

      - name: Start Supabase
        run: supabase start -x realtime,storage,imgproxy,edge-runtime,logflare,vector,supavisor

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: python -m pytest --cov

  sentry-release:
    name: Sentry Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint-frontend, test-frontend, test-backend]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Associate commits & register deploy
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
          inject: false
